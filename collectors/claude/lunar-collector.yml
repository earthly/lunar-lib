version: 0

name: claude
description: Detect Claude code review activity, CI usage, and run AI prompts against code
author: support@earthly.dev

image: +image
default_image_ci_collectors: native

landing_page:
  display_name: "Claude Collector"
  long_description: |
    Detects Claude Code Review on pull requests, captures Claude CLI invocations
    in CI, and runs custom Claude prompts against code. Writes to normalized
    ai.code_reviewers[] plus Claude-specific data in ai.native.claude.
  category: "code-analysis"
  icon: "assets/claude.svg"
  status: "experimental"
  related:
    - slug: "ai"
      type: "policy"
      reason: "Enforces code reviewer presence using collected data"
    - slug: "ast-grep"
      type: "collector"
      reason: "Use ast-grep for syntax-aware pattern matching without AI"

collectors:
  - name: code-reviewer
    description: |
      Detects Claude Code Review check-runs on pull requests by querying the
      GitHub check-runs API. Waits for scan completion and writes a normalized
      entry to ai.code_reviewers[].
    mainBash: code-reviewer.sh
    hook:
      type: code
      runs_on: [prs]
    keywords: ["claude", "code review", "ai review", "pull request"]

  - name: cicd
    description: |
      Detects Claude Code CLI invocations in CI pipelines. Records the command
      string, version, and extracted flags (--allowedTools, --disallowedTools,
      --mcp-config) for policy-level analysis. Moved from ai-use collector.
    mainBash: cicd.sh
    hook:
      type: ci-after-command
      binary:
        name: claude
    keywords: ["claude", "claude code", "ai ci", "ci safety"]

  - name: run-prompt
    description: |
      Runs a Claude AI prompt against the repository and collects the results.
      Supports optional JSON schema enforcement for structured output.
      Use cases include feature flag detection, documentation quality analysis,
      and architecture pattern detection.
    mainBash: run-prompt.sh
    hook:
      type: code
    keywords: ["claude", "ai", "llm", "code analysis", "pattern detection", "anthropic"]

inputs:
  path:
    description: JSON component path for run-prompt results (e.g., ".code_patterns.feature_flags")
  prompt:
    description: Prompt for Claude to run on the component repository (run-prompt only)
  json_schema:
    description: Optional JSON schema for structured output in run-prompt

secrets:
  GH_TOKEN:
    description: GitHub token for API access (required for code-reviewer collector)
  ANTHROPIC_API_KEY:
    description: Anthropic API key for Claude authentication (required for run-prompt collector)

example_component_json: |
  {
    "ai": {
      "code_reviewers": [
        {
          "tool": "claude",
          "check_name": "Claude Code Review",
          "detected": true,
          "last_seen": "2024-01-14T08:00:00Z"
        }
      ],
      "native": {
        "claude": {
          "cicd": {
            "cmds": [
              {
                "cmd": "claude -p --output-format json --allowedTools Bash(git*) Read 'review this PR'",
                "tool": "claude",
                "version": "1.0.20",
                "allowed_tools": "Bash(git*) Read"
              }
            ]
          }
        }
      }
    }
  }
