  <line x1="49" y1="49" x2="60" y2="60" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Document lines inside magnifier -->
  <line x1="36" y1="39" x2="48" y2="39" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="42" x2="46" y2="42" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
