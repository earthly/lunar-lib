  <path d="M28 10 V46" stroke="black" stroke-width="1.5"/>
  <path d="M10 28 H46" stroke="black" stroke-width="1.5"/>
  <path d="M13.5 18 Q28 22 42.5 18" stroke="black" stroke-width="1.2" fill="none"/>
  <path d="M13.5 38 Q28 34 42.5 38" stroke="black" stroke-width="1.2" fill="none"/>
