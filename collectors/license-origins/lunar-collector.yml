version: 0

name: license-origins
description: Scan dependency license files for country-of-origin mentions
author: support@earthly.dev

default_image: earthly/lunar-lib:license-origins-main

landing_page:
  display_name: "License Origins Collector"
  long_description: |
    Scan dependency license files for geographic origin signals — country names
    in copyright lines, governing law clauses, and author addresses. Results are
    cached in Postgres for fast repeat scans across projects.
  categories: ["security"]
  icon: "assets/license-origins.svg"
  status: "experimental"
  related:
    - slug: "sbom"
      type: "policy"
      reason: "Enforces blocked-origins policy on collected license origin data"

collectors:
  - name: scan
    description: |
      Generates a CycloneDX SBOM using bundled syft (with remote license
      lookups for Go, Java, Node.js, Python) and writes it to .sbom.auto,
      fully replacing the syft collector. Then scans each dependency's license
      files for country name mentions. Scan results are cached in a
      configurable Postgres database keyed by PURL@version. Writes origin
      results to .sbom.license_origins in Component JSON.
    mainBash: scan.sh
    hook:
      type: code
    keywords:
      - "license origins"
      - "country of origin"
      - "geographic origin"
      - "license scanning"
      - "compliance"
      - "supply chain"
      - "export control"
      - "sbom"

inputs:
  cache_enabled:
    description: Enable Postgres caching of scan results (set to "false" to scan fresh every time)
    default: "true"
  cache_db_host:
    description: Postgres host
    default: "postgres"
  cache_db_port:
    description: Postgres port
    default: "5432"
  cache_db_name:
    description: Postgres database name
    default: "hub"
  cache_db_user:
    description: Postgres user (needs CREATE TABLE, INSERT, SELECT)
    default: "lunar"

secrets:
  CACHE_DB_PASSWORD:
    description: Postgres password for the cache database user. Required for caching — if not provided, caching is disabled.

example_component_json: |
  {
    "sbom": {
      "license_origins": {
        "source": {
          "tool": "license-origins",
          "integration": "code",
          "version": "0.1.0"
        },
        "packages": [
          {
            "purl": "pkg:npm/scheduler-lib@2.1.0",
            "name": "scheduler-lib",
            "license_file": "node_modules/scheduler-lib/LICENSE",
            "countries": ["Germany"],
            "excerpts": ["Copyright 2024 Hans Mueller, Berlin, Germany"],
            "cached": false
          }
        ],
        "summary": {
          "files_scanned": 185,
          "packages_with_mentions": 1,
          "countries_found": ["Germany"],
          "cache_hits": 140,
          "cache_misses": 45
        }
      }
    }
  }
