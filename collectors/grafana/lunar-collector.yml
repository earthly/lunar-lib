version: 0

name: grafana
description: Collect dashboard and alert rule data from Grafana via the API and from dashboard JSON files in the component repo
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Grafana Collector"
  long_description: |
    Query the Grafana API for dashboards and alerts linked to each component,
    and scan the component repo for Grafana dashboard JSON files. Normalizes
    to .observability for tool-agnostic policies; raw data at
    .observability.native.grafana.
  categories: ["service-catalog"]
  icon: "assets/grafana.svg"
  status: "beta"
  related:
    - slug: "observability"
      type: "policy"
      reason: "Enforces dashboard and alert configuration standards using this collector's data"

collectors:
  - name: dashboard
    description: |
      Queries the Grafana REST API for the component's linked dashboard and
      alert rules. Discovers the dashboard UID from the component's
      `grafana/dashboard-uid` meta annotation (typically set by a
      company-specific cataloger via
      `lunar catalog component --meta grafana/dashboard-uid <uid>`). If no
      meta is set, the collector exits cleanly with no data written. Writes
      the resolved UID to `.observability.dashboard.uid` so the full link is
      visible in the component JSON even when the dashboard is missing. If
      the UID is set but the dashboard does not exist in Grafana, writes
      `.observability.dashboard.exists=false`. Counts alert rules scoped to
      the dashboard's folder. Writes normalized data to
      .observability.dashboard, .observability.alerts, .observability.source,
      and the raw Grafana API responses to .observability.native.grafana.api.
    mainBash: dashboard.sh
    hook:
      type: cron
      schedule: "0 2 * * *"  # Human-readable: daily at 02:00 UTC
      clone-code: false
    keywords: ["grafana", "dashboard", "alerts", "observability", "monitoring"]

  - name: repo-dashboards
    description: |
      Walks the component repository looking for Grafana dashboard JSON files
      by content fingerprint (top-level `schemaVersion` and `panels` fields).
      Users can narrow the scan by setting the `find_command` input (e.g. to
      restrict to a `dashboards/` directory); by default the full repo is
      walked. Writes each matching file's raw JSON (plus its repo path) into
      .observability.native.grafana.repo_dashboards for users to build
      custom policies against. This sub-collector does not write to
      normalized .observability.dashboard paths — the API sub-collector owns
      those.
    mainBash: repo_dashboards.sh
    hook:
      type: code
    keywords: ["grafana", "dashboard-as-code", "repo", "json"]

inputs:
  grafana_base_url:
    description: >
      Grafana API base URL (e.g. `https://grafana.example.com`). Required
      for the `dashboard` sub-collector. If empty, the sub-collector exits
      cleanly with no data written.
    default: ""
  find_command:
    description: >
      Command used by the `repo-dashboards` sub-collector to enumerate
      candidate JSON files (must output one path per line). Narrow this to
      restrict the scan to a subdirectory, e.g.
      `find ./dashboards -type f -name '*.json'`.
    default: "find . -type f -name '*.json'"

secrets:
  GRAFANA_API_KEY:
    description: >
      Grafana API token with `dashboards:read` and `alerting.rules:read`
      scopes. Used by the `dashboard` sub-collector only.

example_component_json: |
  {
    "observability": {
      "source": {
        "tool": "grafana",
        "integration": "api"
      },
      "dashboard": {
        "uid": "abc123",
        "exists": true,
        "url": "https://grafana.example.com/d/abc123/payment-api"
      },
      "alerts": {
        "configured": true,
        "count": 5
      },
      "native": {
        "grafana": {
          "api": {
            "dashboard": { "...full Grafana dashboard API response..." },
            "alert_rules": [ "...list of alert rule objects..." ]
          },
          "repo_dashboards": [
            {
              "path": "dashboards/payment-api.json",
              "dashboard": { "schemaVersion": 39, "title": "Payment API", "panels": [] }
            }
          ]
        }
      }
    }
  }
