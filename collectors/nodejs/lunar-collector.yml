version: 0

name: nodejs
description: Collect Node.js project information, CI/CD commands, test coverage, and dependencies
author: earthly

default_image: earthly/lunar-lib:nodejs-v1.1.0
default_image_ci_collectors: native

landing_page:
  display_name: "Node.js Collector"
  long_description: |
    Analyze Node.js projects to collect package metadata, dependencies, test coverage,
    and CI/CD command tracking. Enforce Node.js-specific engineering standards.
  categories: ["languages", "build"]
  icon: "assets/nodejs.svg"
  status: "stable"
  related:
    - slug: "nodejs"
      type: "policy"
      reason: "Enforces Node.js project standards using collected metadata"

collectors:
  - name: project
    description: |
      Analyzes Node.js project structure by detecting package.json, lockfiles,
      TypeScript configuration, ESLint, Prettier, monorepo setup, and engines.node.
      Writes project metadata to .lang.nodejs with build system info.
    mainBash: project.sh
    hook:
      type: code
    keywords: ["nodejs", "package.json", "project structure", "npm", "yarn", "pnpm"]

  - name: dependencies
    description: |
      Extracts direct and dev dependencies from package.json.
      Captures package names and version ranges for dependency tracking
      and policy enforcement.
    mainBash: dependencies.sh
    hook:
      type: code
    keywords: ["nodejs dependencies", "npm packages", "package.json", "supply chain"]

  - name: cicd
    description: |
      Records every node command executed in CI pipelines along with the
      Node.js runtime version. Writes command strings and version info to
      .lang.nodejs.cicd for audit trails and build reproducibility analysis.
    mainBash: cicd.sh
    hook:
      type: ci-before-command
      binary:
        name: node
    keywords: ["nodejs ci", "node version", "ci commands", "build tracking"]

  - name: npm-cicd
    description: |
      Records every npm/npx command executed in CI pipelines along with the
      npm version. Writes command strings and version info to
      .lang.nodejs.npm.cicd.
    mainBash: npm-cicd.sh
    hook:
      type: ci-before-command
      binary:
        name_pattern: ^(npm|npx)$
    keywords: ["npm ci", "npm version", "ci commands", "dependency management"]

  - name: yarn-cicd
    description: |
      Records every Yarn command executed in CI pipelines along with the
      Yarn version. Writes command strings and version info to
      .lang.nodejs.yarn.cicd.
    mainBash: yarn-cicd.sh
    hook:
      type: ci-before-command
      binary:
        name: yarn
    keywords: ["yarn ci", "yarn version", "ci commands", "dependency management"]

  - name: pnpm-cicd
    description: |
      Records every pnpm command executed in CI pipelines along with the
      pnpm version. Writes command strings and version info to
      .lang.nodejs.pnpm.cicd.
    mainBash: pnpm-cicd.sh
    hook:
      type: ci-before-command
      binary:
        name: pnpm
    keywords: ["pnpm ci", "pnpm version", "ci commands", "dependency management"]

  - name: test-coverage
    description: |
      Extracts coverage percentage from existing test coverage output after
      tests complete. Parses coverage-summary.json to calculate total coverage
      and writes results to .lang.nodejs.tests.coverage and .testing.coverage.
    mainBash: test-coverage.sh
    hook:
      type: ci-after-command
      binary:
        name_pattern: ^(npm|npx|yarn|pnpm)$
      args:
        - value_pattern: ^(test|jest|vitest)$
    keywords: ["code coverage", "jest coverage", "vitest coverage", "test metrics"]

example_component_json: |
  {
    "lang": {
      "nodejs": {
        "version": "20.11.0",
        "build_systems": ["npm"],
        "package_json_exists": true,
        "package_lock_exists": true,
        "yarn_lock_exists": false,
        "pnpm_lock_exists": false,
        "tsconfig_exists": true,
        "eslint_configured": true,
        "prettier_configured": false,
        "engines_node": ">=18",
        "monorepo": { "type": "workspaces" },
        "source": { "tool": "node", "integration": "code" },
        "cicd": {
          "cmds": [{ "cmd": "node server.js", "version": "20.11.0" }]
        },
        "npm": {
          "cicd": {
            "cmds": [{ "cmd": "npm test", "version": "10.2.4" }]
          }
        },
        "tests": {
          "coverage": {
            "percentage": 85.5,
            "source": { "tool": "jest", "integration": "ci" }
          }
        },
        "dependencies": {
          "direct": [
            { "path": "express", "version": "^4.18.2" }
          ],
          "dev": [
            { "path": "jest", "version": "^29.7.0" }
          ],
          "source": { "tool": "npm", "integration": "code" }
        }
      }
    }
  }
