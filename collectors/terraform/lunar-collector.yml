version: 0

name: terraform
description: Parses Terraform HCL files and collects IaC configuration data
author: support@earthly.dev

default_image: earthly/lunar-lib:terraform-main
default_image_ci_collectors: native

landing_page:
  display_name: "Terraform Collector"
  long_description: |
    Parse Terraform HCL files to extract configuration data. Writes file validity,
    normalized resources with their tags and provider default_tags, and full parsed
    HCL JSON for downstream policy analysis of providers, modules, backends,
    resource tagging, and infrastructure security posture.
  categories: ["security", "orchestration"]
  icon: "assets/terraform.svg"
  status: "beta"
  related:
    - slug: "iac"
      type: "policy"
      reason: "Generic IaC guardrails using this collector's data"
    - slug: "terraform"
      type: "policy"
      reason: "Terraform-specific guardrails using this collector's data"

collectors:
  - name: terraform
    description: |
      Parses all Terraform (.tf) files in the repository using hcl2json and collects:
      File validity and parse errors (.iac.files[]);
      normalized modules with resources, resource tags, and analysis (.iac.modules[]);
      provider-level default_tags per module (.iac.modules[].default_tags);
      full parsed HCL JSON for terraform-specific policy (.iac.native.terraform.files[]);
      and source tool metadata (.iac.source).
      Resource tags: each entry in .iac.modules[].resources[] carries the literal
      `tags = {}` map it declares. hcl2json is a purely syntactic transform — it
      never runs `terraform plan` — so tag values that are interpolations
      (`${var.x}`) or the whole map being a function call (`merge(...)`) arrive as
      unresolved strings. Those cases are flagged so a policy can skip/warn rather
      than mis-verify: a resource whose `tags` value is itself an expression gets
      `tags_expression: true` (its keys can't be extracted); individual tag keys
      whose value is an unresolved expression are listed in `tags_unresolved`.
      Provider-level `default_tags` (which apply to every resource the provider
      creates, and are invisible per-resource in the HCL) are captured once per
      module at `.iac.modules[].default_tags` so a policy treats those resources as
      tagged-by-default and does not false-positive.
      Referential integrity (optional): when configured with `backstage_url`, the
      collector resolves each distinct value of the `entity_ref_tag_key` tag
      against the Backstage catalog API
      (`GET /api/catalog/entities/by-name/<kind>/<namespace>/<name>`) and records
      the outcome under `.iac.refs`. `.iac.refs.checked: true` is the "referential
      integrity ran" signal; each distinct ref records `{name, exists}` on a
      definitive 200/404, or `{name, error}` on a transient failure (so an outage
      stays distinguishable from a real miss). When `backstage_url` is unset (the
      default) no lookups run and `.iac.refs` is not written — behavior is
      identical to a plain parse run.
    mainBash: main.sh
    hook:
      type: code
    keywords: ["terraform", "iac", "infrastructure", "hcl", "aws", "providers", "modules", "backend", "tags", "default_tags", "backstage", "entity_ref", "referential integrity"]

  - name: cicd
    description: |
      Records every terraform command executed in CI pipelines along with the
      Terraform CLI version. Writes command strings and version info to
      .iac.native.terraform.cicd for audit trails and build reproducibility.
    mainBash: cicd.sh
    hook:
      type: ci-before-command
      binary:
        name: terraform
    keywords: ["terraform ci", "terraform version", "ci commands", "iac tracking", "deployment tracking"]

inputs:
  entity_ref_tag_key:
    description: |
      The resource tag key whose value is treated as a Backstage entity reference
      (of the form `[<kind>:][<namespace>/]<name>`). Used only for the optional
      referential-integrity lookup below — when `backstage_url` is set, the
      distinct concrete values of this tag are resolved against the Backstage
      catalog. Not used at all when `backstage_url` is empty.
    default: "backstage.com/entity_ref"
  backstage_url:
    description: |
      Base URL of the Backstage instance (e.g. https://backstage.example.com).
      When set, the collector cross-checks each distinct concrete `entity_ref_tag_key`
      tag value against the Backstage catalog API and records the result under
      `.iac.refs`. Empty (the default) disables referential-integrity lookups — the
      collector only parses the local HCL, exactly as before.
    default: ""

secrets:
  BACKSTAGE_TOKEN:
    description: |
      Bearer token for the Backstage catalog API, sent as an
      `Authorization: Bearer` header. Only used when `backstage_url` is set;
      required if the Backstage instance needs authentication (many internal
      deployments do).

example_component_json: |
  {
    "iac": {
      "source": {"tool": "hcl2json", "version": "0.6.8"},
      "files": [
        {"path": "deploy/terraform/main.tf", "valid": true},
        {"path": "deploy/terraform/variables.tf", "valid": true}
      ],
      "modules": [
        {
          "path": "deploy/terraform",
          "resources": [
            {"type": "aws_db_instance", "name": "main", "category": "datastore", "has_prevent_destroy": true,
             "tags": {"backstage.com/entity_ref": "component:default/payment-api", "env": "prod"}},
            {"type": "aws_s3_bucket", "name": "logs", "category": "datastore", "has_prevent_destroy": false,
             "tags": {"backstage.com/entity_ref": "${var.entity_ref}"}, "tags_unresolved": ["backstage.com/entity_ref"]},
            {"type": "aws_lb", "name": "api", "category": "network", "has_prevent_destroy": false, "internet_facing": true,
             "tags_expression": true},
            {"type": "aws_instance", "name": "web", "category": "compute", "has_prevent_destroy": false}
          ],
          "default_tags": {"team": "payments"},
          "analysis": {
            "internet_accessible": true,
            "has_waf": false
          }
        }
      ],
      "refs": {
        "checked": true,
        "entity_refs": [
          {"name": "component:default/payment-api", "exists": true}
        ]
      },
      "native": {
        "terraform": {
          "files": [
            {
              "path": "deploy/terraform/main.tf",
              "hcl": {
                "terraform": [{"required_providers": [{"aws": {"source": "hashicorp/aws", "version": "~> 5.0"}}]}],
                "resource": {"aws_db_instance": {"main": [{"engine": "postgres", "tags": {"backstage.com/entity_ref": "component:default/payment-api", "env": "prod"}}]}}
              }
            }
          ],
          "cicd": {
            "cmds": [
              {"cmd": "terraform init", "version": "1.9.8"},
              {"cmd": "terraform plan -out=tfplan", "version": "1.9.8"},
              {"cmd": "terraform apply -auto-approve tfplan", "version": "1.9.8"}
            ],
            "source": {"tool": "terraform", "integration": "ci"}
          }
        }
      }
    }
  }
