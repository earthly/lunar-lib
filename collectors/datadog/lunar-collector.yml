version: 0

name: datadog
description: Collect dashboard, monitor, and SLO data from Datadog via the API

author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Datadog Collector"
  long_description: |
    Query the Datadog API for dashboards, monitors, and SLOs linked to each
    component. Normalizes to .observability for tool-agnostic policies;
    raw data at .observability.native.datadog.
  categories: ["service-catalog"]
  icon: "assets/datadog.svg"
  status: "experimental"
  related:
    - slug: "observability"
      type: "policy"
      reason: "Enforces dashboard, monitor, and SLO standards using this collector's data"
    - slug: "datadog"
      type: "policy"
      reason: "Datadog-specific monitor and SLO guardrails using this collector's native data"

collectors:
  - name: service
    description: |
      Queries the Datadog REST API for the component's monitors, dashboard,
      and SLOs. Discovers the Datadog service tag from the component's
      `datadog/service-name` meta annotation (typically set by a
      company-specific cataloger via
      `lunar catalog component --meta datadog/service-name <name>`), or
      falls back to the explicit `service_name` input for static cases.
      Optionally resolves a dashboard UUID from the `datadog/dashboard-id`
      meta or the `dashboard_id` input â€” dashboards in Datadog are not
      universally tagged with `service:`, so they must be mapped explicitly.
      Monitors (via `/api/v1/monitor`) and SLOs (via `/api/v1/slo`) are
      filtered by the `service:<name>` tag; dashboard is fetched by UUID
      when set. Writes normalized data to .observability.dashboard,
      .observability.alerts (monitors), .observability.slo, and
      .observability.source, with raw API responses under
      .observability.native.datadog.api.
    mainBash: service.sh
    hook:
      type: code
    keywords: ["datadog", "monitors", "alerts", "dashboards", "slo", "observability"]

  - name: repo-files
    description: |
      Walks the component repository looking for Datadog-as-code JSON files
      by content fingerprint. Dashboards are identified by a top-level
      `widgets` array plus a `layout_type` field (the shape produced by
      Datadog's dashboard JSON export and the `datadog_dashboard_json`
      Terraform resource). Monitors are identified by a top-level object
      with `type` (e.g. `metric alert`, `query alert`, `service check`),
      `query`, and `name` fields. Users can narrow the scan by setting the
      `find_command` input (e.g. to restrict to a `datadog/` directory); by
      default the full repo is walked. Writes each matching file's raw JSON
      (plus its repo path) into
      `.observability.native.datadog.repo_dashboards` and
      `.observability.native.datadog.repo_monitors` for users to build
      custom policies against. This sub-collector does not write to
      normalized `.observability.dashboard` / `.observability.alerts` paths
      â€” the API sub-collector owns those; repo files only surface raw
      content.
    mainBash: repo_files.sh
    hook:
      type: code
    keywords: ["datadog", "dashboard-as-code", "monitors-as-code", "repo", "json"]

inputs:
  datadog_site:
    description: >
      Datadog site (e.g. `datadoghq.com`, `datadoghq.eu`, `us3.datadoghq.com`).
      Used to build API URLs and dashboard links. Defaults to the US1 site.
    default: "datadoghq.com"
  service_name:
    description: >
      Datadog service tag value (e.g. `payment-api`). Optional if the
      component has a `datadog/service-name` meta annotation set by a
      cataloger. Monitors and SLOs are filtered by `service:<name>`.
    default: ""
  dashboard_id:
    description: >
      Datadog dashboard UUID (e.g. `abc-123-def`). Optional if the component
      has a `datadog/dashboard-id` meta annotation. Dashboards in Datadog
      are not universally tagged with `service:`, so they must be mapped
      explicitly.
    default: ""
  find_command:
    description: >
      Command used by the `repo-files` sub-collector to enumerate candidate
      JSON files (must output one path per line). Narrow this to restrict
      the scan to a subdirectory, e.g.
      `find ./datadog -type f -name '*.json'`.
    default: "find . -type f -name '*.json'"

secrets:
  DATADOG_API_KEY:
    description: >
      Datadog API key (from Organization Settings â†’ API Keys). Used with
      `DD-API-KEY` header on all requests.
  DATADOG_APP_KEY:
    description: >
      Datadog application key (from Organization Settings â†’ Application
      Keys). Required for monitor, dashboard, and SLO reads â€” these
      endpoints require both `DD-API-KEY` and `DD-APPLICATION-KEY` headers.

example_component_json: |
  {
    "observability": {
      "source": {
        "tool": "datadog",
        "integration": "api"
      },
      "dashboard": {
        "id": "abc-123-def",
        "exists": true,
        "url": "https://app.datadoghq.com/dashboard/abc-123-def"
      },
      "alerts": {
        "configured": true,
        "count": 7
      },
      "slo": {
        "defined": true,
        "count": 2,
        "has_error_budget": true
      },
      "native": {
        "datadog": {
          "api": {
            "service_tag": "payment-api",
            "monitors": [ "...list of Datadog monitor objects..." ],
            "dashboard": { "...full Datadog dashboard API response..." },
            "slos": [ "...list of SLO objects..." ]
          },
          "repo_dashboards": [
            {
              "path": "datadog/payment-api-overview.json",
              "dashboard": { "title": "Payment API", "layout_type": "ordered", "widgets": [] }
            }
          ],
          "repo_monitors": [
            {
              "path": "datadog/monitors/latency.json",
              "monitor": { "name": "High p99 latency", "type": "metric alert", "query": "avg(last_5m):..." }
            }
          ]
        }
      }
    }
  }
