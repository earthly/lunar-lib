version: 0

name: web
description: Detect HTML and CSS/preprocessor files for frontend project categorization
author: earthly

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Web Collector"
  long_description: |
    Detect HTML, CSS, SCSS, and LESS files to categorize frontend projects.
    Distinguishes primarily-frontend repos from repos with incidental HTML.
    Lightweight detection collector — no external tools required.
  categories: ["languages"]
  icon: "assets/web.svg"
  status: "beta"

collectors:
  - name: project
    description: |
      Scans the repository for HTML and CSS-family files (.html, .css, .scss,
      .less). Counts files of each type and writes a separate .lang.<type> entry
      per detected type. Skips gracefully if no web files are found.
    mainBash: project.sh
    hook:
      type: code
    keywords: ["html", "css", "scss", "less", "frontend", "web", "markup", "stylesheet"]

example_component_json: |
  {
    "lang": {
      "html": {
        "file_count": 12,
        "source": { "tool": "web", "integration": "code" }
      },
      "css": {
        "file_count": 8,
        "source": { "tool": "web", "integration": "code" }
      },
      "scss": {
        "file_count": 3,
        "source": { "tool": "web", "integration": "code" }
      },
      "less": {
        "file_count": 2,
        "source": { "tool": "web", "integration": "code" }
      }
    }
  }
