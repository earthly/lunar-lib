version: 0

name: grype
description: |
  Scan source code dependencies for known vulnerabilities using Grype.
author: support@earthly.dev

default_image: earthly/lunar-lib:grype-main
default_image_ci_collectors: native

landing_page:
  display_name: "Grype Vulnerability Scanner Collector"
  long_description: |
    Scans repository dependencies for known CVEs using Grype, Anchore's
    open-source vulnerability scanner. Writes normalized findings to .sca
    for use with the SCA policy. No secrets or vendor accounts required.
  categories: ["security"]
  icon: "assets/grype.svg"
  status: "beta"
  related:
    - slug: "sca"
      type: "policy"
      reason: "Enforces SCA vulnerability thresholds"

collectors:
  - name: auto
    description: |
      Auto-scans the repository filesystem for dependency vulnerabilities
      using Grype. Writes normalized findings to .sca with severity counts,
      CVE IDs, affected packages, and fix versions.
    mainBash: auto.sh
    # Grype materializes a ~1.7GB vulnerability DB when db_auto_update is enabled
    # (opt-in; default off until size-aware Hub builds ship). large gives the
    # container the memory + ephemeral-storage headroom that update needs; at the
    # default profile the DB download OOM-kills the scan (exit 137). Kept here so
    # re-enabling db_auto_update is a one-flag flip. Requires a Hub honoring size
    # (ENG-983).
    size: large
    hook:
      type: code
    keywords: ["grype", "vulnerability", "cve", "sca", "dependency scanning", "auto"]

  - name: rescan
    description: |
      Re-runs the dependency (SCA) scan on a schedule and overwrites .sca so
      the SCA policy re-evaluates against CVEs published since the commit was
      first scanned — closing the gap where a branch passes at scan time but a
      dependency picks up a new CVE later. Runs the same scan as the `auto`
      collector (the sibling auto.sh) in the Grype collector image, and stamps
      .sca.source.integration="cron" (vs "code" for the on-push scan) so it's
      clear the data came from a scheduled re-scan.

      Opt-in scan history: with scan_history_size > 0 the re-scan first snapshots
      the current .sca (counts + summary + source, including the scan timestamp)
      into a bounded .sca.history[] array before overwriting .sca, preserving
      point-in-time scan results for audit. The SCA policy keeps reading the
      current .sca and behaves identically whether history is on or off. Default
      0 keeps today's overwrite-only behavior — no history, no schema change for
      existing consumers.
    mainBash: auto.sh
    # Same scan as `auto`, so same large profile for the runtime DB update.
    size: large
    # Cron-only sub-collector: set runs_on here, on the sub-collector. The cron
    # self-default ([default-branch]) blocks runs_on inheritance from a
    # consumer's `uses:` line, so the import line cannot toggle this — the value
    # must live in the manifest. Default-branch only (cheap: one re-scan per
    # component per tick); per-PR fan-out is opt-in (see README).
    runs_on: [default-branch]
    hook:
      type: cron
      schedule: "0 2 * * *"  # Human-readable: daily at 02:00 UTC (>= 10-min collector floor)
      clone-code: true
    keywords: ["sca", "cve", "grype", "dependency scanning", "cron rescan", "vulnerability"]

  - name: cicd
    description: |
      Detects Grype executions in CI pipelines. Captures the command,
      version, and input arguments for audit and compliance tracking.
      Routes results by scan target: an image scan (`grype <image-ref>`) is
      normalized to .container_scan, while a directory or SBOM scan
      (`grype dir:.`, `grype sbom:...`) stays in .sca — so a container scan
      already running in your pipeline is collected automatically with no
      extra configuration.
    mainBash: cicd.sh
    hook:
      type: ci-after-command
      binary:
        name: grype
    keywords: ["grype", "ci", "cicd", "command detection", "audit", "container scan", "image scan"]

  - name: container-scan
    description: |
      Automatically scans the container image this component published, as soon
      as it's detected. Via the after-json hook, resolves the pushed image from
      the docker collector's record (.containers.native.docker.cicd.cmds[]) and
      scans it with Grype into .container_scan.
    mainBash: container-rescan.sh
    # Fires at the doneness gate once .containers.native.docker.cicd.cmds is
    # present. Runs in the collector image (not native), reads merged Component JSON.
    runs_on: [default-branch]
    hook:
      type: after-json
      path: .containers.native.docker.cicd.cmds
    keywords: ["grype", "container scan", "image scan", "after-json", "on-push", "cve", "vulnerability"]

  - name: container-rescan
    description: |
      Re-scans the most recently shipped container image on a schedule. Resolves
      the image from what the component actually pushed — the most recent
      `docker push` (or `--push` build) in the docker collector's recorded
      commands (.containers.native.docker.cicd.cmds[]), read via `lunar component
      get-json`. That's already-persisted data, so no collector dependency is
      required. Pulls the image, scans it with Grype, and overwrites
      .container_scan so a shipped image is re-evaluated against CVEs published
      after it was built. Override with the `container_image` input. No code
      clone needed; runs in the Grype collector image, so the baked-in
      vulnerability DB is reused.
    mainBash: container-rescan.sh
    # Cron-only sub-collector: set runs_on here, on the sub-collector (mirrors
    # the .sca `rescan` collector). Default-branch only — one re-scan per
    # component per tick. Offset to 03:00 so it doesn't pile onto the .sca
    # rescan at 02:00.
    runs_on: [default-branch]
    hook:
      type: cron
      schedule: "0 3 * * *"  # Human-readable: daily at 03:00 UTC (>= 10-min collector floor)
      clone-code: false      # reads component JSON + pulls the image; no repo clone needed
    keywords: ["grype", "container scan", "image scan", "cron rescan", "cve", "vulnerability"]

inputs:
  scan_history_size:
    description: |
      Maximum number of prior SCA scans to retain in .sca.history[] on each cron
      re-scan. Snapshots are ordered oldest-first and the current scan stays in
      the main .sca fields, so the SCA policy is unaffected. Each entry carries
      its own source (integration + collected_at), so the release-time scan is
      identifiable as the integration="code" entry — that's .sca.history[0] when
      history is enabled from the component's first scan (the intended setup for
      release-time audit). Enabling it later on a component that has already been
      re-scanned captures the current .sca as the oldest entry, since the
      release-time scan was already overwritten. 0 (default) disables history
      entirely — .sca is overwritten each run exactly as today and no
      .sca.history is written, so existing consumers see no change. When the cap
      is reached the oldest entry (index 0) is preserved and the second-oldest is
      dropped. Only the rescan (cron) sub-collector maintains history; the
      on-push auto scan ignores this.
    default: "0"
  max_rescans:
    description: |
      Stop re-scanning a component after this many scheduled re-scans; 0
      (default) means unlimited. Counted independently via .sca.rescan_count (a
      monotonic tally of completed re-scans), so it stands alone and does not
      depend on scan_history_size — scan_history_size bounds how many scans you
      KEEP, max_rescans bounds how many you RUN. Once the limit is reached the
      cron skips the component, keeping the last scan and its history.
    default: "0"
  db_auto_update:
    description: |
      Download the latest Grype vulnerability database at scan time so scans pick
      up CVEs published since the collector image was built. Disabled by default
      for now: enabling it fetches a runtime DB that decompresses to ~1.7GB, which
      needs the size: large profile the auto/rescan collectors declare — and that
      only helps on a Hub that honors size (ENG-983), so it's kept off until
      size-aware Hub builds ship everywhere. Set to "true" on a size-aware Hub to
      scan the fresh DB; left "false" it scans the lighter image-baked DB, whose
      freshness tracks the image rebuild cadence.
    default: "false"
  container_image:
    description: |
      Pin the image the container scans (container-scan + container-rescan) scan.
      Default: the most recently pushed image in .containers.native.docker.cicd.cmds[]
      (recorded by the docker collector). e.g. "ghcr.io/acme/app:latest".
    default: ""

secrets:
  REGISTRY_USERNAME:
    description: Username for pulling private container images in the container-rescan cron. Optional — public images need no auth. REGISTRY_USER is accepted as an alias.
  REGISTRY_USER:
    description: Alias for REGISTRY_USERNAME (common registry/CI convention). Optional; used only when REGISTRY_USERNAME is unset.
  REGISTRY_PASSWORD:
    description: Password or token for pulling private container images in the container-rescan cron. Optional.

example_component_json: |
  {
    "sca": {
      "source": {
        "tool": "grype",
        "version": "0.74.0",
        "integration": "cron",
        "collected_at": "2026-07-08T02:00:07Z"
      },
      "vulnerabilities": {
        "critical": 0,
        "high": 2,
        "medium": 5,
        "low": 3,
        "total": 10
      },
      "findings": [
        {
          "severity": "high",
          "package": "golang.org/x/net",
          "version": "0.7.0",
          "ecosystem": "go-module",
          "cve": "CVE-2023-44487",
          "title": "HTTP/2 Rapid Reset Attack",
          "fix_version": "0.17.0",
          "fixable": true
        }
      ],
      "summary": {
        "has_critical": false,
        "has_high": true,
        "all_fixable": true
      },
      "history": [
        {
          "source": {"tool": "grype", "version": "0.74.0", "integration": "code", "collected_at": "2026-07-01T02:00:11Z"},
          "vulnerabilities": {"critical": 0, "high": 1, "medium": 5, "low": 3, "total": 9},
          "summary": {"has_critical": false, "has_high": true, "all_fixable": true}
        },
        {
          "source": {"tool": "grype", "version": "0.74.0", "integration": "cron", "collected_at": "2026-07-05T02:00:09Z"},
          "vulnerabilities": {"critical": 0, "high": 2, "medium": 5, "low": 3, "total": 10},
          "summary": {"has_critical": false, "has_high": true, "all_fixable": true}
        }
      ],
      "rescan_count": 2,
      "native": {
        "grype": {
          "cicd": {
            "cmds": [
              {"cmd": "grype dir:. -o json", "version": "0.74.0"}
            ]
          },
          "matches": [
            {
              "vulnerability": {
                "id": "CVE-2023-44487",
                "severity": "High",
                "fix": {"versions": ["0.17.0"], "state": "fixed"},
                "dataSource": "https://nvd.nist.gov/vuln/detail/CVE-2023-44487",
                "cvss": [{"metrics": {"baseScore": 7.5}}]
              },
              "artifact": {
                "name": "golang.org/x/net",
                "version": "0.7.0",
                "type": "go-module",
                "language": "go",
                "purl": "pkg:golang/golang.org/x/net@0.7.0"
              }
            }
          ]
        }
      }
    },
    "container_scan": {
      "source": {
        "tool": "grype",
        "version": "0.74.0",
        "integration": "ci"
      },
      "image": "myregistry.io/app:v1.2.3",
      "os": {
        "family": "alpine",
        "version": "3.19"
      },
      "vulnerabilities": {
        "critical": 0,
        "high": 1,
        "medium": 4,
        "low": 7,
        "total": 12
      },
      "findings": [
        {
          "severity": "high",
          "package": "libssl3",
          "version": "3.1.4-r5",
          "ecosystem": "apk",
          "cve": "CVE-2024-2511",
          "title": "OpenSSL unbounded memory growth in TLSv1.3 session handling",
          "fix_version": "3.1.4-r6",
          "fixable": true
        }
      ],
      "summary": {
        "has_critical": false,
        "has_high": true,
        "all_fixable": true
      },
      "native": {
        "grype": {
          "matches": [
            {
              "vulnerability": {
                "id": "CVE-2024-2511",
                "severity": "High",
                "fix": {"versions": ["3.1.4-r6"], "state": "fixed"}
              },
              "artifact": {
                "name": "libssl3",
                "version": "3.1.4-r5",
                "type": "apk",
                "purl": "pkg:apk/alpine/libssl3@3.1.4-r5"
              }
            }
          ]
        }
      }
    }
  }
