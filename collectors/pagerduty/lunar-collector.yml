version: 0

name: pagerduty
description: Collect on-call schedule and escalation data from PagerDuty
author: support@earthly.dev

default_image: earthly/lunar-lib:base-v1.7.0

landing_page:
  display_name: "PagerDuty Collector"
  long_description: |
    Query the PagerDuty API to collect on-call schedule, escalation policy,
    and current responder data. Normalizes results into the .oncall category
    for tool-agnostic policy evaluation.
  categories: ["incident-management"]
  icon: "assets/pagerduty.svg"
  status: "beta"
  related:
    - slug: "oncall"
      type: "policy"
      reason: "Enforces on-call schedule, escalation, and staffing standards"

collectors:
  - name: oncall
    description: |
      Queries the PagerDuty REST API for the component's service. Resolves
      the service ID in order: the component's `pagerduty/service-id` meta
      annotation (set by a cataloger via
      `lunar catalog component --meta pagerduty/service-id <id>`), then the
      explicit service_id input, then — when `backstage_discovery` is enabled
      — the component's own `catalog-info.yaml` (read from the checked-out
      repo; the cron hook clones the code), reading the service ID directly
      from a `pagerduty.com/service-id` / `pagerduty/service-id` annotation.
      Fetches service details, on-call schedule participants, and escalation
      policy. Writes normalized data to .oncall.service, .oncall.schedule,
      .oncall.escalation, and .oncall.summary. Stores the raw API response
      under .oncall.native.pagerduty.
    mainBash: oncall.sh
    hook:
      type: cron
      schedule: "0 2 * * *"  # Human-readable: daily at 02:00 UTC
      clone-code: true       # checkout lets backstage_discovery read catalog-info.yaml locally
    keywords: ["pagerduty", "oncall", "escalation", "incident management", "on-call schedule"]

inputs:
  service_id:
    description: >
      PagerDuty service ID to query (e.g. PXXXXXX). Optional if the component
      has a `pagerduty/service-id` meta annotation set by a cataloger.
    default: ""
  pagerduty_base_url:
    description: PagerDuty API base URL
    default: "https://api.pagerduty.com"
  backstage_discovery:
    description: >
      When "true", and no service ID is found via component meta or the
      service_id input, discover it from the component's own
      catalog-info.yaml: the collector reads the file from the checked-out
      repo (the cron hook clones the code) and takes the PagerDuty service ID
      from the annotation keys listed in backstage_annotations. Opt-in, and
      needs no extra secret — the runner's checkout is used, not a token.
      Lets the oncall guardrails work off the standard PagerDuty Backstage
      annotation without a cataloger or component meta.
    default: "false"
  backstage_annotations:
    description: >
      Comma-separated annotation keys to read the service ID from, tried in
      order (first non-empty value across the file's Component entities wins).
      Defaults to both conventional spellings — PagerDuty's Backstage
      integration guide uses `pagerduty.com/service-id`; Lunar's meta uses
      `pagerduty/service-id`. Only used when backstage_discovery is "true".
    default: "pagerduty.com/service-id,pagerduty/service-id"
  backstage_catalog_paths:
    description: >
      Comma-separated catalog-info file paths to try in the checked-out repo
      (first match wins). Only used when backstage_discovery is "true".
    default: "catalog-info.yaml,catalog-info.yml"

secrets:
  PAGERDUTY_API_KEY:
    description: PagerDuty REST API key (read-only token with service and oncall scopes)

example_component_json: |
  {
    "oncall": {
      "source": {
        "tool": "pagerduty",
        "integration": "api"
      },
      "service": {
        "id": "PXXXXXX",
        "name": "Payment API",
        "status": "active"
      },
      "schedule": {
        "exists": true,
        "participants": 4,
        "rotation": "weekly"
      },
      "escalation": {
        "exists": true,
        "levels": 3,
        "policy_name": "Payment API Escalation"
      },
      "summary": {
        "has_oncall": true,
        "has_escalation": true,
        "min_participants": 4
      },
      "native": {
        "pagerduty": { "...full PagerDuty API response..." }
      }
    }
  }
