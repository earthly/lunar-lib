version: 0

name: argocd
description: Parses and validates ArgoCD Application, ApplicationSet, and AppProject manifests into a normalized .cd.gitops view
author: earthly

default_image: earthly/lunar-lib:argocd-bender-eng-1014-argocd

landing_page:
  display_name: "ArgoCD Collector"
  long_description: |
    Parses and validates ArgoCD Application, ApplicationSet, and AppProject
    manifests into a normalized .cd.gitops view, and pushes each app's
    deployment posture onto its source component (out-of-band) so GitOps
    guardrails work even when ArgoCD config lives in a separate repo.
  categories: ["ci-cd", "orchestration"]
  icon: "assets/argocd.svg"
  status: "beta"
  related:
    - slug: "gitops"
      type: "policy"
      reason: "Tool-agnostic GitOps checks over this collector's normalized data"
    - slug: "argocd"
      type: "policy"
      reason: "ArgoCD-specific checks: argoproj CRD validation and AppProject hygiene"
    - slug: "k8s"
      type: "collector"
      reason: "Parses the workload manifests ArgoCD Applications deploy"

collectors:
  - name: parse
    description: |
      Scans the cloned repository for ArgoCD custom resources (argoproj.io/*),
      validates each against the argoproj CRD schemas, and writes a normalized,
      tool-agnostic view of the GitOps configuration, including:
      - Applications and ApplicationSets (project, sync policy, destination, source)
      - AppProjects (allowed source repos and destinations)
      - Schema validity of each resource
      - Whether Argo Rollouts (canary/blue-green) are referenced
      Raw, ArgoCD-specific resource shapes are preserved under .cd.gitops.native.argocd.
      Works for both a dedicated GitOps repo (many Applications) and a component
      repo that ships its own ArgoCD files.
    mainBash: main.sh
    hook:
      type: code
    keywords: ["argocd", "gitops", "argo", "application", "appproject", "sync policy", "validation", "continuous delivery"]

  - name: link-push
    description: |
      Correlates each ArgoCD Application back to the source-code component it
      deploys (annotation → image → catalog/tag → repoURL, first match wins),
      then writes that application's deployment posture onto the source
      component's Component JSON using the out-of-band collect syntax
      (lunar collect --component <id> --sha <sha>). This makes the GitOps
      guardrails evaluate on the service repo even when the ArgoCD config lives
      in a separate GitOps repo. Applications that can't be resolved are skipped
      with a logged reason — no bogus cross-component writes.
    mainBash: link_push.sh
    hook:
      type: code
    keywords: ["argocd", "gitops", "cross-component", "out-of-band collect", "deployment posture", "correlation", "continuous delivery"]

inputs:
  find_command:
    description: Command to find candidate YAML files (must output one file path per line). Used by the parse sub-collector.
    default: "find . -type f \\( -name '*.yaml' -o -name '*.yml' \\)"
  correlate_by:
    description: Ordered, comma-separated correlation strategies for link-push (first match wins). Options annotation, image, tag, repoURL.
    default: "annotation,repoURL"
  component_annotation:
    description: Application annotation key that carries the source component id, for the annotation correlation strategy.
    default: "lunar.earthly.dev/component"
  image_registry_aliases:
    description: Comma-separated old=new registry-host aliases used to normalize image references for the image correlation strategy. Empty disables normalization.
    default: ""
  tag_key:
    description: Component meta/tag field that maps a component to its ArgoCD app name, for the tag correlation strategy.
    default: ""

secrets:
  GH_TOKEN:
    description: GitHub token used by link-push to resolve each source repo's default-branch HEAD sha (the out-of-band write target).

example_component_json: |
  {
    "cd": {
      "gitops": {
        "source": {
          "tool": "argocd",
          "integration": "code"
        },
        "applications": [
          {
            "name": "payment-api",
            "path": "apps/payment-api.yaml",
            "valid": true,
            "kind": "Application",
            "project": "platform",
            "component_annotation": "github.com/org/payment-api",
            "sync_policy": {
              "automated": true,
              "prune": true,
              "self_heal": true
            },
            "destination": {
              "server": "https://kubernetes.default.svc",
              "namespace": "payments"
            },
            "source_ref": {
              "repoURL": "https://github.com/org/gitops.git",
              "path": "payment-api",
              "targetRevision": "HEAD"
            },
            "images": ["myregistry.io/payment-api"],
            "canary": {
              "rollout": true
            }
          }
        ],
        "projects": [
          {
            "name": "platform",
            "path": "projects/platform.yaml",
            "valid": true,
            "is_default": false,
            "source_repos": ["https://github.com/org/gitops.git"],
            "destinations": [
              {"namespace": "payments", "server": "https://kubernetes.default.svc"}
            ]
          }
        ],
        "native": {
          "argocd": {
            "applications": [
              {"path": "apps/payment-api.yaml", "resource": {"apiVersion": "argoproj.io/v1alpha1", "kind": "Application", "spec": {}}}
            ],
            "projects": [
              {"path": "projects/platform.yaml", "resource": {"apiVersion": "argoproj.io/v1alpha1", "kind": "AppProject", "spec": {}}}
            ]
          }
        }
      }
    }
  }
