version: 0

name: argocd
description: Parses ArgoCD Application, ApplicationSet, and AppProject manifests into a normalized .cd.argocd view
author: earthly

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "ArgoCD Collector"
  long_description: |
    Parses ArgoCD Application, ApplicationSet, and AppProject manifests
    (argoproj.io CRDs) from GitOps or app repos into a normalized .cd.argocd
    view: sync policy, destinations, source repos, and projects. Pure file
    parsing — no ArgoCD API or secrets required.
  categories: ["ci-cd", "orchestration"]
  icon: "assets/argocd.svg"
  status: "beta"
  related:
    - slug: "argocd"
      type: "policy"
      reason: "Enforces ArgoCD GitOps best practices using this collector's data"
    - slug: "k8s"
      type: "collector"
      reason: "Parses the workload manifests ArgoCD Applications deploy"

collectors:
  - name: parse
    description: |
      Scans the cloned repository for ArgoCD custom resources (argoproj.io/*)
      and writes a normalized view of the GitOps configuration, including:
      - Applications and ApplicationSets (project, sync policy, destination, source)
      - AppProjects (allowed source repos and destinations)
      - Whether Argo Rollouts (canary/blue-green) are referenced
      - An optional golden-path template label, when configured
      Works for both a dedicated GitOps repo (many Applications) and a component
      repo that ships its own ArgoCD files.
    mainBash: main.sh
    hook:
      type: code
    keywords: ["argocd", "gitops", "argo", "application", "applicationset", "appproject", "sync policy", "continuous delivery"]

inputs:
  find_command:
    description: Command to find candidate YAML files (must output one file path per line)
    default: "find . -type f \\( -name '*.yaml' -o -name '*.yml' \\)"
  golden_path_label:
    description: Application label or annotation key marking the standard golden-path template; its value is written to .cd.argocd.applications[].template_label. No default — leave unset to skip golden-path extraction.

example_component_json: |
  {
    "cd": {
      "argocd": {
        "source": {
          "tool": "argocd",
          "integration": "code"
        },
        "applications": [
          {
            "name": "payment-api",
            "path": "apps/payment-api.yaml",
            "kind": "Application",
            "project": "platform",
            "template_label": "standard-v2",
            "component_annotation": "github.com/org/payment-api",
            "sync_policy": {
              "automated": true,
              "prune": true,
              "self_heal": true
            },
            "destination": {
              "server": "https://kubernetes.default.svc",
              "namespace": "payments"
            },
            "source_ref": {
              "repoURL": "https://github.com/org/gitops.git",
              "path": "payment-api",
              "targetRevision": "HEAD"
            },
            "images": ["myregistry.io/payment-api"],
            "canary": {
              "rollout": true
            }
          }
        ],
        "projects": [
          {
            "name": "platform",
            "is_default": false,
            "source_repos": ["https://github.com/org/gitops.git"],
            "destinations": [
              {"namespace": "payments", "server": "https://kubernetes.default.svc"}
            ]
          }
        ]
      }
    }
  }
