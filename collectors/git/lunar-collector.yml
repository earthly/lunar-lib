version: 0

name: git
description: Collect git-ecosystem configuration — pre-commit hooks today, with room for commitlint, gitattributes, gitmodules, signed-commits
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Git Collector"
  long_description: |
    Aggregates configuration data for git-ecosystem tooling that lives in
    the repository: pre-commit hook config today, with room to grow into
    commitlint, gitattributes, gitmodules, and signed-commits enforcement.
    Distinct from `.vcs.*` (hosted-VCS data like branch protection, PRs).
  categories: ["code-analysis"]
  icon: "assets/git.svg"
  status: "beta"
  related:
    - slug: "git"
      type: "policy"
      reason: "Enforces git-ecosystem configuration baselines using collected data"

collectors:
  - name: pre-commit
    description: |
      Scans the repository for a pre-commit configuration file at
      .pre-commit-config.yaml (or .yml variant). Parses the YAML to extract
      the configured `repos[]` (each with `repo`, `rev`, `hooks[]`), a
      flattened list of hook IDs, and the optional `ci.skip` list. Writes
      structured data to `.git.pre_commit`.
    mainBash: pre-commit.sh
    hook:
      type: code
    keywords: ["pre-commit", "git hooks", "lint", "secret scan", "code quality", "developer tooling"]

inputs:
  pre_commit_paths:
    description: Comma-separated list of pre-commit config file paths to check (first match wins)
    default: ".pre-commit-config.yaml,.pre-commit-config.yml"

example_component_json: |
  {
    "git": {
      "pre_commit": {
        "valid": true,
        "path": ".pre-commit-config.yaml",
        "repos": [
          {
            "repo": "https://github.com/pre-commit/pre-commit-hooks",
            "rev": "v4.5.0",
            "hooks": [
              {"id": "trailing-whitespace"},
              {"id": "end-of-file-fixer"}
            ]
          },
          {
            "repo": "https://github.com/gitleaks/gitleaks",
            "rev": "v8.18.0",
            "hooks": [
              {"id": "gitleaks"}
            ]
          }
        ],
        "hook_ids": ["trailing-whitespace", "end-of-file-fixer", "gitleaks"],
        "hook_count": 3,
        "repo_count": 2,
        "ci_skip": [],
        "all_pinned": true
      }
    }
  }
