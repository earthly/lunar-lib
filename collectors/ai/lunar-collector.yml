version: 0

name: ai
description: Collect tool-agnostic AI coding assistant usage data from repositories and CI pipelines
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "AI Collector"
  long_description: |
    Track tool-agnostic AI coding assistant usage across your organization.
    Collects agent instruction files, plans directories, and AI authorship
    annotations, and detects AI-assistant authorship fingerprints left in
    commit history. Part of the unified ai.* namespace.
  categories: ["code-analysis"]
  icon: "assets/ai.svg"
  status: "experimental"
  related:
    - slug: "ai"
      type: "policy"
      reason: "Enforces AI usage standards based on collected metadata"
    - slug: "claude"
      type: "collector"
      reason: "Claude-specific detection (code review, CI, prompts)"
    - slug: "coderabbit"
      type: "collector"
      reason: "CodeRabbit-specific detection (code review, config)"
    - slug: "codex"
      type: "collector"
      reason: "Codex-specific CI detection"
    - slug: "gemini"
      type: "collector"
      reason: "Gemini-specific CI detection"

collectors:
  - name: instruction-files
    description: |
      Discovers the vendor-neutral AGENTS.md instruction file across the repository. Records
      each file's path, line count, byte size, markdown section headings, and symlink status.
      Tool-specific instruction files (CLAUDE.md, CODEX.md, GEMINI.md) are discovered by
      their respective tool collectors.
    mainBash: instruction-files.sh
    hook:
      type: code
    keywords: ["agents.md", "ai instructions", "agent context", "coding assistant"]

  - name: plans-dir
    description: |
      Checks whether a dedicated plans directory exists for AI agent task planning.
      Tries candidate paths in order (first match wins). Records the directory path
      and file count.
    mainBash: plans-dir.sh
    hook:
      type: code
    keywords: ["ai plans", "agent planning", "task management"]

  - name: ai-authorship
    description: |
      Collects AI authorship annotation data from commits. Supports the Git AI standard
      (refs/notes/ai) for line-level tracking and git trailers (AI-model, AI-tokens) as
      a lightweight fallback. Records annotation coverage across commits in scope.
    mainBash: ai-authorship.sh
    hook:
      type: code
    keywords: ["ai authorship", "git ai", "code attribution", "ai tracking", "git notes"]

  - name: ai-fingerprints
    description: |
      Heuristically detects AI coding-assistant authorship fingerprints in commit history —
      the incidental markers tools leave behind. Scans each commit in scope for auto-inserted
      trailers and footers (e.g. "Co-Authored-By: Claude", "Generated with Claude Code",
      "Co-authored-by: Copilot", Cursor Agent, aider, Devin) and AI/bot author or committer
      identities, and records which tools and signals matched. Also records AI marker files
      present in the tree (CLAUDE.md, .cursor/, copilot-instructions) as informational context
      only — marker presence signals the repo uses a tool, not that any given commit is
      AI-authored. Pure detection: it makes no disclosure judgment (that's what ai-authorship
      is for). This is a heuristic signal, not a verdict: trailers can be stripped, and a
      co-author line means an assistant touched the commit, not that the code is low quality.
    mainBash: ai-fingerprints.sh
    hook:
      type: code
    keywords: ["ai detection", "llm code", "ai authored", "commit fingerprint", "ai authorship"]

inputs:
  md_find_command:
    description: Command to find AGENTS.md instruction files (must output one file path per line)
    default: "find . \\( -type f -o -type l \\) -name AGENTS.md -not -path '*/node_modules/*' -not -path '*/.git/*'"
  plans_dir_paths:
    description: Comma-separated list of candidate paths for the plans directory (first match wins)
    default: ".agents/plans,.ai/plans"
  annotation_prefix:
    description: Prefix for git trailer-based AI annotations
    default: "AI-"
  default_branch_window:
    description: Number of recent commits to scan on the default branch
    default: "50"
  ai_marker_paths:
    description: |
      Comma-separated list of AI marker files/directories to record as informational
      context (weak signal; marker presence is not counted as an AI-authored commit)
    default: "CLAUDE.md,.cursor,.aider.conf.yml,.github/copilot-instructions.md,GEMINI.md,.codeium"

example_component_json: |
  {
    "ai": {
      "instructions": {
        "root": {
          "exists": true,
          "filename": "AGENTS.md",
          "lines": 85,
          "bytes": 3200,
          "sections": ["Project Overview", "Architecture", "Build Commands", "Testing"]
        },
        "all": [
          {
            "path": "AGENTS.md",
            "dir": ".",
            "filename": "AGENTS.md",
            "lines": 85,
            "bytes": 3200,
            "sections": ["Project Overview", "Architecture", "Build Commands", "Testing"],
            "is_symlink": false,
            "symlink_target": null
          }
        ],
        "count": 1,
        "total_bytes": 3200,
        "source": { "tool": "find", "integration": "code" }
      },
      "plans_dir": {
        "exists": true,
        "path": ".agents/plans",
        "file_count": 3
      },
      "authorship": {
        "provider": "git-ai",
        "total_commits": 12,
        "annotated_commits": 8,
        "git_ai": {
          "notes_ref_exists": true,
          "commits_with_notes": 8
        }
      },
      "fingerprints": {
        "total_commits": 50,
        "fingerprinted_commits": 12,
        "tools": [
          { "tool": "claude-code", "commits": 8 },
          { "tool": "copilot", "commits": 3 },
          { "tool": "cursor", "commits": 1 }
        ],
        "commits": [
          {
            "sha": "a1b2c3d4",
            "tools": ["claude-code"],
            "signals": ["coauthor-trailer", "generated-footer"]
          }
        ],
        "markers": [
          { "path": "CLAUDE.md", "tool": "claude-code" },
          { "path": ".cursor", "tool": "cursor" }
        ],
        "source": { "integration": "code" }
      }
    }
  }
