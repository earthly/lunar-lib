version: 0

name: codex
description: Detect OpenAI Codex CLI usage and instruction files
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main
default_image_ci_collectors: native

landing_page:
  display_name: "Codex Collector"
  long_description: |
    Detects OpenAI Codex CLI invocations in CI pipelines. Records command
    strings, versions, and flags for policy-level analysis. Writes to
    ai.native.codex under the unified ai.* namespace.
  category: "code-analysis"
  icon: "assets/codex.svg"
  status: "experimental"
  related:
    - slug: "ai"
      type: "policy"
      reason: "Enforces AI usage standards based on collected data"

collectors:
  - name: instruction-file
    description: |
      Discovers CODEX.md instruction files across the repository. Records file path,
      line count, byte size, and whether it is a symlink to AGENTS.md. Writes to
      ai.native.codex.instruction_file and appends to ai.instructions.all[] for
      normalized cross-tool access.
    mainBash: instruction-file.sh
    hook:
      type: code
    keywords: ["codex.md", "instruction file", "agent context"]

  - name: cicd
    description: |
      Detects OpenAI Codex CLI invocations in CI pipelines. Records the command
      string and version for policy-level flag analysis (dangerous flags,
      sandbox mode, approval mode).
    mainBash: cicd.sh
    hook:
      type: ci-after-command
      binary:
        name: codex
    keywords: ["codex", "openai", "ai ci", "ci safety"]

example_component_json: |
  {
    "ai": {
      "instructions": {
        "all": [
          {
            "path": "CODEX.md",
            "dir": ".",
            "filename": "CODEX.md",
            "lines": 60,
            "bytes": 2400,
            "is_symlink": false,
            "symlink_target": null
          }
        ]
      },
      "native": {
        "codex": {
          "instruction_file": {
            "exists": true,
            "path": "CODEX.md",
            "lines": 60,
            "bytes": 2400,
            "is_symlink": false,
            "symlink_target": null
          },
          "cicd": {
            "cmds": [
              {
                "cmd": "codex exec --json 'review this PR'",
                "tool": "codex",
                "version": "0.1.0"
              }
            ]
          }
        }
      }
    }
  }
