version: 0

name: openapi
description: Detect and analyze OpenAPI and Swagger specification files
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "OpenAPI Collector"
  long_description: |
    Detect OpenAPI 3.x and Swagger 2.0 specification files in repositories.
    Parses each spec to extract endpoints, schemas, and metadata. Stores
    normalized REST data under `.api.rest` and the full raw spec under
    `.api.rest.native.openapi` or `.api.rest.native.swagger`. Supports YAML
    and JSON formats. Handles both naming conventions since OpenAPI is the
    evolution of the Swagger specification.
  categories: ["documentation"]
  icon: "assets/openapi.svg"
  status: "beta"
  related:
    - slug: "api-docs"
      type: "policy"
      reason: "Enforces API documentation standards based on collected spec metadata"

collectors:
  - name: openapi
    description: |
      Searches the repository for OpenAPI 3.x and Swagger 2.0 specification
      files by common filenames (openapi.yaml, openapi.yml, openapi.json,
      swagger.yaml, swagger.yml, swagger.json). For each spec found:
      - Writes spec file metadata to `.api.spec_files[]` (protocol-agnostic)
      - Extracts and normalizes endpoints to `.api.rest.endpoints[]`
      - Extracts and normalizes schemas to `.api.rest.schemas[]`
      - Stores the full raw spec as JSON under `.api.rest.native.openapi`
        (for OpenAPI 3.x) or `.api.rest.native.swagger` (for Swagger 2.0)
    hook:
      type: code
    keywords: ["openapi", "swagger", "api", "rest", "documentation", "spec"]

inputs:
  find_command:
    description: |
      Custom find command to locate OpenAPI/Swagger spec files. Default searches
      for common filenames recursively, excluding node_modules and vendor dirs.
    default: "find . -type f \\( -name 'openapi.yaml' -o -name 'openapi.yml' -o -name 'openapi.json' -o -name 'swagger.yaml' -o -name 'swagger.yml' -o -name 'swagger.json' \\) -not -path '*/node_modules/*' -not -path '*/vendor/*' -not -path '*/.git/*'"

example_component_json: |
  {
    "api": {
      "spec_files": [
        {
          "path": "api/openapi.yaml",
          "format": "openapi",
          "protocol": "rest",
          "valid": true,
          "version": "3.0.3",
          "operation_count": 12,
          "schema_count": 5
        },
        {
          "path": "legacy/swagger.json",
          "format": "swagger",
          "protocol": "rest",
          "valid": true,
          "version": "2.0",
          "operation_count": 8,
          "schema_count": 3
        }
      ],
      "rest": {
        "endpoints": [
          {
            "path": "/users",
            "method": "GET",
            "operation_id": "listUsers",
            "summary": "List all users",
            "tags": ["users"]
          },
          {
            "path": "/users",
            "method": "POST",
            "operation_id": "createUser",
            "summary": "Create a new user",
            "tags": ["users"],
            "request_body": "CreateUserRequest"
          },
          {
            "path": "/users/{id}",
            "method": "GET",
            "operation_id": "getUser",
            "summary": "Get user by ID",
            "tags": ["users"],
            "parameters": [
              { "name": "id", "in": "path", "type": "string", "required": true }
            ]
          },
          {
            "path": "/pets",
            "method": "GET",
            "operation_id": "listPets",
            "summary": "List all pets",
            "tags": ["pets"]
          }
        ],
        "schemas": [
          {
            "name": "User",
            "type": "object",
            "property_count": 4,
            "required_count": 2,
            "properties": ["id", "email", "name", "created_at"]
          },
          {
            "name": "CreateUserRequest",
            "type": "object",
            "property_count": 2,
            "required_count": 2,
            "properties": ["email", "name"]
          },
          {
            "name": "Pet",
            "type": "object",
            "property_count": 3,
            "required_count": 2,
            "properties": ["id", "name", "tag"]
          }
        ],
        "native": {
          "openapi": {
            "openapi": "3.0.3",
            "info": { "title": "User API", "version": "1.0.0" },
            "paths": { "/users": { "get": { "...": "full spec" } } }
          },
          "swagger": {
            "swagger": "2.0",
            "info": { "title": "Petstore", "version": "1.0.0" },
            "paths": { "/pets": { "get": { "...": "full spec" } } }
          }
        }
      }
    }
  }
