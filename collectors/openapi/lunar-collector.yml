version: 0

name: openapi
description: Detect and analyze OpenAPI and Swagger specification files
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "OpenAPI Collector"
  long_description: |
    Detect OpenAPI and Swagger spec files in repositories (any version —
    Swagger 1.x/2.0, OpenAPI 3.0/3.1+). Writes spec metadata to
    `.api.spec_files[]` and full raw specs to `.api.native.openapi`.
    Handles both naming conventions in YAML and JSON formats.
  categories: ["documentation"]
  icon: "assets/openapi.svg"
  status: "beta"
  related:
    - slug: "api-docs"
      type: "policy"
      reason: "Enforces API documentation standards based on collected spec metadata"

collectors:
  - name: openapi
    description: |
      Searches the repository for OpenAPI and Swagger specification files
      (any version) by common filenames (openapi.yaml, openapi.yml,
      openapi.json, swagger.yaml, swagger.yml, swagger.json). For each
      spec found:
      - Writes spec file metadata to `.api.spec_files[]` (protocol-agnostic)
      - Records the declared version (e.g., "2.0", "3.0.3", "3.1.0") so
        policies can enforce version requirements
      - Sets `has_docs: true` — OpenAPI/Swagger specs inherently contain
        human-readable documentation (descriptions, summaries, examples)
      - Stores the full raw spec as JSON under `.api.native.openapi`
        (all versions share one key — same spec lineage)
    hook:
      type: code
    keywords: ["openapi", "swagger", "api", "rest", "documentation", "spec"]

inputs:
  find_command:
    description: |
      Custom find command to locate OpenAPI/Swagger spec files. Default searches
      for common filenames recursively, excluding node_modules and vendor dirs.
    default: "find . -type f \\( -name 'openapi.yaml' -o -name 'openapi.yml' -o -name 'openapi.json' -o -name 'swagger.yaml' -o -name 'swagger.yml' -o -name 'swagger.json' \\) -not -path '*/node_modules/*' -not -path '*/vendor/*' -not -path '*/.git/*'"

example_component_json: |
  {
    "api": {
      "spec_files": [
        {
          "path": "api/openapi.yaml",
          "format": "openapi",
          "protocol": "rest",
          "valid": true,
          "version": "3.0.3",
          "operation_count": 12,
          "schema_count": 5,
          "has_docs": true
        },
        {
          "path": "legacy/swagger.json",
          "format": "swagger",
          "protocol": "rest",
          "valid": true,
          "version": "2.0",
          "operation_count": 8,
          "schema_count": 3,
          "has_docs": true
        }
      ],
      "native": {
        "openapi": {
          "api/openapi.yaml": {
            "openapi": "3.0.3",
            "info": { "title": "User API", "version": "1.0.0" },
            "paths": { "/users": { "get": { "...": "full spec" } } }
          },
          "legacy/swagger.json": {
            "swagger": "2.0",
            "info": { "title": "Petstore", "version": "1.0.0" },
            "paths": { "/pets": { "get": { "...": "full spec" } } }
          }
        }
      }
    }
  }
