version: 0

name: endoflife
description: Resolve detected runtime versions against endoflife.date for EOL and active-support status

author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "endoflife.date Collector"
  long_description: |
    Reads `.lang.<language>.version` populated by per-language
    collectors (golang, nodejs, python, ruby, java, dotnet, php, …) and
    resolves each against https://endoflife.date. Writes EOL/support
    data to `.lang.<language>.eol` so policies can flag services pinned
    to EOL or out-of-support runtimes.
  categories: ["languages"]
  icon: "assets/endoflife.svg"
  status: "beta"
  related:
    - slug: "endoflife"
      type: "policy"
      reason: "Enforces runtime EOL and active-support guardrails using this collector's data"

collectors:
  - name: runtime
    description: |
      Reads the persisted component JSON via `lunar component get-json
      $LUNAR_COMPONENT_ID`, iterates the configured `language_products`
      map, and for each entry where `.lang.<language>.version` is
      populated by an upstream language collector, looks up the matching
      cycle on `https://endoflife.date/api/<product>.json` (e.g. Go
      `1.21.5` → cycle `1.21`). Writes the normalized result to
      `.lang.<language>.eol` with `cycle`, `detected_version`, `is_eol`,
      `is_supported`, `eol_date`, `support_until`, `lts`,
      `latest_in_cycle`, and `source`. Stores the raw matched cycle
      object under `.lang.<language>.native.endoflife`. Runs on the
      `code` hook so data refreshes on every push without a separate
      cron schedule. Adding coverage for a new language plugin requires
      no code changes here — append the language and its endoflife.date
      product slug to the `language_products` input.
    mainBash: runtime.sh
    hook:
      type: code
    keywords: ["endoflife", "eol", "runtime", "lifecycle", "support", "node", "python", "ruby", "go", "java", "dotnet", "php"]

inputs:
  endoflife_base_url:
    description: >
      endoflife.date API base URL. Override only if you proxy/mirror the
      API internally.
    default: "https://endoflife.date/api"
  language_products:
    description: >
      Map from `.lang.<language>` key to endoflife.date product slug.
      For each entry, the collector reads `.lang.<language>.version`
      from the component's persisted JSON and queries
      `<endoflife_base_url>/<product>.json`. Add an entry here to cover
      a new language plugin without touching this collector's code.
      Java has no generic `java` product on endoflife.date — choose a
      JDK distribution slug (`eclipse-temurin`, `amazon-corretto`,
      `azul-zulu`, `microsoft-build-of-openjdk`, `redhat-build-of-openjdk`,
      `oracle-jdk`, `sapmachine`, `bellsoft-liberica`, `ibm-semeru-runtime`).
      `dotnet` covers .NET 5+; use `dotnetfx` for legacy .NET Framework.
    default:
      go: "go"
      nodejs: "nodejs"
      python: "python"
      ruby: "ruby"
      java: "eclipse-temurin"
      dotnet: "dotnet"
      php: "php"

# No secrets — endoflife.date is a public API.

example_component_json: |
  {
    "lang": {
      "go": {
        "version": "1.21",
        "eol": {
          "source": {
            "tool": "endoflife.date",
            "integration": "api",
            "collected_at": "2026-04-27T12:00:00Z"
          },
          "product": "go",
          "cycle": "1.21",
          "detected_version": "1.21",
          "is_eol": true,
          "is_supported": false,
          "eol_date": "2024-08-13",
          "support_until": null,
          "lts": false,
          "latest_in_cycle": "1.21.13"
        },
        "native": {
          "endoflife": {
            "product": "go",
            "cycle": {
              "cycle": "1.21",
              "releaseDate": "2023-08-08",
              "eol": "2024-08-13",
              "latest": "1.21.13",
              "latestReleaseDate": "2024-08-06",
              "lts": false
            }
          }
        }
      },
      "nodejs": {
        "version": "20.11.1",
        "eol": {
          "source": {
            "tool": "endoflife.date",
            "integration": "api",
            "collected_at": "2026-04-27T12:00:00Z"
          },
          "product": "nodejs",
          "cycle": "20",
          "detected_version": "20.11.1",
          "is_eol": false,
          "is_supported": false,
          "eol_date": "2026-04-30",
          "support_until": "2024-10-22",
          "lts": true,
          "latest_in_cycle": "20.19.0"
        },
        "native": {
          "endoflife": {
            "product": "nodejs",
            "cycle": {
              "cycle": "20",
              "releaseDate": "2023-04-18",
              "lts": "2023-10-24",
              "eol": "2026-04-30",
              "latest": "20.19.0",
              "support": "2024-10-22"
            }
          }
        }
      }
    }
  }
