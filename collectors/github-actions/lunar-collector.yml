version: 0

name: github-actions
description: Parses GitHub Actions workflows, runs actionlint, detects version pinning, and analyzes security misconfigurations
author: support@earthly.dev

default_image: earthly/lunar-lib:github-actions-main

landing_page:
  display_name: "GitHub Actions Collector"
  long_description: |
    Parses GitHub Actions workflows for lint errors (actionlint), version pinning
    status, and security misconfigurations. Detects template injection, dangerous
    checkouts, missing permissions, credential persistence, and secrets inheritance.
  category: "ci-cd"
  icon: "assets/github-actions.svg"
  status: "beta"
  keywords: ["github-actions", "actionlint", "ci", "workflow", "pinning", "supply-chain", "security", "injection", "permissions"]

collectors:
  - name: workflows
    description: |
      Parses all GitHub Actions workflow files in .github/workflows/,
      runs actionlint for lint errors, and classifies action version
      pinning (SHA, tag, branch, unpinned) for supply-chain hygiene.
    mainBash: workflows.sh
    hook:
      type: code
    keywords: ["github-actions", "actionlint", "workflows", "pinning", "lint"]

  - name: security
    description: |
      Statically analyzes all GitHub Actions workflow files in .github/workflows/
      for security misconfigurations: injectable expressions in run: blocks and
      actions/github-script script: fields, dangerous pull_request_target checkouts,
      missing or write-all permissions, checkout credential persistence, and
      secrets inheritance in reusable workflow calls.
    mainBash: security.sh
    hook:
      type: code
    keywords: ["github-actions", "security", "injection", "permissions", "checkout", "secrets"]

example_component_json: |
  {
    "ci": {
      "lint": {
        "source": { "tool": "actionlint", "version": "1.7.7", "integration": "code" },
        "errors": [
          {
            "file": ".github/workflows/ci.yml",
            "line": 42,
            "column": 9,
            "message": "property \"unknown_field\" is not defined",
            "rule": "syntax-check"
          }
        ],
        "error_count": 1,
        "warning_count": 0
      },
      "dependencies": {
        "source": { "tool": "github-actions", "version": "0.1.0", "integration": "code" },
        "total": 3,
        "pinned": 2,
        "unpinned": 1,
        "items": [
          { "name": "actions/checkout", "ref": "abc123def456", "pinning": "sha", "party": "1st" },
          { "name": "docker/build-push-action", "ref": "v5.1.0", "pinning": "tag", "party": "3rd" },
          { "name": "docker/login-action", "ref": "main", "pinning": "branch", "party": "3rd" }
        ],
        "third_party_unpinned": ["docker/login-action@main"]
      },
      "native": {
        "github_actions": {
          "source": { "tool": "github-actions", "version": "0.1.0", "integration": "code" },
          "workflows": [
            {
              "file": ".github/workflows/ci.yml",
              "name": "CI",
              "triggers": ["push", "pull_request"],
              "jobs": ["build", "test", "lint"],
              "permissions": { "contents": "read" },
              "actions": [
                { "uses": "actions/checkout@abc123def456", "pinning": "sha", "party": "1st" },
                { "uses": "docker/build-push-action@v5.1.0", "pinning": "tag", "party": "3rd" },
                { "uses": "docker/login-action@main", "pinning": "branch", "party": "3rd" }
              ]
            }
          ],
          "security": {
            "injectable_expressions": [
              {
                "file": ".github/workflows/ci.yml",
                "job": "build",
                "step": "Run tests",
                "expression": "github.event.pull_request.title",
                "context": "run"
              },
              {
                "file": ".github/workflows/ci.yml",
                "job": "build",
                "step": "Post comment",
                "expression": "github.event.issue.body",
                "context": "script"
              }
            ],
            "dangerous_checkouts": [
              {
                "file": ".github/workflows/pr-target.yml",
                "trigger": "pull_request_target",
                "job": "build",
                "step": "Checkout",
                "checkout_ref": "github.event.pull_request.head.sha"
              }
            ],
            "permissions_missing": [
              {
                "file": ".github/workflows/ci.yml"
              }
            ],
            "write_all_permissions": [
              {
                "file": ".github/workflows/deploy.yml",
                "level": "workflow",
                "value": "write-all"
              }
            ],
            "persist_credentials": [
              {
                "file": ".github/workflows/ci.yml",
                "job": "build",
                "step": "Checkout"
              }
            ],
            "secrets_inherit": [
              {
                "file": ".github/workflows/ci.yml",
                "job": "deploy",
                "called_workflow": "./.github/workflows/reusable.yml"
              }
            ]
          }
        }
      }
    }
  }
