version: 0

name: argocd-deployment-gate
description: Pulls a service's ArgoCD deployment posture from a central GitOps component onto the service's own Component JSON so guardrails gate at PR time

author: earthly

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "ArgoCD Deployment Gate Collector"
  long_description: |
    Runs on a service repo and pulls that service's ArgoCD deployment posture
    from a central GitOps component (via a catalog-info mapping) onto its own
    component at the collected sha, so policies gate at PR time. Do not also
    target the service with argocd-deployment-tracking.
  categories: ["ci-cd", "orchestration"]
  icon: "assets/argocd.svg"
  status: "experimental"
  related:
    - slug: "argocd"
      type: "collector"
      reason: "Validates the ArgoCD resources in the GitOps repo this collector pulls from"
    - slug: "argocd-deployment-tracking"
      type: "collector"
      reason: "The push counterpart — use one or the other per service, not both"
    - slug: "gitops"
      type: "policy"
      reason: "Gates the pulled deployment posture at PR time"

collectors:
  - name: gate
    description: |
      Runs on a SERVICE repo and materializes that service's ArgoCD deployment
      posture onto its own Component JSON by reading a predeclared
      app -> Application mapping from catalog-info.yaml (gitops-component +
      argocd-application annotations) and pulling the matching Application(s)
      from the GitOps component via `lunar component get-json`. Because it runs
      in the service's own collection it lands on the sha being collected
      (including a PR head sha), so the gitops/argocd policies gate it at PR
      time. Skips when no mapping is present.
    mainBash: link_pull.sh
    hook:
      type: code
    keywords: ["argocd", "gitops", "cross-component", "get-json", "pull", "pr enforcement", "deployment posture", "catalog-info", "continuous delivery"]

inputs:
  catalog_info_paths:
    description: Comma-separated catalog-info file paths to read the predeclared mapping from (first match wins).
    default: "catalog-info.yaml,catalog-info.yml"
  gitops_component_annotation:
    description: catalog-info annotation key carrying the GitOps component id to pull from.
    default: "lunar.earthly.dev/gitops-component"
  application_annotation:
    description: catalog-info annotation key carrying the ArgoCD Application name(s) (comma-separated) to pull. Empty pulls every app the GitOps component holds.
    default: "lunar.earthly.dev/argocd-application"
  gitops_component:
    description: Direct override of the GitOps component id (bypasses catalog-info). Empty uses the catalog-info annotation.
    default: ""
  application:
    description: Direct override of the ArgoCD Application name(s), comma-separated (bypasses catalog-info). Empty uses the catalog-info annotation.
    default: ""

example_component_json: |
  {
    "cd": {
      "gitops": {
        "source": {
          "tool": "argocd",
          "integration": "pull",
          "pulled_from": "github.com/org/gitops"
        },
        "applications": [
          {
            "name": "payment-api",
            "path": "apps/payment-api.yaml",
            "valid": true,
            "kind": "Application",
            "project": "platform",
            "sync_policy": {
              "automated": true,
              "prune": true,
              "self_heal": true
            },
            "destination": {
              "server": "https://kubernetes.default.svc",
              "namespace": "payments"
            },
            "source_ref": {
              "repoURL": "https://github.com/org/gitops.git",
              "path": "payment-api",
              "targetRevision": "HEAD"
            },
            "images": ["myregistry.io/payment-api"]
          }
        ]
      }
    }
  }
