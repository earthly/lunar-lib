version: 0

name: repo
description: Collect standard repository metadata including README, CODEOWNERS, and common configuration files
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Repository Collector"
  long_description: |
    Aggregates repository metadata by scanning for README files, CODEOWNERS ownership
    rules, and common configuration files (.gitignore, LICENSE, SECURITY.md,
    CONTRIBUTING.md, .editorconfig). Consolidates readme and codeowners collectors
    into a single plugin.
  categories: ["documentation", "vcs"]
  icon: "assets/repo.svg"
  status: "beta"
  related:
    - slug: "repo"
      type: "policy"
      reason: "Enforces repository hygiene standards based on collected metadata"

default_image_non_ci_collectors: earthly/lunar-lib:base-main

collectors:
  - name: readme
    description: |
      Scans repository root for README files (README.md, README, README.txt, README.rst)
      in order, taking the first match. Extracts line count and section headings by
      parsing markdown headers. Writes to `.repo.readme`.
    mainBash: readme.sh
    hook:
      type: code
    keywords: ["readme", "documentation", "repository docs", "markdown"]

  - name: codeowners
    description: |
      Scans the repository for a CODEOWNERS file in standard locations
      (CODEOWNERS, .github/CODEOWNERS, docs/CODEOWNERS) and parses its contents.
      Extracts ownership rules, validates syntax, classifies owners as teams vs
      individuals, and detects catch-all rules. Writes to `.ownership.codeowners`.
    mainBash: codeowners.sh
    hook:
      type: code
    keywords: ["codeowners", "code ownership", "repository ownership", "team ownership"]

  - name: repo-files
    description: |
      Scans the repository for standard configuration and documentation files:
      .gitignore, LICENSE (multiple variants), SECURITY.md, CONTRIBUTING.md,
      and .editorconfig. Writes boolean presence flags to `.repo.files`.
    mainBash: repo-files.sh
    hook:
      type: code
    keywords: ["gitignore", "license", "security", "contributing", "editorconfig", "repository files"]

inputs:
  readme_paths:
    description: Comma-separated list of README paths to check (first match wins)
    default: "README.md,README,README.txt,README.rst"
  codeowners_paths:
    description: Comma-separated list of CODEOWNERS file paths to check (first match wins)
    default: "CODEOWNERS,.github/CODEOWNERS,docs/CODEOWNERS"

example_component_json: |
  {
    "repo": {
      "readme": {
        "exists": true,
        "path": "README.md",
        "lines": 150,
        "sections": [
          "Installation",
          "Usage",
          "API",
          "Contributing",
          "License"
        ]
      },
      "files": {
        "gitignore": true,
        "license": true,
        "security_md": true,
        "contributing": true,
        "editorconfig": false
      }
    },
    "ownership": {
      "codeowners": {
        "exists": true,
        "valid": true,
        "path": ".github/CODEOWNERS",
        "errors": [],
        "owners": ["@acme/backend-team", "@acme/platform-team", "@jdoe"],
        "team_owners": ["@acme/backend-team", "@acme/platform-team"],
        "individual_owners": ["@jdoe"],
        "rules": [
          {
            "pattern": "*",
            "owners": ["@acme/platform-team"],
            "owner_count": 1,
            "line": 3
          },
          {
            "pattern": "/src/backend/",
            "owners": ["@acme/backend-team", "@jdoe"],
            "owner_count": 2,
            "line": 6
          }
        ]
      }
    }
  }
