version: 0

name: trivy
description: |
  Scan source code dependencies for known vulnerabilities using Trivy.
author: support@earthly.dev

default_image: earthly/lunar-lib:trivy-v1.5.2
default_image_ci_collectors: native

landing_page:
  display_name: "Trivy Vulnerability Scanner Collector"
  long_description: |
    Automatically scans repository dependencies for known CVEs using Trivy.
    Supports Go, Node.js, Python, Java, Rust, and many other ecosystems.
    Writes normalized vulnerability data to .sca for use with the SCA policy.
    No secrets or vendor accounts required.
  categories: ["security"]
  icon: "assets/trivy.svg"
  status: "beta"
  related:
    - slug: "sca"
      type: "policy"
      reason: "Enforces SCA vulnerability thresholds"

collectors:
  - name: auto
    description: |
      Auto-scans the repository filesystem for dependency vulnerabilities
      using Trivy. Writes normalized findings to .sca with severity counts,
      CVE IDs, affected packages, and fix versions.
    mainBash: auto.sh
    hook:
      type: code
    keywords: ["trivy", "vulnerability", "cve", "sca", "dependency scanning", "auto"]

  - name: cicd
    description: |
      Detects Trivy executions in CI pipelines. Captures the command,
      version, and input arguments for audit and compliance tracking.
    mainBash: cicd.sh
    hook:
      type: ci-after-command
      binary:
        name: trivy
    keywords: ["trivy", "ci", "cicd", "command detection", "audit"]

  - name: rescan
    description: |
      Re-runs the dependency (SCA) scan on a schedule and overwrites .sca so
      the SCA policy re-evaluates against CVEs published since the commit was
      first scanned — closing the gap where a branch passes at scan time but a
      dependency picks up a new CVE later. Runs the same scan as the `auto`
      collector (the sibling auto.sh) in the Trivy collector image.
    mainBash: auto.sh
    # Cron-only sub-collector: set runs_on here, on the sub-collector. The cron
    # self-default ([default-branch]) blocks runs_on inheritance from a
    # consumer's `uses:` line, so the import line cannot toggle this — the value
    # must live in the manifest. Default-branch only (cheap: one re-scan per
    # component per tick); per-PR fan-out is opt-in (see README).
    runs_on: [default-branch]
    hook:
      type: cron
      schedule: "0 2 * * *"  # Human-readable: daily at 02:00 UTC (>= 10-min collector floor)
      clone-code: true
    keywords: ["sca", "cve", "trivy", "dependency scanning", "cron rescan", "vulnerability"]

example_component_json: |
  {
    "sca": {
      "source": {
        "tool": "trivy",
        "version": "0.69.3",
        "integration": "code"
      },
      "vulnerabilities": {
        "critical": 0,
        "high": 2,
        "medium": 5,
        "low": 3,
        "total": 10
      },
      "findings": [
        {
          "severity": "high",
          "package": "golang.org/x/net",
          "version": "0.7.0",
          "ecosystem": "gomod",
          "cve": "CVE-2023-44487",
          "title": "HTTP/2 Rapid Reset Attack",
          "fix_version": "0.17.0",
          "fixable": true
        }
      ],
      "summary": {
        "has_critical": false,
        "has_high": true,
        "all_fixable": true
      },
      "native": {
        "trivy": {
          "cicd": {
            "cmds": [
              {"cmd": "trivy fs --scanners vuln .", "version": "0.69.3"}
            ]
          },
          "results": {
            "SchemaVersion": 2,
            "ArtifactName": ".",
            "ArtifactType": "filesystem",
            "Results": [
              {
                "Target": "go.sum",
                "Class": "lang-pkgs",
                "Type": "gomod",
                "Vulnerabilities": [
                  {
                    "VulnerabilityID": "CVE-2023-44487",
                    "PkgName": "golang.org/x/net",
                    "InstalledVersion": "0.7.0",
                    "FixedVersion": "0.17.0",
                    "Severity": "HIGH",
                    "Title": "HTTP/2 Rapid Reset Attack",
                    "Description": "The HTTP/2 protocol allows a denial of service...",
                    "References": ["https://nvd.nist.gov/vuln/detail/CVE-2023-44487"],
                    "CVSS": {"nvd": {"V3Score": 7.5}},
                    "CweIDs": ["CWE-400"],
                    "PublishedDate": "2023-10-10T14:15:10Z"
                  }
                ]
              }
            ]
          }
        }
      }
    }
  }
