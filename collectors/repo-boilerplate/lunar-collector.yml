version: 0

name: repo-boilerplate
description: Collect standard repository boilerplate metadata including README, CODEOWNERS, and common configuration files
author: earthly
default_image: earthly/lunar-lib:base-v1.10.1

landing_page:
  display_name: "Repo Boilerplate Collector"
  long_description: |
    Aggregates repository boilerplate metadata by scanning for README files, CODEOWNERS
    ownership rules, and common configuration files (.gitignore, LICENSE, SECURITY.md,
    CONTRIBUTING.md, .editorconfig). Consolidates readme and codeowners collectors
    into a single plugin.
  categories: ["documentation", "vcs"]
  icon: "assets/repo-boilerplate.svg"
  status: "beta"
  related:
    - slug: "repo-boilerplate"
      type: "policy"
      reason: "Enforces repository boilerplate standards based on collected metadata"

default_image_non_ci_collectors: earthly/lunar-lib:base-v1.10.1

collectors:
  - name: readme
    description: |
      Scans repository root for README files (README.md, README, README.txt, README.rst)
      in order, taking the first match. Extracts line count and section headings by
      parsing markdown headers. Writes to `.repo.readme`.
    mainBash: readme.sh
    hook:
      type: code
    keywords: ["readme", "documentation", "repository docs", "markdown"]

  - name: codeowners
    description: |
      Scans the repository for a CODEOWNERS file in standard locations
      (CODEOWNERS, .github/CODEOWNERS, docs/CODEOWNERS) and parses its contents.
      Extracts ownership rules, validates syntax, classifies owners as teams vs
      individuals, and detects catch-all rules. In a monorepo, where each
      component is a subdirectory but the CODEOWNERS file lives once at the
      repository root, it falls back to that global file (configurable via
      `codeowners_scope`). Writes to `.ownership.codeowners`.
    mainBash: codeowners.sh
    hook:
      type: code
    keywords: ["codeowners", "code ownership", "repository ownership", "team ownership"]

  - name: gitignore
    description: |
      Detects .gitignore in the repository root. Extracts line count and
      number of active patterns (non-comment, non-empty lines).
      Writes to `.repo.gitignore`.
    mainBash: gitignore.sh
    hook:
      type: code
    keywords: ["gitignore", "ignore patterns", "repository hygiene"]

  - name: license
    description: |
      Detects LICENSE files (LICENSE, LICENSE.md, LICENSE.txt, LICENCE and
      variants). Attempts to identify the SPDX license type from file content.
      Writes to `.repo.license`.
    mainBash: license.sh
    hook:
      type: code
    keywords: ["license", "open source", "spdx", "repository hygiene"]

  - name: security
    description: |
      Detects SECURITY.md in the repository root or .github/ directory.
      Extracts line count and section headings. Writes to `.repo.security`.
    mainBash: security.sh
    hook:
      type: code
    keywords: ["security", "vulnerability disclosure", "security policy"]

  - name: contributing
    description: |
      Detects CONTRIBUTING.md in the repository root or .github/ directory.
      Extracts line count and section headings. Writes to `.repo.contributing`.
    mainBash: contributing.sh
    hook:
      type: code
    keywords: ["contributing", "contribution guide", "developer onboarding"]

  - name: editorconfig
    description: |
      Detects .editorconfig in the repository root. Extracts the number of
      section blocks defined. Writes to `.repo.editorconfig`.
    mainBash: editorconfig.sh
    hook:
      type: code
    keywords: ["editorconfig", "code style", "editor settings"]

  - name: changelog
    description: |
      Detects a CHANGELOG file in the repository root. Checks common variants
      (CHANGELOG.md, CHANGELOG, CHANGES.md, HISTORY.md, RELEASES.md) configurable
      via the changelog_paths input. Extracts line count and section headings
      (typically version entries in Keep-a-Changelog style). Writes to
      `.repo.changelog`.
    mainBash: changelog.sh
    hook:
      type: code
    keywords: ["changelog", "release notes", "version history", "keep a changelog"]

inputs:
  readme_paths:
    description: Comma-separated list of README paths to check (first match wins)
    default: "README.md,README,README.txt,README.rst"
  codeowners_paths:
    description: Comma-separated list of CODEOWNERS file paths to check (first match wins)
    default: "CODEOWNERS,.github/CODEOWNERS,docs/CODEOWNERS"
  codeowners_scope:
    description: |
      Where to look for the CODEOWNERS file. "auto" (default) checks the
      component's own directory first, then falls back to the repository root,
      so a single global CODEOWNERS at the repo root is used for every component
      in a monorepo (its subdirectory has no CODEOWNERS of its own). "repo-root"
      only uses the global repo-root file; "component-dir" only uses the
      component's own directory (the pre-monorepo behavior).
    default: "auto"
  changelog_paths:
    description: Comma-separated list of CHANGELOG paths to check (first match wins)
    default: "CHANGELOG.md,CHANGELOG,CHANGES.md,HISTORY.md,RELEASES.md"

example_component_json: |
  {
    "repo": {
      "readme": {
        "exists": true,
        "path": "README.md",
        "lines": 150,
        "sections": [
          "Installation",
          "Usage",
          "API",
          "Contributing",
          "License"
        ]
      },
      "gitignore": {
        "exists": true,
        "path": ".gitignore",
        "lines": 42,
        "patterns": 35
      },
      "license": {
        "exists": true,
        "path": "LICENSE",
        "spdx_id": "MIT"
      },
      "security": {
        "exists": true,
        "path": "SECURITY.md",
        "lines": 28,
        "sections": [
          "Reporting a Vulnerability",
          "Response Timeline",
          "Scope"
        ]
      },
      "contributing": {
        "exists": true,
        "path": "CONTRIBUTING.md",
        "lines": 55,
        "sections": [
          "Getting Started",
          "Development Setup",
          "Pull Requests",
          "Code of Conduct"
        ]
      },
      "editorconfig": {
        "exists": true,
        "path": ".editorconfig",
        "sections": 4
      },
      "changelog": {
        "exists": true,
        "path": "CHANGELOG.md",
        "lines": 87,
        "sections": [
          "[1.2.0] - 2026-05-01",
          "[1.1.0] - 2026-04-15",
          "[1.0.0] - 2026-03-01"
        ]
      }
    },
    "ownership": {
      "codeowners": {
        "exists": true,
        "valid": true,
        "path": ".github/CODEOWNERS",
        "scope": "repo",
        "errors": [],
        "owners": ["@acme/backend-team", "@acme/platform-team", "@jdoe"],
        "team_owners": ["@acme/backend-team", "@acme/platform-team"],
        "individual_owners": ["@jdoe"],
        "rules": [
          {
            "pattern": "*",
            "owners": ["@acme/platform-team"],
            "owner_count": 1,
            "line": 3
          },
          {
            "pattern": "/src/backend/",
            "owners": ["@acme/backend-team", "@jdoe"],
            "owner_count": 2,
            "line": 6
          }
        ]
      }
    }
  }
