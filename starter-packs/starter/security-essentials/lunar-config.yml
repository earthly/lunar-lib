version: 0

# ============================================================================
# Starter Pack: Security Essentials
# ============================================================================

collectors:
  # --- Language collectors (only trigger when language is detected) ---
  - uses: github://earthly/lunar-lib/collectors/golang@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/java@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/nodejs@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/python@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/rust@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/php@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/cpp@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/dotnet@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/html@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/shell@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/ruby@v1.1.0

  # --- Security scanners ---
  - uses: github://earthly/lunar-lib/collectors/gitleaks@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/trivy@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/syft@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/semgrep@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/snyk@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/codeql@v1.1.0

  # --- Infrastructure context ---
  - uses: github://earthly/lunar-lib/collectors/docker@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/github@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/github-actions@v1.1.0

policies:
  # --- Secret detection ---
  - uses: github://earthly/lunar-lib/policies/secrets@v1.1.0
    enforcement: block-pr
    include:
      - no-hardcoded-secrets

  - uses: github://earthly/lunar-lib/policies/secrets@v1.1.0
    enforcement: score
    include:
      - executed

  # --- SCA ---
  - uses: github://earthly/lunar-lib/policies/sca@v1.1.0
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "critical"

  # --- SAST ---
  - uses: github://earthly/lunar-lib/policies/sast@v1.1.0
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "high"

  # --- Container scanning ---
  - uses: github://earthly/lunar-lib/policies/container-scan@v1.1.0
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "critical"

  # --- GitHub Actions security ---
  - uses: github://earthly/lunar-lib/policies/github-actions@v1.1.0
    enforcement: score
    include:
      - no-script-injection
      - no-dangerous-trigger-checkout
      - permissions-declared
      - no-write-all-permissions
      - checkout-no-persist-credentials
      - no-secrets-inherit

  # --- Dockerfile ---
  - uses: github://earthly/lunar-lib/policies/container@v1.1.0
    enforcement: score
    include:
      - no-latest
      - user
      - healthcheck
      - stable-tags

  # --- SBOM ---
  - uses: github://earthly/lunar-lib/policies/sbom@v1.1.0
    enforcement: score
    include:
      - sbom-exists
      - has-licenses

  # --- Branch protection ---
  - uses: github://earthly/lunar-lib/policies/vcs@v1.1.0
    enforcement: score
    include:
      - branch-protection-enabled
      - require-pull-request
      - minimum-approvals
      - require-codeowner-review
      - disallow-force-push
