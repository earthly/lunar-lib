version: 0

# ============================================================================
# Starter Pack: Security Essentials
# ============================================================================

collectors:
  # --- Language collectors (only trigger when language is detected) ---
  - uses: github://earthly/lunar-lib/collectors/golang@main
  - uses: github://earthly/lunar-lib/collectors/java@main
  - uses: github://earthly/lunar-lib/collectors/nodejs@main
  - uses: github://earthly/lunar-lib/collectors/python@main
  - uses: github://earthly/lunar-lib/collectors/rust@main
  - uses: github://earthly/lunar-lib/collectors/php@main
  - uses: github://earthly/lunar-lib/collectors/cpp@main
  - uses: github://earthly/lunar-lib/collectors/dotnet@main
  - uses: github://earthly/lunar-lib/collectors/html@main
  - uses: github://earthly/lunar-lib/collectors/shell@main
  - uses: github://earthly/lunar-lib/collectors/ruby@main

  # --- Security scanners ---
  - uses: github://earthly/lunar-lib/collectors/gitleaks@main
  - uses: github://earthly/lunar-lib/collectors/trivy@main
  - uses: github://earthly/lunar-lib/collectors/syft@main
  - uses: github://earthly/lunar-lib/collectors/semgrep@main

  # --- Infrastructure context ---
  - uses: github://earthly/lunar-lib/collectors/docker@main
  - uses: github://earthly/lunar-lib/collectors/github@main
  - uses: github://earthly/lunar-lib/collectors/github-actions@main

policies:
  # --- Secret detection ---
  - uses: github://earthly/lunar-lib/policies/secrets@main
    enforcement: block-pr
    include:
      - no-hardcoded-secrets

  - uses: github://earthly/lunar-lib/policies/secrets@main
    enforcement: score
    include:
      - executed

  # --- SCA ---
  - uses: github://earthly/lunar-lib/policies/sca@main
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "critical"

  # --- SAST ---
  - uses: github://earthly/lunar-lib/policies/sast@main
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "high"

  # --- Container scanning ---
  - uses: github://earthly/lunar-lib/policies/container-scan@main
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "critical"

  # --- GitHub Actions security ---
  - uses: github://earthly/lunar-lib/policies/github-actions@main
    enforcement: score
    include:
      - no-script-injection
      - no-dangerous-trigger-checkout
      - permissions-declared
      - no-write-all-permissions
      - checkout-no-persist-credentials
      - no-secrets-inherit

  # --- Dockerfile ---
  - uses: github://earthly/lunar-lib/policies/container@main
    enforcement: score
    include:
      - no-latest
      - user
      - healthcheck
      - stable-tags
      - dockerfile-lint-clean

  # --- SBOM ---
  - uses: github://earthly/lunar-lib/policies/sbom@main
    enforcement: score
    include:
      - sbom-exists
      - has-licenses

  # --- Branch protection ---
  - uses: github://earthly/lunar-lib/policies/vcs@main
    enforcement: score
    include:
      - branch-protection-enabled
      - require-pull-request
      - minimum-approvals
      - require-codeowner-review
      - disallow-force-push
