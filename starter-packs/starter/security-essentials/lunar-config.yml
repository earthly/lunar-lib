version: 0

# ============================================================================
# Starter Pack: Security Essentials
# Focus: Vulnerability scanning, secret detection, supply-chain security
# ============================================================================

collectors:
  # --- Language collectors (only trigger when language is detected) ---
  - uses: ./collectors/golang
  - uses: ./collectors/java
  - uses: ./collectors/nodejs
  - uses: ./collectors/python
  - uses: ./collectors/rust
  - uses: ./collectors/php
  - uses: ./collectors/cpp
  - uses: ./collectors/dotnet
  - uses: ./collectors/html
  - uses: ./collectors/shell
  - uses: ./collectors/ruby

  # --- Security scanners ---
  - uses: ./collectors/gitleaks       # Secret scanning (zero-config)
  - uses: ./collectors/trivy          # Dependency vulnerability scanning (zero-config)
  - uses: ./collectors/syft           # SBOM generation (zero-config)
  - uses: ./collectors/semgrep        # SAST scanning (skips if not configured)

  # --- Infrastructure context ---
  - uses: ./collectors/docker         # Dockerfile analysis
  - uses: ./collectors/github         # Repo settings, branch protection
  - uses: ./collectors/github-actions  # GitHub Actions workflow analysis

policies:
  # --- Secret detection: the ONE block-pr check ---
  - uses: ./policies/secrets
    enforcement: block-pr
    include:
      - no-hardcoded-secrets

  - uses: ./policies/secrets
    enforcement: score
    include:
      - executed

  # --- SCA ---
  - uses: ./policies/sca
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "critical"

  # --- SAST ---
  - uses: ./policies/sast
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "high"

  # --- Container scanning ---
  - uses: ./policies/container-scan
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "critical"

  # --- GitHub Actions security ---
  - uses: ./policies/github-actions
    enforcement: score
    include:
      - no-script-injection
      - no-dangerous-trigger-checkout
      - permissions-declared
      - no-write-all-permissions
      - checkout-no-persist-credentials
      - no-secrets-inherit

  # --- Dockerfile best practices ---
  - uses: ./policies/container
    enforcement: score
    include:
      - no-latest
      - user
      - healthcheck
      - stable-tags
      - dockerfile-lint-clean

  # --- SBOM ---
  - uses: ./policies/sbom
    enforcement: score
    include:
      - sbom-exists
      - has-licenses

  # --- Branch protection ---
  - uses: ./policies/vcs
    enforcement: score
    include:
      - branch-protection-enabled
      - require-pull-request
      - minimum-approvals
      - require-codeowner-review
      - disallow-force-push
