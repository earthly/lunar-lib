version: 0

# ============================================================================
# Starter Pack: Code Quality & Standards
# ============================================================================

collectors:
  # --- Language collectors (only trigger when language is detected) ---
  - uses: github://earthly/lunar-lib/collectors/golang@main
  - uses: github://earthly/lunar-lib/collectors/java@main
  - uses: github://earthly/lunar-lib/collectors/nodejs@main
  - uses: github://earthly/lunar-lib/collectors/python@main
  - uses: github://earthly/lunar-lib/collectors/rust@main
  - uses: github://earthly/lunar-lib/collectors/php@main
  - uses: github://earthly/lunar-lib/collectors/cpp@main
  - uses: github://earthly/lunar-lib/collectors/dotnet@main
  - uses: github://earthly/lunar-lib/collectors/html@main
  - uses: github://earthly/lunar-lib/collectors/shell@main
  - uses: github://earthly/lunar-lib/collectors/ruby@main

  # --- Repo health ---
  - uses: github://earthly/lunar-lib/collectors/readme@main
  - uses: github://earthly/lunar-lib/collectors/codeowners@main
  - uses: github://earthly/lunar-lib/collectors/repo-boilerplate@main
  - uses: github://earthly/lunar-lib/collectors/github@main

  # --- Quality tools ---
  - uses: github://earthly/lunar-lib/collectors/codecov@main

policies:
  # --- Repo standards ---
  - uses: github://earthly/lunar-lib/policies/repo-boilerplate@main
    enforcement: score
    include:
      - readme-exists
      - codeowners-exists
      - gitignore-exists
      - license-exists
      - readme-min-line-count
      - editorconfig-exists
      - security-exists
      - contributing-exists

  # --- Code ownership ---
  - uses: github://earthly/lunar-lib/policies/codeowners@main
    enforcement: score
    include:
      - exists
      - valid
      - catchall
      - min-owners

  # --- Testing ---
  - uses: github://earthly/lunar-lib/policies/testing@main
    enforcement: score
    include:
      - executed
      - passing
      - coverage-collected
      - coverage-reported

  # --- Linting ---
  - uses: github://earthly/lunar-lib/policies/linter@main
    enforcement: score
    include:
      - ran

  # --- Dependencies ---
  - uses: github://earthly/lunar-lib/policies/dependencies@main
    enforcement: score
    include:
      - min-versions

  # --- VCS ---
  - uses: github://earthly/lunar-lib/policies/vcs@main
    enforcement: score
    include:
      - branch-protection-enabled
      - require-pull-request

  # --- Language-specific guardrails ---
  # Version checks use sensible defaults. Override with `with:` to match your stack:
  #   min_go_version: "1.21"  |  min_java_version: "17"
  #   min_node_version: "18"  |  min_python_version: "3.9"

  # Go
  - uses: github://earthly/lunar-lib/policies/golang@main
    enforcement: score
    include:
      - go-mod-exists
      - go-sum-exists
      - min-go-version
      - tests-recursive
    # with:
    #   min_go_version: "1.22"

  # Java
  - uses: github://earthly/lunar-lib/policies/java@main
    enforcement: score
    include:
      - build-tool-wrapper-exists
      - min-java-version
      - tests-all-modules
    # with:
    #   min_java_version: "21"

  # Node.js
  - uses: github://earthly/lunar-lib/policies/nodejs@main
    enforcement: score
    include:
      - lockfile-exists
      - typescript-configured
      - engines-pinned
      - min-node-version
    # with:
    #   min_node_version: "20"

  # Python
  - uses: github://earthly/lunar-lib/policies/python@main
    enforcement: score
    include:
      - lockfile-exists
      - linter-configured
      - min-python-version

  # Rust
  - uses: github://earthly/lunar-lib/policies/rust@main
    enforcement: score
    include:
      - cargo-toml-exists
      - cargo-lock-exists
      - min-rust-edition
      - clippy-clean

  # PHP
  - uses: github://earthly/lunar-lib/policies/php@main
    enforcement: score
    include:
      - composer-json-exists
      - composer-lock-exists
      - phpunit-configured
      - static-analysis-configured
      - min-version

  # C/C++
  - uses: github://earthly/lunar-lib/policies/cpp@main
    enforcement: score
    include:
      - build-system-exists
      - min-cpp-standard
      - cppcheck-clean

  # .NET
  - uses: github://earthly/lunar-lib/policies/dotnet@main
    enforcement: score
    include:
      - project-file-exists
      - target-framework-set
      - dependencies-locked
      - test-project-exists

  # Shell
  - uses: github://earthly/lunar-lib/policies/shell@main
    enforcement: score
    include:
      - shellcheck-clean

  # Ruby
  - uses: github://earthly/lunar-lib/policies/ruby@main
    enforcement: score
    include:
      - gemfile-exists
      - lockfile-exists
      - ruby-version-set
      - bundler-audit-clean

  # HTML/CSS
  - uses: github://earthly/lunar-lib/policies/html@main
    enforcement: score
    include:
      - htmlhint-clean
      - stylelint-clean
