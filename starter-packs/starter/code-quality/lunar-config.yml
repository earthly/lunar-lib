version: 0

# ============================================================================
# Starter Pack: Code Quality & Standards
# ============================================================================

collectors:
  # --- Language collectors (only trigger when language is detected) ---
  - uses: github://earthly/lunar-lib/collectors/golang@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/java@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/nodejs@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/python@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/rust@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/php@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/cpp@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/dotnet@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/html@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/shell@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/ruby@v1.1.0

  # --- Repo health ---
  - uses: github://earthly/lunar-lib/collectors/repo-boilerplate@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/github@v1.1.0

  # --- Quality tools ---
  - uses: github://earthly/lunar-lib/collectors/codecov@v1.1.0

policies:
  # --- Repo standards ---
  - uses: github://earthly/lunar-lib/policies/repo-boilerplate@v1.1.0
    enforcement: score
    include:
      - readme-exists
      - codeowners-exists
      - codeowners-valid
      - codeowners-catchall
      - codeowners-min-owners
      - gitignore-exists
      - license-exists
      - readme-min-line-count
      - editorconfig-exists
      - security-exists
      - contributing-exists

  # --- Testing ---
  - uses: github://earthly/lunar-lib/policies/testing@v1.1.0
    enforcement: score
    include:
      - executed
      - passing
      - coverage-collected
      - coverage-reported

  # --- Linting ---
  - uses: github://earthly/lunar-lib/policies/linter@v1.1.0
    enforcement: score
    include:
      - ran

  # --- Dependencies ---
  - uses: github://earthly/lunar-lib/policies/dependencies@v1.1.0
    enforcement: score
    include:
      - min-versions
    with:
      min_versions: '{"react": "18.0", "express": "4.18"}'
  - uses: github://earthly/lunar-lib/policies/dependencies@v1.1.0
    enforcement: score
    include:
      - min-versions
    with:
      min_versions: '{"django": "4.2", "flask": "3.0"}'

  # --- VCS ---
  - uses: github://earthly/lunar-lib/policies/vcs@v1.1.0
    enforcement: score
    include:
      - branch-protection-enabled
      - require-pull-request

  # --- Language-specific guardrails ---

  # Go
  - uses: github://earthly/lunar-lib/policies/golang@v1.1.0
    enforcement: score
    include:
      - go-mod-exists
      - go-sum-exists
      - min-go-version
      - tests-recursive
    with:
      min_go_version: "1.21"

  # Java
  - uses: github://earthly/lunar-lib/policies/java@v1.1.0
    enforcement: score
    include:
      - build-tool-wrapper-exists
      - min-java-version
      - tests-all-modules
    with:
      min_java_version: "17"

  # Node.js
  - uses: github://earthly/lunar-lib/policies/nodejs@v1.1.0
    enforcement: score
    include:
      - lockfile-exists
      - typescript-configured
      - engines-pinned
      - min-node-version
    with:
      min_node_version: "18"

  # Python
  - uses: github://earthly/lunar-lib/policies/python@v1.1.0
    enforcement: score
    include:
      - lockfile-exists
      - linter-configured
      - min-python-version
    with:
      min_python_version: "3.9"

  # Rust
  - uses: github://earthly/lunar-lib/policies/rust@v1.1.0
    enforcement: score
    include:
      - cargo-toml-exists
      - cargo-lock-exists
      - min-rust-edition
      - clippy-clean
    with:
      min_rust_edition: "2021"

  # PHP
  - uses: github://earthly/lunar-lib/policies/php@v1.1.0
    enforcement: score
    include:
      - composer-json-exists
      - composer-lock-exists
      - phpunit-configured
      - static-analysis-configured
      - min-version
    with:
      min_version: "8.1"

  # C/C++
  - uses: github://earthly/lunar-lib/policies/cpp@v1.1.0
    enforcement: score
    include:
      - build-system-exists
      - min-cpp-standard
      - cppcheck-clean
    with:
      min_cpp_standard: "17"

  # .NET
  - uses: github://earthly/lunar-lib/policies/dotnet@v1.1.0
    enforcement: score
    include:
      - project-file-exists
      - target-framework-set
      - dependencies-locked
      - test-project-exists
    with:
      min_sdk_version: "8.0"

  # Shell
  - uses: github://earthly/lunar-lib/policies/shell@v1.1.0
    enforcement: score
    include:
      - shellcheck-clean

  # Ruby
  - uses: github://earthly/lunar-lib/policies/ruby@v1.1.0
    enforcement: score
    include:
      - gemfile-exists
      - lockfile-exists
      - ruby-version-set
      - bundler-audit-clean
    with:
      min_ruby_version: "3.1"

  # HTML/CSS
  - uses: github://earthly/lunar-lib/policies/html@v1.1.0
    enforcement: score
    include:
      - htmlhint-clean
      - stylelint-clean
