version: 0

# ============================================================================
# Starter Pack: Cloud Native / Infrastructure
# Focus: Kubernetes, Terraform, Docker, IaC security
# ============================================================================

collectors:
  # --- Language collectors (only trigger when language is detected) ---
  - uses: ./collectors/golang
  - uses: ./collectors/java
  - uses: ./collectors/nodejs
  - uses: ./collectors/python
  - uses: ./collectors/rust
  - uses: ./collectors/php
  - uses: ./collectors/cpp
  - uses: ./collectors/dotnet
  - uses: ./collectors/html

  # --- Infrastructure ---
  - uses: ./collectors/k8s            # Kubernetes manifests (skips if none)
  - uses: ./collectors/terraform      # Terraform files (skips if none)
  - uses: ./collectors/docker         # Dockerfile analysis

  # --- Security scanners ---
  - uses: ./collectors/trivy          # Dependency vulnerability scanning (zero-config)

  # --- CI context ---
  - uses: ./collectors/github         # Repo settings

policies:
  # --- Kubernetes: report critical configs, track maturity ---
  - uses: ./policies/k8s
    enforcement: report-pr
    include:
      - requests-and-limits    # All containers must have resource limits
      - probes                 # Liveness/readiness probes required

  - uses: ./policies/k8s
    enforcement: score
    include:
      - valid
      - pdb
      - non-root
      - min-replicas

  # --- Terraform: report unpinned providers, track state backend ---
  - uses: ./policies/terraform
    enforcement: report-pr
    include:
      - provider-versions-pinned
      - remote-backend

  - uses: ./policies/terraform
    enforcement: score
    include:
      - module-versions-pinned
      - min-provider-versions

  # --- General IaC ---
  - uses: ./policies/iac
    enforcement: score
    include:
      - valid
      - datastore-destroy-protection

  # --- IaC scanning: report critical misconfigs ---
  - uses: ./policies/iac-scan
    enforcement: report-pr
    include:
      - max-severity
    with:
      min_severity: "critical"

  - uses: ./policies/iac-scan
    enforcement: score
    include:
      - executed

  # --- Container best practices: report key issues ---
  - uses: ./policies/container
    enforcement: report-pr
    include:
      - no-latest            # Don't use :latest tags
      - healthcheck          # HEALTHCHECK instruction present
      - user                 # Run as non-root

  - uses: ./policies/container
    enforcement: score
    include:
      - stable-tags
      - build-tagged

  # --- Container scanning: report critical image vulns ---
  - uses: ./policies/container-scan
    enforcement: report-pr
    include:
      - max-severity
    with:
      min_severity: "critical"

  - uses: ./policies/container-scan
    enforcement: score
    include:
      - executed

  # --- CI hygiene ---
  - uses: ./policies/ci
    enforcement: score
    include:
      - lint-clean
      - dependencies-pinned
      - no-mutable-refs
