version: 0

# ============================================================================
# Starter Pack: Cloud Native / Infrastructure
# Focus: Kubernetes, Terraform, Docker, IaC security
# ============================================================================

collectors:
  # --- Language collectors (only trigger when language is detected) ---
  - uses: ./collectors/golang
  - uses: ./collectors/java
  - uses: ./collectors/nodejs
  - uses: ./collectors/python
  - uses: ./collectors/rust
  - uses: ./collectors/php
  - uses: ./collectors/cpp
  - uses: ./collectors/dotnet
  - uses: ./collectors/html
  - uses: ./collectors/shell
  - uses: ./collectors/ruby

  # --- Infrastructure ---
  - uses: ./collectors/k8s            # Kubernetes manifests (skips if none)
  - uses: ./collectors/terraform      # Terraform files (skips if none)
  - uses: ./collectors/docker         # Dockerfile analysis

  # --- Security scanners ---
  - uses: ./collectors/trivy          # Dependency vulnerability scanning (zero-config)
  - uses: ./collectors/checkov        # IaC scanning (zero-config)

  # --- CI context ---
  - uses: ./collectors/github         # Repo settings

policies:
  # --- Container: no-latest is the one report-pr check ---
  - uses: ./policies/container
    enforcement: report-pr
    include:
      - no-latest              # Don't use :latest tags — the clearest anti-pattern

  - uses: ./policies/container
    enforcement: score
    include:
      - healthcheck
      - user
      - stable-tags
      - build-tagged
      - dockerfile-lint-clean

  # --- Kubernetes ---
  - uses: ./policies/k8s
    enforcement: score
    include:
      - requests-and-limits
      - probes
      - valid
      - pdb
      - non-root
      - min-replicas

  # --- Terraform ---
  - uses: ./policies/terraform
    enforcement: score
    include:
      - provider-versions-pinned
      - remote-backend
      - module-versions-pinned
      - min-provider-versions
    with:
      min_provider_versions: '{"aws": "5.0"}'  # Customize per your stack

  # --- General IaC ---
  - uses: ./policies/iac
    enforcement: score
    include:
      - valid
      - datastore-destroy-protection

  # --- IaC scanning ---
  - uses: ./policies/iac-scan
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "critical"

  # --- Container scanning ---
  - uses: ./policies/container-scan
    enforcement: score
    include:
      - executed
      - max-severity
    with:
      min_severity: "critical"

  # --- CI hygiene ---
  - uses: ./policies/ci
    enforcement: score
    include:
      - lint-clean
      - dependencies-pinned
      - no-mutable-refs
