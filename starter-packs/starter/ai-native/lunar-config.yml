version: 0

# ============================================================================
# Starter Pack: AI Native
# ============================================================================

collectors:
  # --- Language collectors (only trigger when language is detected) ---
  - uses: github://earthly/lunar-lib/collectors/golang@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/java@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/nodejs@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/python@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/rust@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/php@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/cpp@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/dotnet@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/html@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/shell@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/ruby@v1.0.5

  # --- AI ---
  - uses: github://earthly/lunar-lib/collectors/ai-use@v1.0.5

  # --- Security ---
  - uses: github://earthly/lunar-lib/collectors/gitleaks@v1.0.5
  - uses: github://earthly/lunar-lib/collectors/github-actions@v1.0.5

  # --- Repo context ---
  - uses: github://earthly/lunar-lib/collectors/github@v1.0.5

policies:
  # --- AI guardrails ---
  - uses: github://earthly/lunar-lib/policies/ai-use@v1.0.5
    enforcement: score
    include:
      - instruction-file-exists
      - canonical-naming
      - instruction-file-length
      - ai-cli-safe-flags
      - ai-cli-structured-output
      - ai-authorship-annotated

  # --- Secret detection ---
  - uses: github://earthly/lunar-lib/policies/secrets@v1.0.5
    enforcement: report-pr
    include:
      - no-hardcoded-secrets

  # --- CI security ---
  - uses: github://earthly/lunar-lib/policies/github-actions@v1.0.5
    enforcement: score
    include:
      - no-script-injection
      - permissions-declared

  # --- VCS ---
  - uses: github://earthly/lunar-lib/policies/vcs@v1.0.5
    enforcement: score
    include:
      - branch-protection-enabled
      - require-pull-request

  # --- Testing ---
  - uses: github://earthly/lunar-lib/policies/testing@v1.0.5
    enforcement: score
    include:
      - executed
      - passing

  # --- Linting ---
  - uses: github://earthly/lunar-lib/policies/linter@v1.0.5
    enforcement: score
    include:
      - ran
