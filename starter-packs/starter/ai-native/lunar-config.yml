version: 0

# ============================================================================
# Starter Pack: AI Native
# ============================================================================

collectors:
  # --- Language collectors (only trigger when language is detected) ---
  - uses: github://earthly/lunar-lib/collectors/golang@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/java@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/nodejs@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/python@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/rust@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/php@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/cpp@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/dotnet@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/html@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/shell@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/ruby@v1.1.0

  # --- AI ---
  - uses: github://earthly/lunar-lib/collectors/ai@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/claude@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/codex@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/gemini@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/coderabbit@v1.1.0

  # --- Security ---
  - uses: github://earthly/lunar-lib/collectors/gitleaks@v1.1.0
  - uses: github://earthly/lunar-lib/collectors/github-actions@v1.1.0

  # --- Repo context ---
  - uses: github://earthly/lunar-lib/collectors/github@v1.1.0

policies:
  # --- AI guardrails (shared) ---
  - uses: github://earthly/lunar-lib/policies/ai@v1.1.0
    enforcement: score
    include:
      - instruction-file-exists
      - canonical-naming
      - instruction-file-length
      - ai-authorship-annotated

  # --- Claude ---
  - uses: github://earthly/lunar-lib/policies/claude@v1.1.0
    enforcement: score
    include:
      - cli-safe-flags
      - cli-structured-output

  # --- Codex ---
  - uses: github://earthly/lunar-lib/policies/codex@v1.1.0
    enforcement: score
    include:
      - cli-safe-flags
      - cli-structured-output

  # --- Gemini ---
  - uses: github://earthly/lunar-lib/policies/gemini@v1.1.0
    enforcement: score
    include:
      - cli-safe-flags
      - cli-structured-output

  # --- Secret detection ---
  - uses: github://earthly/lunar-lib/policies/secrets@v1.1.0
    enforcement: report-pr
    include:
      - no-hardcoded-secrets

  # --- CI security ---
  - uses: github://earthly/lunar-lib/policies/github-actions@v1.1.0
    enforcement: score
    include:
      - no-script-injection
      - permissions-declared

  # --- VCS ---
  - uses: github://earthly/lunar-lib/policies/vcs@v1.1.0
    enforcement: score
    include:
      - branch-protection-enabled
      - require-pull-request

  # --- Testing ---
  - uses: github://earthly/lunar-lib/policies/testing@v1.1.0
    enforcement: score
    include:
      - executed
      - passing

  # --- Linting ---
  - uses: github://earthly/lunar-lib/policies/linter@v1.1.0
    enforcement: score
    include:
      - ran
