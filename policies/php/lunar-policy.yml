version: 0

name: php
description: Enforces PHP project structure and standards
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "PHP Project Guardrails"
  long_description: |
    Enforce PHP-specific project standards including Composer configuration,
    lockfile presence, testing setup, static analysis, code style enforcement,
    and minimum PHP version requirements.
  category: "devex-build-and-ci"
  icon: "assets/php.svg"
  status: "beta"
  requires:
    - slug: "php"
      type: "collector"
      reason: "Provides PHP project metadata"
  related: []

policies:
  - name: composer-json-exists
    description: |
      Ensures the project has a composer.json file for dependency management.
      Required for all PHP projects using Composer.
    mainPython: ./composer_json_exists.py
    keywords: ["composer", "composer.json", "project structure"]

  - name: composer-lock-exists
    description: |
      Ensures the project has a composer.lock file for dependency verification.
      Required for reproducible builds and deployments.
    mainPython: ./composer_lock_exists.py
    keywords: ["composer.lock", "dependencies", "reproducibility"]

  - name: phpunit-configured
    description: |
      Ensures PHPUnit is configured for testing.
      A test framework is essential for maintaining code quality.
    mainPython: ./phpunit_configured.py
    keywords: ["phpunit", "testing", "code quality"]

  - name: static-analysis-configured
    description: |
      Ensures a static analysis tool (PHPStan or Psalm) is configured.
      Static analysis catches bugs and enforces type safety.
    mainPython: ./static_analysis_configured.py
    keywords: ["phpstan", "psalm", "static analysis", "type safety"]

  - name: code-style-configured
    description: |
      Ensures a code style tool (PHP-CS-Fixer or PHP_CodeSniffer) is configured.
      Consistent code style improves readability and reduces review friction.
    mainPython: ./code_style_configured.py
    keywords: ["php-cs-fixer", "phpcs", "code style", "PSR-12"]

  - name: min-php-version
    description: |
      Ensures the PHP version constraint in composer.json meets the minimum
      required version. Helps maintain security and compatibility standards.
    mainPython: ./min_php_version.py
    keywords: ["php version", "compatibility", "security"]

inputs:
  min_php_version:
    description: Minimum required PHP version (e.g., "8.1", "8.2")
    default: "8.1"
