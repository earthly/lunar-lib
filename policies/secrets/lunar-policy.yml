version: 0

name: secrets
description: Secret scanning enforcement policies
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Secrets Guardrails"
  long_description: |
    Enforces secret scanning standards. Ensures secret scanners run and
    validates that no hardcoded secrets, API keys, or credentials are
    present in the codebase.
  category: "security-and-compliance"
  icon: "assets/secrets.svg"
  status: "beta"
  requires:
    - slug: "gitleaks"
      type: "collector"
      reason: "Provides secret scanning results via Gitleaks"
  related: []

policies:
  - name: executed
    description: |
      Verifies that secret scanning was executed on the component.
      Fails if no scanner has written to .secrets.
    mainPython: executed.py
    keywords: ["secrets", "security", "scanning", "compliance", "gitleaks"]

  - name: no-hardcoded-secrets
    description: |
      Ensures no hardcoded secrets are detected in the codebase.
      Fails if .secrets.issues is non-empty.
    mainPython: no_hardcoded_secrets.py
    keywords: ["secrets", "credentials", "api keys", "hardcoded", "security"]

  - name: max-issues
    description: |
      Ensures the number of secret findings is under a configurable
      threshold. Use this for gradual remediation of existing codebases.
    mainPython: max_issues.py
    keywords: ["secrets", "threshold", "findings", "remediation"]

inputs:
  max_issues_threshold:
    description: "Maximum number of secret issues allowed (must be configured)"
