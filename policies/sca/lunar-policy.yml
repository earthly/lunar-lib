version: 0

name: sca
description: Software Composition Analysis (SCA) security policies
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "SCA Guardrails"
  long_description: |
    Enforces Software Composition Analysis scanning standards. Ensures SCA scanners
    run and validates vulnerability thresholds for dependency security.
  category: "security-and-compliance"
  icon: "assets/sca.svg"
  status: "stable"
  requires:
    - slug: "snyk"
      type: "collector"
      reason: "Provides SCA scan results via Snyk Open Source"
    - slug: "semgrep"
      type: "collector"
      reason: "Provides SCA scan results via Semgrep Supply Chain"

    - slug: "trivy"
      type: "collector"
      reason: "Provides SCA scan results via Trivy vulnerability scanning"
  related: []

policies:
  - name: executed
    description: |
      Verifies that SCA scanning was executed on the component.
      Fails if no scanner has written to .sca.
    mainPython: executed.py
    keywords: ["sca", "security", "scanning", "compliance", "dependencies"]

  - name: max-severity
    description: |
      Ensures no findings at or above the configured severity threshold.
      Configure min_severity to set the threshold (critical, high, medium, low).
    mainPython: max_severity.py
    keywords: ["sca", "critical", "high", "vulnerabilities", "security", "dependencies"]

  - name: max-total
    description: |
      Ensures total vulnerabilities are under a configurable threshold.
    mainPython: max_total.py
    keywords: ["sca", "threshold", "vulnerabilities", "dependencies"]

  - name: alert
    description: |
      Best-effort webhook notifier. When alert_url is set and SCA findings
      exist at or above min_severity, POSTs a standard JSON payload listing
      those findings. This check is a notifier, not a gate: it only ever
      passes (alert fired) or skips (alerting disabled / nothing to alert),
      and never blocks the component — even if the endpoint is slow or down.
    mainPython: alert.py
    keywords: ["sca", "webhook", "alert", "notification", "vulnerabilities"]

inputs:
  min_severity:
    description: "Minimum severity to fail on (critical, high, medium, low)"
    default: "high"
  max_total_threshold:
    description: "Maximum total findings allowed (must be configured)"
  alert_url:
    description: "Optional webhook URL. When set, the 'alert' check POSTs a JSON payload listing findings at or above min_severity. Leave empty to disable alerting (default)."
    default: ""
  alert_timeout:
    description: "Webhook POST timeout in seconds. Best-effort — a slow or dead endpoint is never allowed to fail the policy."
    default: "2"
