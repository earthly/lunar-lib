version: 0

name: backstage
description: Enforce Backstage service catalog standards
author: earthly
default_image: earthly/lunar-lib:base-v1.10.0

landing_page:
  display_name: "Backstage Guardrails"
  long_description: |
    Validates Backstage catalog-info.yaml entries for completeness and
    compliance. Checks that the catalog file exists and is valid, owner
    is set, lifecycle stage is defined, and system grouping is assigned.
  category: "repository-and-ownership"
  icon: "assets/backstage.svg"
  status: "beta"
  requires:
    - slug: "backstage"
      type: "collector"
      reason: "Provides parsed Backstage catalog metadata at .catalog.native.backstage"

policies:
  - name: catalog-info-exists
    description: |
      Verifies that a catalog-info.yaml file exists in the repository.
      Every Backstage-managed service must have a catalog definition file.
      Fails if the `backstage` collector reports no catalog file found.
    mainPython: ./catalog-info-exists.py
    keywords: ["backstage", "catalog-info", "service catalog", "file exists"]

  - name: catalog-info-valid
    description: |
      Verifies that the catalog-info.yaml file is syntactically valid and
      passes Backstage descriptor schema checks (no lint errors reported
      by the collector). Fails if the file is missing or has lint errors.
    mainPython: ./catalog-info-valid.py
    keywords: ["backstage", "catalog-info", "lint", "schema", "validation"]

  - name: owner-set
    description: |
      Validates that the owner field (spec.owner) is populated in the
      catalog-info.yaml. Ownership is required for incident routing
      and accountability. Fails if no catalog file is present.
    mainPython: ./owner-set.py
    keywords: ["backstage", "ownership", "owner", "accountability"]

  - name: lifecycle-set
    description: |
      Validates that the lifecycle stage (spec.lifecycle) is defined in
      the catalog-info.yaml. Lifecycle stages (production, experimental,
      deprecated) inform operational expectations and SLO requirements.
      Fails if no catalog file is present.
    mainPython: ./lifecycle-set.py
    keywords: ["backstage", "lifecycle", "production", "deprecated"]

  - name: system-set
    description: |
      Validates that the system grouping (spec.system) is defined in
      the catalog-info.yaml. System assignment enables dependency mapping
      and architectural visibility. Fails if no catalog file is present.
    mainPython: ./system-set.py
    keywords: ["backstage", "system", "grouping", "architecture"]

  - name: domain-exists
    description: |
      Verifies that the domain referenced by spec.domain in catalog-info.yaml
      actually exists in the Backstage catalog (referential integrity). Reads
      the collector's lookup result at `.catalog.native.backstage.refs.domain`.
      Fails when the declared domain is absent from Backstage (collector
      recorded exists=false). Passes when no domain is declared (nothing to
      cross-check — `system-set`/`*-set` own "should it be set"). Skips (passes)
      when referential integrity was not performed — i.e. the `backstage`
      collector is not configured with `backstage_url` (no `.refs.checked`), or
      the lookup errored transiently (`.refs.domain.error`) — so an unconfigured
      collector or a Backstage outage never turns this red. Note `spec.domain`
      lives on `System` entities, so this check does work only for `kind: System`
      catalog files (or Components carrying a custom domain).
    mainPython: ./domain-exists.py
    keywords: ["backstage", "domain", "referential integrity", "catalog", "cross-reference"]

  - name: system-exists
    description: |
      Verifies that the system referenced by spec.system in catalog-info.yaml
      actually exists in the Backstage catalog (referential integrity). Reads
      the collector's lookup result at `.catalog.native.backstage.refs.system`.
      Fails when the declared system is absent from Backstage (collector
      recorded exists=false). Passes when no system is declared (nothing to
      cross-check — `system-set` owns "should it be set"). Skips (passes) when
      referential integrity was not performed — i.e. the `backstage` collector
      is not configured with `backstage_url` (no `.refs.checked`), or the lookup
      errored transiently (`.refs.system.error`) — so an unconfigured collector
      or a Backstage outage never turns this red.
    mainPython: ./system-exists.py
    keywords: ["backstage", "system", "referential integrity", "catalog", "cross-reference"]

  - name: required-annotations
    description: |
      Verifies that catalog-info.yaml declares a configurable set of
      required annotation keys (e.g. backstage.io/source-location), and
      optionally that their values satisfy typed constraints — a declared
      data type (integer, number, boolean, string) with numeric bounds,
      string length, a regular-expression pattern, or an allowed-value
      set. Configure via the `required_annotations` input. Skipped when no
      annotations are required (the default). Fails if the catalog file is
      missing, a required key is absent or empty, or a value violates its
      declared constraint.
    mainPython: ./required-annotations.py
    keywords: ["backstage", "annotations", "metadata", "required", "type validation", "value constraints"]

  - name: required-tag-patterns
    description: |
      Verifies that catalog-info.yaml carries at least one tag matching
      each configured glob pattern (e.g. `location/*`, `runs-on/*`).
      Configure via the `required_tag_patterns` input. Skipped when no
      patterns are required (the default). Fails if the catalog file is
      missing or any pattern is unmatched by the component's tags.
    mainPython: ./required-tag-patterns.py
    keywords: ["backstage", "tags", "tag patterns", "glob", "required", "metadata"]

  - name: disallowed-annotations
    description: |
      Verifies that catalog-info.yaml declares none of a configurable set
      of forbidden annotation keys. Configure via the
      `disallowed_annotations` input. Skipped when no annotations are
      forbidden (the default). Fails if any forbidden annotation key is
      present in `metadata.annotations`.
    mainPython: ./disallowed-annotations.py
    keywords: ["backstage", "annotations", "metadata", "disallowed", "forbidden"]

  - name: disallowed-tag-patterns
    description: |
      Verifies that none of the component's tags match a configured glob
      pattern. Configure via the `disallowed_tag_patterns` input. Skipped
      when no patterns are forbidden (the default). Fails if any tag
      matches any forbidden pattern.
    mainPython: ./disallowed-tag-patterns.py
    keywords: ["backstage", "tags", "tag patterns", "glob", "disallowed", "forbidden"]

inputs:
  required_annotations:
    description: |
      Annotation keys that must be present (and non-empty) in
      catalog-info.yaml `metadata.annotations`. Two forms are accepted.

      Comma-separated keys (presence-only, unchanged), e.g.
      `backstage.io/source-location,pagerduty.com/integration-key`.

      Or a YAML list, where each entry is either a bare key (presence-only)
      or a mapping with a `key` and optional value constraints: `type`
      (string|integer|number|boolean, default string), `min`/`max`
      (integer/number bounds), `min_length`/`max_length` (string length),
      `pattern` (full-match regex), and `enum` (allowed values). For
      example, a `key: example.com/service-tier` with `type: integer`,
      `min: 0`, `max: 5` requires that annotation to parse as an integer
      in 0–5.

      Annotation values are strings in Backstage, so `type` validates that
      the value *parses* as the declared type (`"2"` satisfies `integer`,
      `"2.5"` does not). `enum` inherits `type`: its entries are coerced to
      the declared type before comparison, so `type: integer` with
      `enum: [1,2,3]` compares integers while the default `type: string`
      compares strings. Constraints must match the declared type (`min`/`max`
      for integer/number; `min_length`/`max_length`/`pattern` for string). A
      value that violates a constraint fails the check; a malformed
      constraint (unknown type, min greater than max, invalid regex, a
      constraint on the wrong type, or an enum entry not of the declared
      type) makes it error. Empty (the default) disables the check.
    default: ""
  required_tag_patterns:
    description: |
      Comma-separated list of glob patterns; the component's
      `metadata.tags` must include at least one tag matching each
      pattern. Example: `location/*,runs-on/*`. Matching is
      case-insensitive. Empty (the default) disables the
      `required-tag-patterns` check.
    default: ""
  disallowed_annotations:
    description: |
      Comma-separated list of annotation keys that must NOT be present in
      catalog-info.yaml `metadata.annotations`. Example:
      `backstage.io/skip-checks`. Empty (the default) disables the
      `disallowed-annotations` check.
    default: ""
  disallowed_tag_patterns:
    description: |
      Comma-separated list of glob patterns; the component's
      `metadata.tags` must NOT include any tag matching these patterns.
      Example: `deprecated/*,internal-only`. Matching is case-insensitive.
      Empty (the default) disables the `disallowed-tag-patterns` check.
    default: ""
