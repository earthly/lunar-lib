version: 0

name: shell
description: Shell script quality and linting guardrails
author: earthly

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Shell Guardrails"
  long_description: |
    Enforce shell script quality standards by validating ShellCheck results.
    Ensures shell scripts are free of errors and warnings for consistent,
    safe scripting practices.
  category: "testing-and-quality"
  icon: "assets/shell.svg"
  status: "beta"
  requires:
    - slug: "shell"
      type: "collector"
      reason: "Provides ShellCheck lint data for shell scripts"
  related: []

policies:
  - name: shellcheck-clean
    description: |
      Ensures ShellCheck reports no errors or warnings on shell scripts.
      Skips if no shell scripts are detected in the component.
      Configurable warning threshold via max_shellcheck_warnings input.
    mainPython: shellcheck_clean.py
    keywords: ["shellcheck", "shell", "bash", "linting", "clean", "code quality"]

inputs:
  max_shellcheck_warnings:
    description: Maximum number of ShellCheck warnings allowed (0 = must be completely clean)
    default: "0"
