version: 0

name: sbom
description: Enforces SBOM existence, license compliance, completeness, format, and origin policies
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "SBOM Guardrails"
  long_description: |
    Enforce Software Bill of Materials standards across your organization.
    Verify SBOMs are generated, contain license data, use approved formats,
    do not include disallowed licenses, and flag dependencies with blocked
    geographic origins or disallowed package patterns.
  category: "security-and-compliance"
  icon: "assets/sbom.svg"
  status: "stable"
  requires:
    - slug: "syft"
      type: "collector"
      reason: "Provides SBOM data for policy evaluation"
    - slug: "license-origins"
      type: "collector"
      reason: "Provides license origin data for blocked-origins check"

policies:
  - name: sbom-exists
    description: |
      Ensures an SBOM was generated, either automatically or detected in CI.
    mainPython: ./sbom-exists.py
    keywords: ["sbom", "software bill of materials", "compliance"]

  - name: has-licenses
    description: |
      Verifies that SBOM components have license information populated.
      Fails if license coverage is below the configured threshold.
    mainPython: ./has-licenses.py
    keywords: ["sbom", "licenses", "license coverage"]

  - name: disallowed-licenses
    description: |
      Checks for disallowed licenses in SBOM components.
      Matches component licenses against configurable regex patterns.
    mainPython: ./disallowed-licenses.py
    keywords: ["sbom", "licenses", "compliance", "gpl", "copyleft"]

  - name: min-components
    description: |
      Verifies the SBOM contains a minimum number of components.
      Catches trivially empty SBOMs that may indicate detection failures.
    mainPython: ./min-components.py
    keywords: ["sbom", "completeness", "components"]

  - name: standard-format
    description: |
      Validates the SBOM uses an approved format (CycloneDX, SPDX).
      Auto-passes if no format restriction is configured.
    mainPython: ./standard-format.py
    keywords: ["sbom", "cyclonedx", "spdx", "format"]

  - name: blocked-origins
    description: |
      Checks for dependencies with license origin mentions from blocked
      countries. Supports blocklist or allowlist mode. Requires the
      license-origins collector.
    mainPython: ./blocked-origins.py
    keywords: ["sbom", "license origins", "country of origin", "export control", "compliance", "supply chain"]

  - name: disallowed-packages
    description: |
      Checks for disallowed packages by matching PURL, name, or group
      against configurable regex patterns (e.g. "ru\\.yandex\\..*",
      "com\\.alibaba\\..*").
    mainPython: ./disallowed-packages.py
    keywords: ["sbom", "disallowed packages", "package blocklist", "supply chain", "compliance"]

inputs:
  disallowed_licenses:
    description: Comma-separated regex patterns of disallowed licenses (e.g. "GPL.*,AGPL.*")
  min_license_coverage:
    description: Minimum percentage of components that must have license info (0-100)
    default: "50"
  min_components:
    description: Minimum number of components the SBOM must contain
    default: "1"
  allowed_formats:
    description: Comma-separated list of allowed SBOM formats (e.g. "cyclonedx,spdx"). Empty means any.
    default: ""
  blocked_countries:
    description: Comma-separated list of blocked countries for license origin checks (e.g. "Russia,China,Iran,North Korea")
    default: ""
  allowed_countries:
    description: Comma-separated allowlist of countries (stricter alternative to blocked_countries — any country NOT on this list triggers a failure)
    default: ""
  disallowed_packages:
    description: Comma-separated regex patterns for disallowed packages (matched against PURL, name, and group; e.g. "ru\\.yandex\\..*,com\\.alibaba\\..*")
    default: ""
