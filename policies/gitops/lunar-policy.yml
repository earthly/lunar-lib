version: 0

name: gitops
description: GitOps continuous-delivery configuration and deployment policies
author: earthly

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "GitOps Guardrails"
  long_description: |
    Enforce GitOps best practices on data from the argocd collector: valid
    manifests, automated sync (prune + self-heal), non-default projects,
    source/destination allow-lists, and adoption coverage to flag components
    that should be on ArgoCD but aren't. Tool-agnostic; reads .cd.gitops.
  category: "deployment-and-infrastructure"
  icon: "assets/argocd.svg"
  status: "beta"
  requires:
    - slug: "argocd"
      type: "collector"
      reason: "Provides parsed, normalized GitOps configuration these policies evaluate"

policies:
  - name: valid
    description: |
      Validates that all GitOps manifests (ArgoCD Applications, ApplicationSets,
      and AppProjects) conform to the argoproj CRD schemas. Invalid manifests can
      silently fail to sync or behave unexpectedly once applied to the cluster.
    mainPython: valid.py
    keywords: ["argocd", "gitops", "manifest validation", "argoproj", "schema"]

  - name: sync-policy
    description: |
      Requires Applications to use an automated sync policy with prune and
      self-heal enabled. Drift between Git and the cluster is corrected
      automatically instead of accumulating silently.
    mainPython: sync_policy.py
    keywords: ["argocd", "sync policy", "automated sync", "prune", "self-heal", "drift"]

  - name: non-default-project
    description: |
      Requires Applications to belong to a named AppProject rather than the
      permissive built-in `default` project, and (optionally) to a project on
      an allow-list. Scoped projects bound what an Application may deploy.
    mainPython: non_default_project.py
    keywords: ["argocd", "appproject", "default project", "least privilege", "gitops"]

  - name: source-repo-allowlist
    description: |
      Requires each Application's manifest source repository to be within a
      configured allow-list of trusted repositories. Prevents deployments from
      unreviewed or untrusted Git sources.
    mainPython: source_repo_allowlist.py
    keywords: ["argocd", "source repo", "allowlist", "supply chain", "trusted source"]

  - name: destination-allowlist
    description: |
      Requires each Application's destination namespace and cluster to be
      within a configured allow-list. Stops Applications from targeting
      clusters or namespaces they should not deploy to.
    mainPython: destination_allowlist.py
    keywords: ["argocd", "destination", "namespace", "cluster", "allowlist"]

  - name: gitops-managed
    description: |
      Coverage check: requires every component this policy targets (optionally
      narrowed to a tag) to actually be deployed by an ArgoCD Application — i.e.
      to have resolved .cd.gitops data, whether parsed locally or link-pushed
      from a separate GitOps repo. Surfaces components that should be on GitOps
      but haven't been migrated. Unlike the other checks, absence of GitOps data
      is a failure here, not a skip — that's the whole point.
    mainPython: gitops_managed.py
    keywords: ["argocd", "gitops adoption", "coverage", "migration", "deployment visibility"]

inputs:
  allowed_projects:
    description: Comma-separated allow-list of AppProject names for non-default-project. Empty means only enforce that the project is not `default`.
    default: ""
  allowed_source_repos:
    description: Comma-separated allow-list of permitted Application source repoURLs for source-repo-allowlist. Required when that check is enabled (errors if empty).
    default: ""
  allowed_destinations:
    description: Comma-separated allow-list of permitted destination namespaces (or `cluster/namespace`) for destination-allowlist. Required when that check is enabled (errors if empty).
    default: ""
  expected_tag:
    description: For gitops-managed — only enforce coverage on components carrying this Lunar tag. Empty enforces on every component the policy targets (via on:).
    default: ""
