version: 0

name: repo
description: Repository hygiene guardrails for README, CODEOWNERS, and standard files
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Repository Guardrails"
  long_description: |
    Enforce repository hygiene including README quality, CODEOWNERS validation,
    and presence of standard files (.gitignore, LICENSE, SECURITY.md,
    CONTRIBUTING.md). Consolidates readme and codeowners policies into a single
    plugin with additional file-existence checks.
  category: "repository-and-ownership"
  icon: "assets/repo.svg"
  status: "beta"
  requires:
    - slug: "repo"
      type: "collector"
      reason: "Provides README, CODEOWNERS, and standard file metadata"
  related: []

policies:
  # --- README checks ---
  - name: readme-exists
    description: |
      Verifies that a README file exists in the repository root.
      Every repository should have basic documentation for discoverability.
    mainPython: ./readme-exists.py
    keywords: ["readme", "documentation", "repository docs"]

  - name: readme-min-line-count
    description: |
      Requires the README to have a minimum number of lines (default 25).
      Prevents placeholder READMEs that lack useful information.
    mainPython: ./readme-min-line-count.py
    keywords: ["readme length", "documentation quality"]

  - name: readme-required-sections
    description: |
      Ensures the README contains required section headings (e.g., Installation, Usage).
      Configurable via the required_sections input. Skips if no sections configured.
    mainPython: ./readme-required-sections.py
    keywords: ["readme sections", "documentation structure"]

  # --- CODEOWNERS checks ---
  - name: codeowners-exists
    description: |
      Requires a CODEOWNERS file to be present in the repository.
      Checks standard locations: root, .github/, or docs/.
    mainPython: ./codeowners-exists.py
    keywords: ["codeowners", "code ownership", "file exists"]

  - name: codeowners-valid
    description: |
      Validates that the CODEOWNERS file has correct syntax.
      Checks that all owner references use valid formats (@user, @org/team, or email).
    mainPython: ./codeowners-valid.py
    keywords: ["codeowners", "syntax validation", "owner format"]

  - name: codeowners-catchall
    description: |
      Requires a default catch-all rule (*) in CODEOWNERS so that every file
      in the repository has at least one owner.
    mainPython: ./codeowners-catchall.py
    keywords: ["codeowners", "catch-all", "default owner", "coverage"]

  - name: codeowners-min-owners
    description: |
      Ensures each CODEOWNERS rule has a minimum number of owners for redundancy.
      Configurable via the min_owners_per_rule input.
    mainPython: ./codeowners-min-owners.py
    keywords: ["codeowners", "minimum owners", "bus factor", "redundancy"]

  - name: codeowners-team-owners
    description: |
      Requires at least one team-based owner (@org/team) in the CODEOWNERS file
      for better ownership continuity.
    mainPython: ./codeowners-team-owners.py
    keywords: ["codeowners", "team ownership", "org team"]

  - name: codeowners-no-individuals-only
    description: |
      Ensures each CODEOWNERS rule includes at least one team owner, not just
      individual users. Stricter than codeowners-team-owners which only checks
      that teams exist somewhere in the file.
    mainPython: ./codeowners-no-individuals-only.py
    keywords: ["codeowners", "team ownership", "individual owners"]

  - name: codeowners-no-empty-rules
    description: |
      Flags CODEOWNERS rules that have no owners assigned, which effectively
      un-assigns ownership for matching files.
    mainPython: ./codeowners-no-empty-rules.py
    keywords: ["codeowners", "empty rules", "unassigned ownership"]

  - name: codeowners-max-owners
    description: |
      Flags CODEOWNERS rules with too many owners. Excessive owners often means
      diffused responsibility. Configurable via the max_owners_per_rule input.
    mainPython: ./codeowners-max-owners.py
    keywords: ["codeowners", "maximum owners", "diffused ownership"]

  # --- Gitignore checks ---
  - name: gitignore-exists
    description: |
      Verifies that a .gitignore file exists in the repository root. Prevents
      accidental commits of build artifacts, dependencies, and IDE files.
      Reads from `.repo.gitignore`.
    mainPython: ./gitignore-exists.py
    keywords: ["gitignore", "repository hygiene"]

  # --- License checks ---
  - name: license-exists
    description: |
      Verifies that a LICENSE file exists in the repository root. Checks
      common variants: LICENSE, LICENSE.md, LICENSE.txt, LICENCE.
      Reads from `.repo.license`.
    mainPython: ./license-exists.py
    keywords: ["license", "open source", "repository hygiene"]

  # --- Security policy checks ---
  - name: security-exists
    description: |
      Verifies that a SECURITY.md file exists in the repository root or .github/
      directory. Provides a channel for responsible vulnerability disclosure.
      Reads from `.repo.security`.
    mainPython: ./security-exists.py
    keywords: ["security", "vulnerability disclosure", "repository hygiene"]

  # --- Contributing checks ---
  - name: contributing-exists
    description: |
      Verifies that a CONTRIBUTING.md file exists in the repository root or .github/
      directory. Helps external and internal contributors understand the process.
      Reads from `.repo.contributing`.
    mainPython: ./contributing-exists.py
    keywords: ["contributing", "contribution guide", "repository hygiene"]

  # --- Editorconfig checks ---
  - name: editorconfig-exists
    description: |
      Verifies that an .editorconfig file exists in the repository root. Ensures
      consistent coding style across editors. Use exclude/include in lunar-config
      to control whether this check runs. Reads from `.repo.editorconfig`.
    mainPython: ./editorconfig-exists.py
    keywords: ["editorconfig", "code style", "repository hygiene"]

inputs:
  min_lines:
    description: Minimum number of lines required in README file
    default: "25"
  required_sections:
    description: Comma-separated list of required sections in README file
    default: ""
  min_owners_per_rule:
    description: Minimum number of owners required per CODEOWNERS rule
    default: "2"
  max_owners_per_rule:
    description: Maximum number of owners allowed per CODEOWNERS rule
    default: "10"
