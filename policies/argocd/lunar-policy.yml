version: 0

name: argocd
description: ArgoCD-specific GitOps guardrails (CRD validation, AppProject hygiene)
author: earthly

default_image: earthly/lunar-lib:base-v1.9.0

landing_page:
  display_name: "ArgoCD Guardrails"
  long_description: |
    ArgoCD-specific guardrails over the argocd collector's data: validate
    Application, ApplicationSet, and AppProject manifests against the argoproj
    CRD schemas, and require scoped (non-default) AppProjects. Pairs with the
    tool-agnostic gitops policy set for the cross-tool checks.
  category: "deployment-and-infrastructure"
  icon: "assets/argocd.svg"
  status: "beta"
  requires:
    - slug: "argocd"
      type: "collector"
      reason: "Provides parsed ArgoCD configuration these policies evaluate"

  related:
    - slug: "gitops"
      type: "policy"
      reason: "Tool-agnostic GitOps checks (sync policy, allow-lists, adoption coverage)"

policies:
  - name: valid
    description: |
      Validates that all ArgoCD manifests (Applications, ApplicationSets, and
      AppProjects) conform to the argoproj CRD schemas. Invalid manifests can
      silently fail to sync or behave unexpectedly once applied to the cluster.
    mainPython: valid.py
    keywords: ["argocd", "manifest validation", "argoproj", "crd", "schema"]

  - name: non-default-project
    description: |
      Requires Applications to belong to a named AppProject rather than the
      permissive built-in `default` project, and (optionally) to a project on
      an allow-list. Scoped AppProjects bound what an Application may deploy and
      where — an ArgoCD-specific tenancy boundary.
    mainPython: non_default_project.py
    keywords: ["argocd", "appproject", "default project", "least privilege", "tenancy"]

inputs:
  allowed_projects:
    description: Comma-separated allow-list of AppProject names for non-default-project. Empty means only enforce that the project is not `default`.
    default: ""
