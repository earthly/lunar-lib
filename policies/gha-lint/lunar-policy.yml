version: 0

name: gha-lint
description: Evaluates GitHub Actions workflow lint quality and supply-chain pinning hygiene
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "GHA Workflow Lint Guardrails"
  long_description: |
    Enforces lint quality and supply-chain hygiene for GitHub Actions workflows.
    Checks that workflows pass actionlint validation, that third-party actions
    use pinned versions (SHA or tag), and that no mutable refs are used.
  category: "devex-build-and-ci"
  icon: "assets/gha-lint.svg"
  status: "beta"
  requires:
    - slug: "gha-lint"
      type: "collector"
      reason: "Provides parsed workflow data, actionlint results, and pinning analysis"
  related: []
  keywords: ["github-actions", "actionlint", "pinning", "supply-chain", "ci", "workflow"]

policies:
  - name: workflows-exist
    description: |
      Verifies that the repository has at least one GitHub Actions workflow defined.
      Skips if the component has no CI data at all.
    mainPython: workflows_exist.py
    keywords: ["github-actions", "workflows", "ci"]

  - name: actionlint-clean
    description: |
      Ensures no actionlint errors across all workflow files. Surfaces errors
      with file and line number for easy remediation.
    mainPython: actionlint_clean.py
    keywords: ["actionlint", "lint", "syntax", "workflows"]

  - name: actions-pinned
    description: |
      Verifies all third-party actions use SHA or tag pins, not branch refs.
      Same-org (first-party) actions using branch refs are acceptable.
    mainPython: actions_pinned.py
    keywords: ["pinning", "supply-chain", "actions", "sha", "tag"]

  - name: no-mutable-refs
    description: |
      Ensures no actions reference mutable refs like @main, @master, or @latest.
      Only checks third-party actions.
    mainPython: no_mutable_refs.py
    keywords: ["mutable", "branch", "main", "master", "supply-chain"]
