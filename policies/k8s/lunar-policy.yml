version: 0

name: k8s
description: Kubernetes configuration and resource policies
author: earthly

default_image: earthly/lunar-lib:base-v1.6.0

landing_page:
  display_name: "Kubernetes Guardrails"
  long_description: |
    Enforce Kubernetes best practices including manifest validation, resource limits,
    probes, PodDisruptionBudgets, and HPA configurations for production readiness.
  category: "deployment-and-infrastructure"
  icon: "assets/k8s.svg"
  status: "stable"
  requires:
    - slug: "k8s"
      type: "collector"
      reason: "Provides parsed K8s manifest data that these policies evaluate"

policies:
  - name: valid
    description: |
      Validates that all Kubernetes manifests in the repository are syntactically correct
      and conform to K8s schema. Invalid manifests will fail deployment.
    mainPython: valid.py
    keywords: ["kubernetes", "manifest validation", "yaml", "kubeconform"]

  - name: requests-and-limits
    description: |
      Ensures all containers have CPU and memory requests and limits defined.
      Missing resource specs can cause scheduling failures and noisy neighbor issues.
    mainPython: requests_and_limits.py
    keywords: ["resources", "cpu limits", "memory limits", "requests", "qos"]

  - name: probes
    description: |
      Requires liveness and readiness probes on all containers.
      Probes enable Kubernetes to detect unhealthy pods and route traffic correctly.
    mainPython: probes.py
    keywords: ["liveness probe", "readiness probe", "health checks", "pod health"]

  - name: min-replicas
    description: |
      Enforces minimum replica counts on HorizontalPodAutoscalers.
      Ensures services maintain capacity during scaling events and failures.
    mainPython: min_replicas.py
    keywords: ["hpa", "replicas", "high availability", "autoscaling"]

  - name: pdb
    description: |
      Requires PodDisruptionBudgets for Deployments and StatefulSets.
      PDBs protect availability during voluntary disruptions like node drains.
    mainPython: pdb.py
    keywords: ["pdb", "pod disruption budget", "availability", "node drain"]

  - name: non-root
    description: |
      Requires containers to run as non-root users via securityContext.
      Running as root inside containers violates least privilege principles.
    mainPython: non_root.py
    keywords: ["security context", "non-root", "runAsNonRoot", "least privilege"]

  - name: host-users
    description: |
      Requires workload PodSpecs to set `hostUsers: false`. User Namespaces
      (GA in Kubernetes v1.36) map container UIDs to unprivileged host UIDs
      so that a container escape no longer hands the attacker root on the
      node. Complements `non-root` — that check drops privilege inside the
      container; this one isolates UIDs across the kernel boundary. Target
      cluster must be on K8s >=1.36; workloads that legitimately need host
      UIDs (e.g. log shippers reading host paths) can be opted out via
      `include`/`exclude` in `lunar-config.yml`.
    mainPython: host_users.py
    keywords: ["user namespaces", "hostUsers", "container escape", "least privilege", "kernel boundary"]

  - name: host-network
    description: |
      Fails when workload PodSpecs set `hostNetwork: true`. Sharing the host's
      network namespace bypasses NetworkPolicy enforcement, exposes node-local
      services to the pod, and gives a compromised container direct access to
      the node's interfaces (and any cleartext traffic on them). Legitimate
      hostNetwork users (CNI agents, node-local proxies, host-bound exporters)
      can opt out via `include`/`exclude` in `lunar-config.yml`.
    mainPython: host_network.py
    keywords: ["hostNetwork", "network namespace", "NetworkPolicy bypass", "container escape", "least privilege"]

  - name: host-pid
    description: |
      Fails when workload PodSpecs set `hostPID: true`. Sharing the host's
      PID namespace lets the container see, signal, and (with the right
      capabilities) attach to every process on the node, undermining process
      isolation and aiding lateral movement after a container compromise.
      Workloads that need it (e.g. node-level monitoring agents) can opt out
      via `include`/`exclude` in `lunar-config.yml`.
    mainPython: host_pid.py
    keywords: ["hostPID", "PID namespace", "process isolation", "container escape", "least privilege"]

  - name: host-ipc
    description: |
      Fails when workload PodSpecs set `hostIPC: true`. Sharing the host's
      IPC namespace exposes node-wide System V IPC and POSIX shared memory
      to the container, which can be abused to read or tamper with other
      workloads' shared-memory state. Workloads that genuinely need host IPC
      can opt out via `include`/`exclude` in `lunar-config.yml`.
    mainPython: host_ipc.py
    keywords: ["hostIPC", "IPC namespace", "shared memory", "container escape", "least privilege"]

  - name: min-kubectl-version
    description: |
      Ensures the kubectl version used in CI meets the minimum required version.
      Old kubectl clients may miss security fixes or lack support for current cluster APIs.
    mainPython: min_kubectl_version.py
    keywords: ["kubectl", "version", "ci/cd", "compatibility", "security"]

inputs:
  min_replicas:
    description: Minimum replicas required for HPAs (default 3)
    default: "3"
  max_limit_to_request_ratio:
    description: Maximum ratio of limits to requests for CPU/memory (default 4)
    default: "4"
  min_kubectl_version:
    description: Minimum kubectl version required in CI (semver, e.g. "1.28")
    default: "1.28"

