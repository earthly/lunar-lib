version: 0

name: observability
description: Enforce dashboard and alerting configuration standards
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Observability Guardrails"
  long_description: |
    Enforce baseline observability for production services. Verify each
    service has a linked monitoring dashboard, at least one alert rule
    configured, and an SLO defined. Works with any observability-category
    collector (Grafana, Datadog, etc.) via the tool-agnostic .observability
    paths.
  category: "operational-readiness"
  icon: "assets/observability.svg"
  status: "beta"
  requires:
    - slug: "grafana"
      type: "collector"
      reason: "Provides dashboard and alert rule data (Grafana implementation)"
    - slug: "datadog"
      type: "collector"
      reason: "Provides dashboard, monitor, and SLO data (Datadog implementation)"
  related: []
  keywords: ["observability", "monitoring", "dashboard", "alerts", "slo", "grafana", "datadog", "operational readiness"]

policies:
  - name: dashboard-exists
    description: |
      Verifies that the service has a linked monitoring dashboard by
      checking .observability.dashboard.exists is true. Fails if
      observability data is present but .observability.dashboard.exists
      is false (the UID is registered but the dashboard is gone in
      Grafana). Skips cleanly when no observability source has written
      data for this component.
    mainPython: ./dashboard_exists.py
    keywords: ["observability", "dashboard", "monitoring", "grafana", "datadog"]

  - name: alerts-configured
    description: |
      Verifies that at least one alert rule is configured for the service
      by checking .observability.alerts.configured is true. Fails if
      alerting data is present but no rules are configured. Skips cleanly
      when no observability source has written data for this component.
      For Datadog, "monitors" map to this check — Datadog monitors are
      normalized to .observability.alerts.
    mainPython: ./alerts_configured.py
    keywords: ["observability", "alerts", "alerting", "monitors", "monitoring", "grafana", "datadog"]

  - name: slo-defined
    description: |
      Verifies that at least one Service Level Objective is defined for
      the service by checking .observability.slo.defined is true. Fails
      if observability data is present but no SLOs are configured. Skips
      cleanly when no observability source has written data for this
      component. SLO data is provided by collectors that support SLOs
      (e.g. Datadog). Grafana-only deployments will skip this check
      unless SLO data is populated from another source.
    mainPython: ./slo_defined.py
    keywords: ["observability", "slo", "sli", "error budget", "reliability", "datadog"]

example_component_json: |
  {
    "observability": {
      "source": {
        "tool": "datadog",
        "integration": "api"
      },
      "dashboard": {
        "id": "abc-123-def",
        "exists": true,
        "url": "https://app.datadoghq.com/dashboard/abc-123-def"
      },
      "alerts": {
        "configured": true,
        "count": 7
      },
      "slo": {
        "defined": true,
        "count": 2,
        "has_error_budget": true
      }
    }
  }
