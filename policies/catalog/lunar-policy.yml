version: 0

name: catalog
description: Normalized service catalog guardrail
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Service Catalog Guardrails"
  long_description: |
    Tool-agnostic service catalog policy that validates components are
    registered in a service catalog. Works with any catalog collector
    that writes to the .catalog Component JSON category (Backstage,
    ServiceNow, OpsLevel, etc.).
  category: "repository-and-ownership"
  icon: "assets/catalog.svg"
  status: "beta"
  requires:
    - slug: "backstage"
      type: "collector"
      reason: "Provides service catalog metadata at .catalog (one of several possible sources)"

policies:
  - name: exists
    description: |
      Validates that the component is registered in a service catalog.
      Fails if no catalog entry is found. This is a universal policy —
      every opted-in component should have a service catalog registration.
    mainPython: ./exists.py
    keywords: ["catalog", "service catalog", "registration", "backstage", "servicenow"]
