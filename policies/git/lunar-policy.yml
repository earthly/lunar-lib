version: 0

name: git
description: Git-ecosystem guardrails — pre-commit baseline, gitattributes, gitmodules, and signed-commits checks
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Git Guardrails"
  long_description: |
    Enforce baselines for git-ecosystem tooling that lives in the
    repository: pre-commit config and hook hygiene, gitattributes EOL
    normalization, submodule pinning, and recent commit-signature
    coverage. Reads data from the `git` collector.
  category: "devex-build-and-ci"
  icon: "assets/git.svg"
  status: "beta"
  requires:
    - slug: "git"
      type: "collector"
      reason: "Provides parsed config data under .git.* for all checks in this policy"
  related: []

policies:
  # --- pre-commit checks ---
  - name: pre-commit-config-exists
    description: |
      Universal check — fails when no `.pre-commit-config.yaml` is found in
      the repository. Pre-commit is a low-friction way to enforce
      lint/format/secret-scan hygiene; every component opted into this
      policy should have a config file. Reads `.git.pre_commit`.
    mainPython: ./pre-commit-config-exists.py
    keywords: ["pre-commit", "config exists", "developer tooling"]

  - name: pre-commit-pinned-refs
    description: |
      Each repo entry in `.pre-commit-config.yaml` must have a `rev` pinned
      to an immutable ref (tag or commit SHA), not a floating branch like
      `main`, `master`, or `HEAD`. Floating refs let upstream hook changes
      land in the developer machine without review. Skips when no
      pre-commit config is present (paired with `pre-commit-config-exists`).
    mainPython: ./pre-commit-pinned-refs.py
    keywords: ["pre-commit", "pinned refs", "supply chain", "immutable"]

  - name: pre-commit-secret-scan-hook
    description: |
      Recommends that the pre-commit config include at least one
      secret-scanning hook (gitleaks, detect-secrets, trufflehog, or
      similar). Pre-commit is the cheapest place to catch credentials
      before they reach the remote. Skips when no pre-commit config is
      present (paired with `pre-commit-config-exists`). The accepted hook
      ID list is configurable via the `secret_scan_hook_ids` input.
    mainPython: ./pre-commit-secret-scan-hook.py
    keywords: ["pre-commit", "secret scanning", "gitleaks", "credentials"]

  - name: pre-commit-ci-skip-empty
    description: |
      Flags non-empty `ci.skip` lists in `.pre-commit-config.yaml`. The
      `ci.skip` setting is a pre-commit.ci escape hatch that disables
      hooks in the hosted CI service while still showing them locally —
      a common way to silently bypass enforcement. Skips when no
      pre-commit config is present (paired with `pre-commit-config-exists`).
    mainPython: ./pre-commit-ci-skip-empty.py
    keywords: ["pre-commit", "ci.skip", "enforcement bypass"]

  # --- gitattributes checks ---
  - name: gitattributes-exists
    description: |
      Universal check — fails when no `.gitattributes` file is found in
      the repository. Even a minimal one (`* text=auto`) prevents the
      cross-platform line-ending churn that bloats diffs and breaks CI.
      Reads `.git.attributes`.
    mainPython: ./gitattributes-exists.py
    keywords: ["gitattributes", "line endings", "repository hygiene"]

  - name: gitattributes-eol-normalized
    description: |
      Requires `.gitattributes` to declare EOL normalization (e.g.
      `* text=auto`, or `text` / `eol=` directives covering tracked text
      files). Without this, Windows checkouts can produce CRLF diffs that
      derail reviews. Skips when no `.gitattributes` is present (paired
      with `gitattributes-exists`).
    mainPython: ./gitattributes-eol-normalized.py
    keywords: ["gitattributes", "eol", "line endings", "text=auto"]

  # --- gitmodules checks ---
  - name: submodules-no-floating-branches
    description: |
      Flags submodules that declare a `branch` field in `.gitmodules`,
      since that signals the submodule is intended to track a floating
      ref via `git submodule update --remote` (defeating the
      always-pinned-by-SHA default). Skips when no `.gitmodules` is
      present — submodule-free repos are not penalized.
    mainPython: ./submodules-no-floating-branches.py
    keywords: ["gitmodules", "submodules", "supply chain", "floating refs"]

  # --- signed-commits checks ---
  - name: signed-commits-recent
    description: |
      Requires the last N commits on the default branch (default 50,
      configurable via `signed_commits_window`) to all carry a valid GPG
      or SSH signature. Catches teams that have GPG enforcement enabled
      in branch protection but have unsigned commits slipping in via
      bypasses. Universal — fails when `.git.signing` is absent (the
      signed-commits sub-collector always runs unless `git log` fails on
      a shallow or empty clone). Reads `.git.signing`.
    mainPython: ./signed-commits-recent.py
    keywords: ["signed commits", "gpg", "ssh signing", "supply chain"]

inputs:
  secret_scan_hook_ids:
    description: Comma-separated list of pre-commit hook IDs that count as secret scanners
    default: "gitleaks,detect-secrets,trufflehog,detect-aws-credentials,detect-private-key"
  signed_commits_window:
    description: Number of recent commits on the default branch the signed-commits check applies to (must match collector input)
    default: "50"
