version: 0

name: ruby
description: Enforces Ruby project structure, dependency management, and security standards
author: support@earthly.dev

default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Ruby Project Guardrails"
  long_description: |
    Enforce Ruby-specific project standards including Gemfile presence, lockfile
    management, Ruby version pinning, and bundler-audit vulnerability compliance.
  category: "devex-build-and-ci"
  icon: "assets/ruby.svg"
  status: "beta"
  requires:
    - slug: "ruby"
      type: "collector"
      reason: "Provides Ruby project metadata"
  related: []

policies:
  - name: gemfile-exists
    description: |
      Ensures the project has a Gemfile for dependency management. Required for
      all Ruby projects using Bundler.
    mainPython: gemfile_exists.py
    keywords: ["Gemfile", "bundler", "ruby project", "dependency management"]

  - name: lockfile-exists
    description: |
      Ensures the project has a Gemfile.lock for reproducible dependency
      resolution. Pinned dependencies prevent unexpected version drift across
      environments.
    mainPython: lockfile_exists.py
    keywords: ["Gemfile.lock", "lockfile", "dependencies", "reproducibility"]

  - name: ruby-version-set
    description: |
      Ensures the Ruby version is explicitly specified via a .ruby-version file
      or a ruby directive in the Gemfile. Pinning the Ruby version prevents
      environment inconsistencies between development, CI, and production.
    mainPython: ruby_version_set.py
    keywords: ["ruby version", ".ruby-version", "version pinning", "rbenv", "rvm"]

  - name: bundler-audit-clean
    description: |
      Ensures bundler-audit reports no known vulnerabilities in the project's
      gem dependencies. Skips gracefully if bundler-audit has not been run.
      Requires the bundler-audit-cicd collector to capture audit results from CI.
    mainPython: bundler_audit_clean.py
    keywords: ["bundler-audit", "vulnerabilities", "security", "CVE", "advisory"]

inputs:
  max_audit_vulnerabilities:
    description: Maximum allowed known vulnerabilities from bundler-audit (0 = must be clean)
    default: "0"
