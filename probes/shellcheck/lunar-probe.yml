version: 0

name: shellcheck
description: Lint shell scripts with ShellCheck after the agent edits a `.sh` file.
author: earthly

landing_page:
  display_name: "shellcheck Probe"
  long_description: |
    Run [ShellCheck](https://www.shellcheck.net/) on every `.sh` file
    the agent edits — full rule set, surfaced before the change lands.
    Examples of what it catches: unquoted variables, missing `--`,
    GNU-isms, useless `cat`s. Read-only, local-only, skip-safe when
    shellcheck isn't installed.
  categories: ["code-quality"]
  icon: "assets/shellcheck.svg"
  status: "beta"
  related:
    - slug: "shell"
      type: "collector"
      reason: "CI-time ShellCheck + shell detection. Probe is the agent-time complement."
    - slug: "shell"
      type: "policy"
      reason: "Gates on CI-collected ShellCheck findings. Probe catches it earlier."

probes:
  - name: lint
    description: Run `shellcheck` on the edited shell script and block on findings.
    keywords: ["shell", "bash", "sh", "shellcheck", "lint", "static-analysis"]
    hook:
      type: agent-after-file-edit
      paths: "**/*.sh"
    check: scripts/lint-shell-script.sh
    message: |-
      ShellCheck flagged issues in `{file}`:

      ```
      {check_stdout}
      ```

      Fix the finding and re-save the file. The probe will run again
      automatically to re-evaluate `shellcheck`.
