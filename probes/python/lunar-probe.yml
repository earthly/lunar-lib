version: 0

name: python
description: Python guardrails that run as the agent edits `.py` files — Ruff lint + format-check, with room for more.
author: earthly

landing_page:
  display_name: "Python Probe"
  long_description: |
    Agent-time Python guardrails, bundled per language. Runs Ruff on
    each edited `.py` file — `ruff check` for lint findings and
    `ruff format --check` for formatting drift, each a separately
    toggleable sub-probe. Read-only and skip-safe when `ruff` isn't
    installed.
  categories: ["code-quality"]
  icon: "assets/python.svg"
  status: "beta"
  related:
    - slug: "python"
      type: "collector"
      reason: "CI-time Python linter detection. This bundle is the agent-time complement."
    - slug: "python"
      type: "policy"
      reason: "Gates on CI-collected Python lint findings. These probes catch them earlier."

probes:
  - name: ruff-lint
    description: Run `ruff check` on the edited Python file and block on lint findings.
    keywords: ["python", "py", "ruff", "lint", "static-analysis", "pyflakes", "pycodestyle"]
    hook:
      type: agent-after-file-edit
      paths: "**/*.py"
    requires:
      - tool: ruff
        install_hint: "pip install ruff  (or: uv tool install ruff / brew install ruff)"
    check: scripts/ruff-lint.sh
    message: |-
      Ruff found lint issues in `{file}`:

      ```
      {check_stdout}
      ```

      Fix the findings and re-save the file — the probe re-runs `ruff check` automatically.

  - name: ruff-format
    description: Run `ruff format --check` on the edited Python file and block on formatting drift.
    keywords: ["python", "py", "ruff", "format", "black", "formatting"]
    hook:
      type: agent-after-file-edit
      paths: "**/*.py"
    requires:
      - tool: ruff
        install_hint: "pip install ruff  (or: uv tool install ruff / brew install ruff)"
    check: scripts/ruff-format.sh
    message: |-
      `{file}` isn't formatted to Ruff's standard (Black-compatible):

      ```
      {check_stdout}
      ```

      Run `ruff format {file}` to fix the formatting, then re-save.
