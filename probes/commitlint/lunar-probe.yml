version: 0

name: commitlint
description: Lint commit messages with commitlint before `git commit` lands.
author: earthly

landing_page:
  display_name: "commitlint Probe"
  long_description: |
    Run [commitlint](https://commitlint.js.org/) on commit messages before
    `git commit` lands. Intercepts the command, pipes the message to
    commitlint, and blocks on rule violations. Read-only, local-only,
    skip-safe when the tool or config is missing.
  categories: ["authoring"]
  icon: "assets/commitlint.svg"
  status: "beta"
  # related: populated once sibling collectors land on main.
  # ENG-565 introduces collectors/git and collectors/pre-commit, both
  # message-format-adjacent. Until those merge, the connection lives
  # in README "See also" rather than the landing_page.related[] field.

probes:
  - name: pre-commit
    description: Lint the commit message before `git commit` runs.
    keywords: ["git", "commit", "commitlint", "conventional-commits", "lint", "message"]
    hook:
      type: agent-before-command
      binary:
        name: git
    check: scripts/lint-commit-message.sh
    message: |-
      Commit message rejected by commitlint:

      ```
      {check_stdout}
      ```

      Fix the message and re-run `git commit`. Config is read from the
      repo's `commitlint.config.{js,cjs,mjs,ts}` / `.commitlintrc*` /
      `package.json#commitlint`. The probe runs locally (no network) and
      skips if `commitlint` isn't on `PATH` or no config is present.
