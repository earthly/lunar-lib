version: 0

name: python-disallowed-dependencies
description: Block dep-file edits that pin a Python package to a known-vulnerable version. Ships seeded defaults covering widely-deployed Python CVEs (incl. Starlette BadHost / CVE-2026-48710); consumers extend or replace.
author: earthly

landing_page:
  display_name: "Python Disallowed Dependencies"
  long_description: |
    Catch Python dependencies pinned to known-vulnerable versions
    before the edit lands. Hard-blocks dep / lock file writes whose
    pins fall in any disallowed version range. Ships seeded defaults
    for known critical Python CVEs; consumers extend or replace.
  categories: ["security"]
  icon: "assets/python-disallowed-dependencies.svg"
  status: "beta"
  related:
    - slug: "python"
      type: "policy"
      reason: "CI-time backstop on Python dep versions; this probe is the agent-time complement."
    - slug: "sbom"
      type: "policy"
      reason: "PR-time SBOM-based equivalent (`disallowed-packages`) that inspired this probe's shape."

probes:
  - name: disallowed-pin
    description: Block dep-file edits that pin a Python package to a version inside a known-vulnerable range. Defaults seeded with widely-deployed Python CVEs; extend via inputs.
    keywords: ["python", "cve", "vulnerability", "deps", "lockfile", "disallowed-dependencies", "supply-chain", "starlette", "badhost"]
    hook:
      type: agent-before-file-edit
      paths:
        - "**/requirements*.txt"
        - "**/pyproject.toml"
        - "**/Pipfile*"
        - "**/poetry.lock"
        - "**/uv.lock"
    inputs:
      extra_disallowed:
        description: |
          Additional disallowed pins to enforce on top of the shipped
          defaults. JSON array of
          `{name, vulnerable_range, cve, severity, fix, why}` objects —
          same shape as `data/disallowed-dependencies.json` shipped with
          the probe. Empty by default; the seeded defaults alone are
          usually enough.
        default: "[]"
      replace_defaults:
        description: |
          When `"true"`, `extra_disallowed` *replaces* the shipped defaults
          instead of extending them. Use this when the consumer wants full
          control of the disallowed list. Defaults to `"false"`.
        default: "false"
    check: scripts/check-disallowed-pin.sh
    message: |-
      `{file}` pins a Python dependency to a known-vulnerable version.

      ```
      {check_stdout}
      ```

      Fix the pin in this file, re-resolve the lockfile, then retry.
      Extend or replace the disallowed list via the `extra_disallowed` and
      `replace_defaults` inputs — see
      [`probes/python-disallowed-dependencies/README.md`](../README.md)
      for the shipped defaults and the override shape.
