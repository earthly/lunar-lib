version: 0

name: backstage-catalog-info
description: Augments existing Lunar components with metadata read from each repo's catalog-info.yaml
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Backstage catalog-info.yaml Cataloger"
  long_description: |
    Augments existing Lunar components with owner, domain, and tag
    metadata pulled from each repo's `catalog-info.yaml`. Runs once per
    component (component-cron). Use when Backstage data lives in repo
    files, not a running server.
  categories: ["service-catalog", "vcs"]
  icon: "assets/backstage-catalog-info.svg"
  status: "experimental"
  related:
    - slug: "backstage"
      type: "cataloger"
      reason: "Same Backstage metadata, sourced from a live Backstage API instead of repo files"
    - slug: "backstage"
      type: "collector"
      reason: "Per-repo collector that writes `.catalog.native.backstage` during CI Lunar runs"
    - slug: "github-org"
      type: "cataloger"
      reason: "Defines the components this cataloger augments"

example_catalog_json: |
  {
    "components": {
      "github.com/acme/payment-api": {
        "owner": "group:default/team-payments",
        "domain": "platform.payments",
        "tags": ["bs-payments", "bs-tier1", "bs-type-service", "bs-lifecycle-production"]
      },
      "github.com/acme/web-app": {
        "owner": "group:default/team-web",
        "domain": "platform.frontend",
        "tags": ["bs-frontend", "bs-type-website", "bs-lifecycle-production"]
      }
    }
  }

catalogers:
  - name: augment
    description: |
      For each existing Lunar component, fetches `catalog-info.yaml`
      (configurable `paths`) from the component's repo via the GitHub
      contents API, finds the Backstage `Component` entity that matches
      the current component, and writes its owner, domain, and tags
      back to `.components["$LUNAR_COMPONENT_ID"]`. Components without
      a matching entity are skipped silently.
    mainBash: main.sh
    hook:
      type: component-cron
      schedule: "0 3 * * *"
    keywords: ["service catalog", "backstage", "catalog-info", "components", "ownership", "augment"]

inputs:
  paths:
    description: |
      Comma-separated list of repo-relative paths to try for the
      catalog-info file. First match wins. Components whose repo has
      none of these files are skipped silently.
    default: "catalog-info.yaml,catalog-info.yml"

  branch:
    description: |
      Branch to read `catalog-info.yaml` from. Empty means the repo's
      default branch (resolved via the GitHub API).
    default: ""

  component_id_annotation:
    description: |
      Annotation key on a Backstage Component used to match it against
      the current Lunar component. The cataloger looks for the entity
      whose `metadata.annotations[<key>]` value, prefixed with
      `component_id_prefix`, equals `$LUNAR_COMPONENT_ID`. When no
      annotation matches, the cataloger falls back to matching by the
      repo's `<owner>/<repo>` derived from the component ID.
    default: "github.com/project-slug"

  component_id_prefix:
    description: |
      String prepended to the annotation value (or fallback
      `<owner>/<repo>`) when matching against `$LUNAR_COMPONENT_ID`.
    default: "github.com/"

  tag_prefix:
    description: |
      Prefix added to Backstage `metadata.tags` when mapped to Lunar
      tags. Also applied to derived tags like `type-<spec.type>` and
      `lifecycle-<spec.lifecycle>`. Empty string disables the prefix.
    default: "bs-"

  include_derived_tags:
    description: |
      When `true`, emits derived tags from `spec.type` (e.g.
      `bs-type-service`) and `spec.lifecycle` (e.g.
      `bs-lifecycle-production`) in addition to `metadata.tags`.
    default: "true"

  owner_format:
    description: |
      How to write `spec.owner` from the catalog-info file into the
      Lunar `owner` field. Backstage entity refs typically look like
      `group:default/team-payments` or `user:default/jane`.
      - `as-is`     — pass the value through verbatim. Matches what
                      the existing `policies/backstage/*` checks accept
                      (`team-payments`, `group:infra`, `user:alice` are
                      all valid).
      - `bare-name` — strip the `<kind>:<namespace>/` prefix and write
                      only the trailing name (e.g. `team-payments`).
    default: "as-is"

  default_owner:
    description: |
      Fallback owner applied (verbatim) to components whose matched
      Backstage entity has no `spec.owner`. Leave empty to skip.
    default: ""

secrets:
  GITHUB_TOKEN:
    description: |
      GitHub Personal Access Token (or GitHub App installation token)
      with read access to the component repos. Public-only setups
      still need a token to clear the unauthenticated rate limit.
