version: 0

name: backstage-catalog-info
description: Augments existing Lunar components with metadata read from each repo's catalog-info.yaml, fetched directly via the GitHub Contents API
author: earthly
default_image: earthly/lunar-lib:base-v1.9.0

landing_page:
  display_name: "Backstage catalog-info.yaml Cataloger"
  long_description: |
    Augments existing Lunar components with owner, domain, tag, and
    annotation-sourced meta read from each repo's `catalog-info.yaml` — on a schedule
    via the GitHub API, or the moment a repo is committed to. Runs per
    component. Use when Backstage data lives in repo files, not a
    Backstage server.
  categories: ["service-catalog", "vcs"]
  icon: "assets/backstage-catalog-info.svg"
  status: "beta"
  related:
    - slug: "backstage"
      type: "cataloger"
      reason: "Same Backstage metadata, sourced from a live Backstage API instead of repo files"
    - slug: "backstage"
      type: "collector"
      reason: "Per-repo collector that parses catalog-info.yaml into the Component JSON"
    - slug: "github-org"
      type: "cataloger"
      reason: "Defines the components this cataloger augments"

example_catalog_json: |
  {
    "components": {
      "github.com/acme/payment-api": {
        "owner": "group:default/team-payments",
        "domain": "platform.payments",
        "tags": ["bs-payments", "bs-tier1", "bs-type-service", "bs-lifecycle-production"],
        "meta": {"pagerduty/service-id": "PABC123"}
      },
      "github.com/acme/web-app": {
        "owner": "group:default/team-web",
        "domain": "platform.frontend",
        "tags": ["bs-frontend", "bs-type-website", "bs-lifecycle-production"]
      }
    }
  }

catalogers:
  - name: augment
    description: |
      from the component's GitHub repo via the Contents API, parses it
      (supports multi-document YAML), picks the matching `Component`
      entity, and writes its owner, domain, tags, and selected
      annotation-sourced meta to `.components["$LUNAR_COMPONENT_ID"]`
      in the Catalog JSON. Repos with no `catalog-info.yaml`, an
      unparseable file, or no matching `Component` are skipped
      silently. Runs on a fixed cadence regardless of repo activity —
      pair with `augment-on-commit` (below) for updates the moment a
      repo's `catalog-info.yaml` changes instead of at the next cron.
    mainBash: main.sh
    hook:
      type: component-cron
      schedule: "0 3 * * *"
    keywords: ["service catalog", "backstage", "catalog-info", "components", "ownership", "augment"]

  - name: augment-on-commit
    description: |
      Commit-triggered companion to `augment`: identical owner /
      domain / tag / meta augmentation, but fired the moment a
      component's repo receives a commit instead of waiting for the
      daily cron.
      Runs via the `component-repo` hook, which checks out the
      component's repo, so it reads `catalog-info.yaml` straight from
      the working tree — no GitHub Contents API call and no `GH_TOKEN`
      required. Same matching rules, same inputs (except `branch`,
      which only applies to the API-fetch `augment` variant), and the
      same silent-skip behavior. Like `augment`, it augments existing
      components only — a component-defining cataloger such as
      `github-org` must run first — and cannot create new ones.
    mainBash: main-on-commit.sh
    # NOTE: the create-per-file variant (a global-hook walker that CREATES one
    # component per discovered catalog-info.yaml, including monorepo
    # subdirectories) lives in its own plugin, `catalogers/backstage-catalog-info-monorepo`
    # (ENG-1061). It needs a global hook (cron/repo) to create components, which
    # can't be mixed with the per-component hooks these augment-only variants use.
    hook:
      type: component-repo
      # Request a checkout of the component's repo so main-on-commit.sh can
      # read catalog-info.yaml from the working tree (vs. fetching over the
      # GitHub API like the scheduled `augment` variant).
      clone-code: true
    keywords: ["service catalog", "backstage", "catalog-info", "components", "ownership", "augment", "commit-triggered", "real-time"]

inputs:
  paths:
    description: |
      Comma-separated list of file paths to try in the component's
      repo. First match wins. Defaults match the conventional
      Backstage locations.
    default: "catalog-info.yaml,catalog-info.yml"

  branch:
    description: |
      Git ref to read `catalog-info.yaml` from. Empty means the
      repo's default branch. Applies to the `augment` (Contents API)
      variant only — `augment-on-commit` reads whatever ref the
      `component-repo` hook checked out, so this input is ignored
      there.
    default: ""

  component_id_annotation:
    description: |
      Annotation key on a Backstage Component used to match it
      against the current Lunar component. The cataloger picks the
      entity whose `metadata.annotations[<key>]` value, prefixed
      with `component_id_prefix`, equals `$LUNAR_COMPONENT_ID`. If
      the file has exactly one Component entity and no annotation,
      that single entity is used (the single-Component-per-repo
      case).
    default: "github.com/project-slug"

  component_id_prefix:
    description: |
      String prepended to the annotation value when matching against
      `$LUNAR_COMPONENT_ID`.
    default: "github.com/"

  domain_annotation:
    description: |
      Annotation key on a Backstage Component used to source the
      domain when `spec.domain` is absent. Useful for orgs that
      model domains via a custom annotation rather than the
      canonical Backstage `spec.domain` field. When set and the
      matched Component carries this annotation, its value wins
      over `spec.domain` / `spec.system`. Leave empty to use the
      canonical Backstage fields only.
    default: ""

  tag_prefix:
    description: |
      Prefix added to Backstage `metadata.tags` when mapped to Lunar
      tags. Also applied to derived tags like `type-<spec.type>` and
      `lifecycle-<spec.lifecycle>`. Empty string disables the
      prefix.
    default: "bs-"

  include_derived_tags:
    description: |
      When `true`, emits derived tags from `spec.type` (e.g.
      `bs-type-service`) and `spec.lifecycle` (e.g.
      `bs-lifecycle-production`) in addition to `metadata.tags`.
    default: "true"

  owner_format:
    description: |
      How to write `spec.owner` from the catalog-info file into the
      Lunar `owner` field. Backstage entity refs typically look like
      `group:default/team-payments` or `user:default/jane`.
      - `as-is`     — pass the value through verbatim. Matches what
                      the existing `policies/backstage/*` checks
                      accept (`team-payments`, `group:infra`,
                      `user:alice` are all valid).
      - `bare-name` — strip the `<kind>:<namespace>/` prefix and
                      write only the trailing name (e.g.
                      `team-payments`).
    default: "as-is"

  default_owner:
    description: |
      Fallback owner applied (verbatim) to components whose matched
      Backstage entity has no `spec.owner`. Leave empty to skip.
    default: ""

  default_domain:
    description: |
      Fallback domain applied (verbatim) to components whose matched
      Backstage entity resolves to no domain — i.e. none of
      `domain_annotation`, `spec.domain`, or `spec.system` is set. A
      stub `.domains["<default_domain>"]` entry is written alongside
      so the hub's domain validation accepts the reference. Leave
      empty to leave such components without a domain.
    default: ""

  meta_annotations:
    description: |
      Comma-separated `<annotation-key>=<meta-key>` pairs. For each
      pair, if the matched Backstage Component carries the annotation
      `metadata.annotations[<annotation-key>]`, its value is written
      to the Lunar component's `meta[<meta-key>]`. This is how tool
      collectors discover their per-component IDs from catalog-info:
      the `pagerduty` collector reads `pagerduty/service-id` from the
      component meta, and the default here sources it from the
      `pagerduty.com/service-id` annotation recommended by PagerDuty's
      Backstage integration guide. Add pairs to feed other collectors,
      e.g. `pagerduty.com/service-id=pagerduty/service-id,sonarqube.io/project-key=sonarqube/project-key`.
      Whitespace around pairs and the `=` is trimmed. Set to empty to
      write no meta.
    default: "pagerduty.com/service-id=pagerduty/service-id"

  ignore_components:
    description: |
      Comma-separated list of component ids to skip — no augmentation,
      no write. An entry matches `$LUNAR_COMPONENT_ID` by exact id or
      as a glob (e.g. `github.com/acme/legacy-*`). This is the
      platform-controlled exclusion: it lives in `lunar-config.yml`,
      so dev teams can't override it from their repos. Use it to keep
      specific components out of the catalog regardless of what their
      `catalog-info.yaml` says.
    default: ""

  allow_ignore_annotation:
    description: |
      When `true`, a matched `Component` whose `catalog-info.yaml`
      carries the ignore annotation (see `ignore_annotation`) set to a
      truthy value (`true` / `yes` / `1`) is skipped — that component
      is not augmented. This delegates opt-out to the dev teams that
      own the `catalog-info.yaml` files. Leave `false` (the default)
      to ignore the annotation entirely, keeping exclusion under
      platform control via `ignore_components`.
    default: "false"

  ignore_annotation:
    description: |
      Annotation key checked when `allow_ignore_annotation` is `true`.
      A matched `Component` with this annotation set to `true` / `yes`
      / `1` is skipped. Ignored unless `allow_ignore_annotation` is
      enabled.
    default: "lunar.io/ignore"

secrets:
  GH_TOKEN:
    description: |
      GitHub token used by the `augment` variant to fetch
      `catalog-info.yaml` from component repos via the Contents API.
      Needs `Contents: Read` on the target repos (`repo` scope on a
      classic PAT, or `contents: read` on a fine-grained PAT / GitHub
      App installation token). Not required by `augment-on-commit`,
      which reads the file from the `component-repo` checkout; if you
      run only that variant you can leave `GH_TOKEN` unset.
