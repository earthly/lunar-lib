version: 0

name: backstage
description: Syncs components and domains from a Backstage catalog into Lunar
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Backstage Cataloger"
  long_description: |
    Sync components and domains from a Backstage software catalog into Lunar.
    Maps Backstage entities to Lunar catalog with owner, domain, and tags,
    using the Backstage REST API. Authenticates with a Bearer token or with
    AWS SigV4 for Backstage APIs behind AWS IAM auth.
  categories: ["service-catalog"]
  icon: "assets/backstage.svg"
  status: "experimental"
  related:
    - slug: "backstage"
      type: "collector"
      reason: "Parses per-repo catalog-info.yaml for the same components this cataloger syncs"
    - slug: "github-org"
      type: "cataloger"
      reason: "Discovers repos from GitHub; Backstage layers owner/domain/tags on top"

example_catalog_json: |
  {
    "components": {
      "github.com/acme/payment-api": {
        "owner": "group:default/team-payments",
        "domain": "platform.payments",
        "tags": ["bs-payments", "bs-tier1", "bs-type-service", "bs-lifecycle-production"]
      },
      "github.com/acme/web-app": {
        "owner": "group:default/team-web",
        "domain": "platform.frontend",
        "tags": ["bs-frontend", "bs-type-website", "bs-lifecycle-production"]
      }
    },
    "domains": {
      "platform.payments": {
        "description": "Payment processing and billing",
        "owner": "group:default/platform-leads"
      },
      "platform.frontend": {
        "description": "Customer-facing web surfaces",
        "owner": "group:default/platform-leads"
      }
    }
  }

catalogers:
  - name: sync
    description: |
      Fetches entities from the Backstage catalog REST API and writes
      them to the Lunar catalog. Component entities populate
      `.components` with owner, domain, and tags; Domain entities
      populate `.domains` with description and owner. Components are
      keyed by a configurable annotation (defaults to
      `github.com/project-slug`) so they line up with components
      discovered by the `github-org` cataloger or by repo-based
      collectors.
    mainBash: main.sh
    hook:
      type: cron
      schedule: "0 2 * * *"
    keywords: ["service catalog", "backstage", "components", "domains", "ownership", "sync"]

inputs:
  backstage_url:
    description: |
      Base URL of the Backstage instance (e.g. https://backstage.example.com).
      The cataloger appends `<api_path_prefix>/catalog/entities` to this URL
      (by default `/api/catalog/entities`). Required.

  api_path_prefix:
    description: |
      Path prefix prepended before `/catalog/entities` when calling the
      Backstage catalog API. Defaults to `/api`, matching the standard
      Backstage layout (`<backstage_url>/api/catalog/entities`). Set to an
      empty string (`""`) when the catalog API is mounted at the root — e.g.
      behind an API gateway that already strips the `/api` hop, where
      `<backstage_url>/catalog/entities` is the live endpoint and
      `/api/catalog/entities` returns 403/404. A leading slash is optional and
      any trailing slash is ignored (`api`, `/api`, `/api/` are equivalent).
    default: "/api"

  entity_kinds:
    description: |
      Comma-separated list of Backstage entity kinds to sync. Each kind
      is routed to the appropriate Catalog JSON path:
      - Component, API, Resource → `.components`
      - Domain, System            → `.domains`
      Other kinds (User, Group, Location) are ignored.
    default: "Component,Domain"

  domain_hierarchy:
    description: |
      How Backstage domain nesting is reflected in the Lunar catalog. Lunar
      encodes domain hierarchy through dot-notation naming (`a.b.c` is a child
      of `a.b`) — there is no explicit parent field — so "nesting" here means
      the dotted key each domain is written under.
      - `flat` — Default; unchanged behavior. Every `Domain` and `System`
                 entity becomes a top-level domain keyed by its bare
                 `metadata.name`. `spec.subdomainOf` and a System's
                 `spec.domain` are ignored, so a nested Backstage taxonomy
                 lands as unrelated flat domains.
      - `nested` — Walk the parent chain and key each domain by its full
                 dotted path. A `Domain` is keyed by its `spec.subdomainOf`
                 ancestry (`grandparent.parent.name`); a `System` is nested as
                 a subdomain of the domain it belongs to via `spec.domain`
                 (`<domain-path>.<system-name>`); a `Component` resolves its
                 domain to the full dotted path of its `spec.system` (or
                 `spec.domain` when no system is set). Parent resolution only
                 sees entities that were synced, so include every level in
                 `entity_kinds` (e.g. `Component,Domain,System`); an
                 unresolved parent falls back to the bare name for that hop
                 and is logged. Opt-in because switching re-keys domains,
                 which shifts domain-targeted policies/initiatives.
    default: "flat"

  namespace:
    description: |
      Backstage namespace to query. Use `*` to query all namespaces.
    default: "default"

  component_id_annotation:
    description: |
      Annotation key on a Backstage Component whose value identifies
      the underlying repo. The cataloger reads this annotation and
      prepends `component_id_prefix` to build the Lunar component ID.
      Typical Backstage convention: `github.com/project-slug` (value
      `owner/repo`) or `backstage.io/source-location` (value
      `url:https://github.com/owner/repo`).
    default: "github.com/project-slug"

  component_id_prefix:
    description: |
      String prepended to the value of `component_id_annotation` to
      form the Lunar component ID. For the default annotation
      `github.com/project-slug` the value is already `owner/repo`, so
      the prefix is `github.com/` to produce `github.com/owner/repo`.
    default: "github.com/"

  tag_prefix:
    description: |
      Prefix added to Backstage `metadata.tags` when mapped to Lunar
      tags. Also applied to derived tags like `type-<spec.type>` and
      `lifecycle-<spec.lifecycle>`. Empty string disables the prefix.
    default: "bs-"

  include_derived_tags:
    description: |
      When `true`, emits derived tags from `spec.type` (e.g.
      `bs-type-service`) and `spec.lifecycle` (e.g.
      `bs-lifecycle-production`) in addition to `metadata.tags`.
    default: "true"

  owner_format:
    description: |
      How to write `spec.owner` from Backstage into the Lunar `owner`
      field. Backstage entity refs typically look like
      `group:default/team-payments` or `user:default/jane`.
      - `as-is`     — pass the Backstage value through verbatim.
                      Matches what the existing `policies/backstage/*`
                      checks accept (`team-payments`, `group:infra`,
                      `user:alice` are all valid).
      - `bare-name` — strip the `<kind>:<namespace>/` prefix and write
                      only the trailing name (e.g. `team-payments`).
                      Useful when downstream systems want plain names.
      Email resolution via Backstage User/Group entities is out of
      scope for v1.
    default: "as-is"

  default_owner:
    description: |
      Fallback owner applied (verbatim) to components and domains that
      have no `spec.owner` in Backstage. Format is whatever you want —
      entity ref, email, plain string — Lunar stores it as-is. Leave
      empty to skip entities without an owner.
    default: ""

  domain_default_description:
    description: |
      Fallback description for domains that have no `metadata.description`
      set in Backstage.
    default: ""

  filter:
    description: |
      Additional raw Backstage filter expression (passed through to the
      `?filter=` query parameter). Use to restrict the sync to a subset
      of entities (e.g. `metadata.annotations.team=platform`). Empty
      means no extra filter.
    default: ""

  auth_mode:
    description: |
      How the cataloger authenticates to the Backstage API.
      - `bearer` — send `Authorization: Bearer <BACKSTAGE_TOKEN>`. Default;
                   unchanged behavior.
      - `sigv4`  — sign every request with AWS Signature V4, for a Backstage
                   API fronted by AWS IAM auth (typically Amazon API Gateway).
                   Credentials are resolved at runtime from the standard AWS
                   credential chain — IRSA (EKS), ECS task role, EC2 instance
                   profile, or `AWS_*` env — so they **auto-refresh and are
                   never supplied by hand**. See the README "AWS SigV4
                   Authentication" section for the (one-time) IAM-role setup.
    default: "bearer"

  aws_region:
    description: |
      AWS region used to scope the SigV4 signature and to reach STS when
      assuming a web-identity (IRSA) role. Required when `auth_mode: sigv4`,
      unless `AWS_REGION` is already present in the cataloger pod's
      environment (IRSA and most AWS runtimes set it, but not always). If
      `auth_mode: sigv4` and neither this input nor the `AWS_REGION` env var
      is set, the cataloger fails fast at startup with a clear
      `aws_region required for sigv4` error rather than signing with an empty
      region (which would surface as an opaque downstream AWS error).
      Ignored for `auth_mode: bearer`.
    default: ""

  aws_service:
    description: |
      AWS service name for the SigV4 signature scope. For a Backstage API
      behind Amazon API Gateway this is `execute-api` (the default). Override
      only for other fronting (e.g. a Lambda function URL signs as `lambda`).
      Ignored for `auth_mode: bearer`.
    default: "execute-api"

secrets:
  BACKSTAGE_TOKEN:
    description: |
      Bearer token for the Backstage API. Used when `auth_mode: bearer`
      (the default). Required if the Backstage instance enforces bearer
      auth; many internal deployments do. Not used for `sigv4`.

  AWS_ACCESS_KEY_ID:
    description: |
      Optional, `auth_mode: sigv4` only. A static-credentials escape hatch
      for runners with **no** attached IAM identity (no IRSA / ECS / EC2
      role). Leave unset for role-based auth, which is the recommended path
      because it self-refreshes — static keys do **not** auto-rotate.

  AWS_SECRET_ACCESS_KEY:
    description: |
      Optional, `auth_mode: sigv4` only. Paired with `AWS_ACCESS_KEY_ID`
      for the static-credentials escape hatch (see that secret's note).

  AWS_SESSION_TOKEN:
    description: |
      Optional, `auth_mode: sigv4` only. Set alongside the static AWS keys
      when they are themselves temporary credentials. Because temporary keys
      expire, this path needs manual refresh — prefer role-based auth.
