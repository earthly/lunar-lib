version: 0

name: backstage-catalog-info-monorepo
description: Discovers every catalog-info.yaml in a repository (including subdirectories) and creates one Lunar component per file, keyed to the file's path
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Backstage catalog-info.yaml Monorepo Cataloger"
  long_description: |
    Scans each configured repository for every `catalog-info.yaml`
    — not just the root — and creates one Lunar component per file,
    keyed to the file's directory so a monorepo becomes one
    component per service. Each gets the owner, domain, and tags
    from its Backstage entity.
  categories: ["service-catalog", "vcs"]
  icon: "assets/backstage-catalog-info-monorepo.svg"
  status: "beta"
  related:
    - slug: "backstage-catalog-info"
      type: "cataloger"
      reason: "Augments existing components; this one creates them per catalog-info file"
    - slug: "github-org"
      type: "cataloger"
      reason: "Per-repo components; this adds per-catalog-info-file subcomponents"
    - slug: "backstage"
      type: "cataloger"
      reason: "Same metadata from a live Backstage API instead of repo files"

example_catalog_json: |
  {
    "components": {
      "github.com/acme/monorepo/services/payments": {
        "owner": "group:default/team-payments",
        "domain": "platform.payments",
        "tags": ["bs-payments", "bs-type-service", "bs-lifecycle-production"]
      },
      "github.com/acme/monorepo/services/web": {
        "owner": "group:default/team-web",
        "domain": "platform.frontend",
        "tags": ["bs-frontend", "bs-type-website", "bs-lifecycle-production"]
      }
    },
    "domains": {
      "platform.payments": {},
      "platform.frontend": {}
    }
  }

catalogers:
  - name: discover
    description: |
      Builds a scan list from the explicit `repos` input plus any repos
      auto-discovered from the `orgs` input (filtered by the
      `allowed_topics` / `disallowed_topics` GitHub-topic lists), so you
      can opt monorepos in with a repo topic instead of a hand-kept
      list. Walks each resulting repository's file tree via the GitHub
      Git Trees API (one recursive call per repo), finds every
      `catalog-info.yaml` / `catalog-info.yml`, fetches each via the
      Contents API, parses it (multi-document supported), and CREATES
      one component per discovered file in the Catalog JSON. Each
      component is keyed to the file's location: a root file maps to
      `<component_id_prefix><owner>/<repo>`, and a file at
      `<dir>/catalog-info.yaml` maps to the monorepo subcomponent
      `<component_id_prefix><owner>/<repo>/<dir>`. The matching
      `Component` entity's owner, domain, and tags are written onto
      the created component (identical shaping to the
      `backstage-catalog-info` cataloger), plus a `.domains` stub for
      every referenced domain. Runs on a fixed cadence.
    mainBash: main.sh
    hook:
      type: cron
      schedule: "0 3 * * *"
    keywords: ["service catalog", "backstage", "catalog-info", "components", "discovery", "monorepo", "create", "ownership", "topics", "org"]

inputs:
  repos:
    description: |
      Comma-separated list of `<owner>/<repo>` repositories to scan
      (e.g. `acme/monorepo,acme/platform`). Each is walked in full for
      `catalog-info.yaml` files, and is ALWAYS scanned (topic filters
      apply only to org-discovered repos, not to ones you name here).
      Either `repos` or `orgs` must be set — leave both empty and the
      cataloger has nothing to scan.
    default: ""

  orgs:
    description: |
      Comma-separated list of GitHub organization names to
      auto-discover repositories from (e.g. `acme,acme-labs`). Every
      repo in each org is enumerated via the GitHub API and, after the
      `allowed_topics` / `disallowed_topics` filters are applied, added
      to the scan set alongside any explicit `repos`. Lets you opt
      monorepos into cataloging by tagging them with a GitHub topic
      instead of maintaining a `repos` list. Empty (the default)
      disables discovery. The `GH_TOKEN` secret must be able to list
      the org's repos.
    default: ""

  allowed_topics:
    description: |
      Comma-separated list of GitHub repository topics used as an
      allowlist for org discovery (the `orgs` input). When set, only
      discovered repos carrying at least one of these topics are
      scanned; empty (the default) means every discovered repo passes.
      Matched exactly (case-sensitive) against a repo's GitHub topics.
      Does not affect repos named explicitly in `repos`. Examples:
      "lunar,backstage"
    default: ""

  disallowed_topics:
    description: |
      Comma-separated list of GitHub repository topics used as a
      blocklist for org discovery. A discovered repo carrying any of
      these topics is skipped, even when it also matches
      `allowed_topics` (block wins over allow). Empty (the default)
      disables the blocklist. Does not affect repos named explicitly in
      `repos`. Examples: "archived,no-catalog"
    default: ""

  include_archived:
    description: |
      When `true`, archived repositories are included during org
      discovery (the `orgs` input). Defaults to `false` so archived
      repos are skipped. Does not affect repos named explicitly in
      `repos`.
    default: "false"

  filenames:
    description: |
      Comma-separated list of file basenames that count as a
      Backstage catalog descriptor. A file anywhere in the repo tree
      whose basename matches is treated as a catalog-info file.
      Defaults match the conventional Backstage names.
    default: "catalog-info.yaml,catalog-info.yml"

  branch:
    description: |
      Git ref to read the tree and files from. Empty means each
      repo's default branch.
    default: ""

  exclude_paths:
    description: |
      Comma-separated list of file paths (relative to the repo root)
      to skip during discovery. An entry matches a discovered file by
      exact path or as a glob (e.g. `legacy/*/catalog-info.yaml`).
      Excluded files never become components. The default excludes a
      root `catalog-info.yaml` / `.yml`, because this cataloger is
      designed to run alongside the `backstage-catalog-info`
      cataloger, which already reads the root file onto the repo-level
      component — so out of the box this one stays out of the root and
      just adds the per-subdirectory subcomponents, no double-writes.
      Set it to an empty string to also process the root file (mapping
      it to the repo-level component id) when you run this cataloger on
      its own, or extend it to fence off additional paths. This is the
      platform-controlled exclusion: it lives in `lunar-config.yml`,
      so dev teams can't override it from their repos.
    default: "catalog-info.yaml,catalog-info.yml"

  component_id_prefix:
    description: |
      String prepended to `<owner>/<repo>[/<dir>]` when constructing
      the created component's id. `github.com/` yields ids like
      `github.com/acme/monorepo/services/payments`.
    default: "github.com/"

  domain_annotation:
    description: |
      Annotation key used to source the component's domain when
      `spec.domain` is absent. When set and the entity carries this
      annotation, its value wins over `spec.domain` / `spec.system`.
      Leave empty to use the canonical Backstage fields only. Same
      semantics as the `backstage-catalog-info` cataloger.
    default: ""

  tag_prefix:
    description: |
      Prefix added to Backstage `metadata.tags` (and to derived
      `type-*` / `lifecycle-*` tags) when mapped to Lunar tags. Empty
      string disables the prefix. Same semantics as the
      `backstage-catalog-info` cataloger.
    default: "bs-"

  include_derived_tags:
    description: |
      When `true`, emits derived tags from `spec.type` (e.g.
      `bs-type-service`) and `spec.lifecycle` (e.g.
      `bs-lifecycle-production`) in addition to `metadata.tags`.
    default: "true"

  owner_format:
    description: |
      How to write `spec.owner` into the Lunar `owner` field.
      - `as-is`     — pass the Backstage entity ref through verbatim
                      (e.g. `group:default/team-payments`).
      - `bare-name` — strip the `<kind>:<namespace>/` prefix and
                      write only the trailing name.
      Same semantics as the `backstage-catalog-info` cataloger.
    default: "as-is"

  default_owner:
    description: |
      Fallback owner applied (verbatim) to a created component whose
      matched entity has no `spec.owner`. Leave empty to skip.
    default: ""

  default_domain:
    description: |
      Fallback domain applied (verbatim) to a created component that
      resolves to no domain. A stub `.domains["<default_domain>"]`
      entry is written alongside so hub domain validation accepts the
      reference. Leave empty to leave such components without a
      domain.
    default: ""

  allow_ignore_annotation:
    description: |
      When `true`, a discovered `Component` whose `catalog-info.yaml`
      carries the ignore annotation (see `ignore_annotation`) set to a
      truthy value (`true` / `yes` / `1`) is skipped — no component is
      created for it. This delegates opt-out to the dev teams that own
      the `catalog-info.yaml` files. Leave `false` (the default) to
      ignore the annotation entirely, keeping exclusion under platform
      control via `exclude_paths`.
    default: "false"

  ignore_annotation:
    description: |
      Annotation key checked when `allow_ignore_annotation` is `true`.
      A `Component` with this annotation set to `true` / `yes` / `1`
      is skipped. Ignored unless `allow_ignore_annotation` is enabled.
    default: "lunar.io/ignore"

secrets:
  GH_TOKEN:
    description: |
      GitHub token used to walk each repo's tree (Git Trees API) and
      fetch each `catalog-info.yaml` (Contents API). Needs
      `Contents: Read` on the target repos (`repo` scope on a classic
      PAT, or `contents: read` on a fine-grained PAT / GitHub App
      installation token). When the `orgs` input is set, the token must
      also be able to list the org's repositories (List organization
      repositories API — `read:org` / org membership for private repos,
      or `Metadata: Read` on a fine-grained PAT / App installation).
      Reused across most lunar-lib GitHub plugins, so if `GH_TOKEN` is
      already set for `github-org` this cataloger picks it up
      automatically.
