version: 0

name: backstage-catalog-info-monorepo
description: Discovers every catalog-info.yaml in a repository (including subdirectories) and creates one Lunar component per file, keyed to the file's path
author: earthly
default_image: earthly/lunar-lib:base-main

landing_page:
  display_name: "Backstage catalog-info.yaml Monorepo Cataloger"
  long_description: |
    Scans each configured repository for every `catalog-info.yaml`
    — not just the root — and creates one Lunar component per file,
    keyed to the file's directory so a monorepo becomes one
    component per service. Each gets the owner, domain, and tags
    from its Backstage entity.
  categories: ["service-catalog", "vcs"]
  icon: "assets/backstage-catalog-info-monorepo.svg"
  status: "beta"
  related:
    - slug: "backstage-catalog-info"
      type: "cataloger"
      reason: "Augments existing components; this one creates them per catalog-info file"
    - slug: "github-org"
      type: "cataloger"
      reason: "Per-repo components; this adds per-catalog-info-file subcomponents"
    - slug: "backstage"
      type: "cataloger"
      reason: "Same metadata from a live Backstage API instead of repo files"

example_catalog_json: |
  {
    "components": {
      "github.com/acme/monorepo/services/payments": {
        "owner": "group:default/team-payments",
        "domain": "platform.payments",
        "tags": ["bs-payments", "bs-type-service", "bs-lifecycle-production"]
      },
      "github.com/acme/monorepo/services/web": {
        "owner": "group:default/team-web",
        "domain": "platform.frontend",
        "tags": ["bs-frontend", "bs-type-website", "bs-lifecycle-production"]
      }
    },
    "domains": {
      "platform.payments": {},
      "platform.frontend": {}
    }
  }

catalogers:
  - name: discover
    description: |
      Walks each configured repository's file tree via the GitHub
      Git Trees API (one recursive call per repo), finds every
      `catalog-info.yaml` / `catalog-info.yml`, fetches each via the
      Contents API, parses it (multi-document supported), and CREATES
      one component per discovered file in the Catalog JSON. Each
      component is keyed to the file's location: a root file maps to
      `<component_id_prefix><owner>/<repo>`, and a file at
      `<dir>/catalog-info.yaml` maps to the monorepo subcomponent
      `<component_id_prefix><owner>/<repo>/<dir>`. The matching
      `Component` entity's owner, domain, and tags are written onto
      the created component (identical shaping to the
      `backstage-catalog-info` cataloger), plus a `.domains` stub for
      every referenced domain. Runs on a fixed cadence.
    mainBash: main.sh
    hook:
      type: cron
      schedule: "0 3 * * *"
    keywords: ["service catalog", "backstage", "catalog-info", "components", "discovery", "monorepo", "create", "ownership"]

inputs:
  repos:
    description: |
      Comma-separated list of `<owner>/<repo>` repositories to scan
      (e.g. `acme/monorepo,acme/platform`). Each is walked in full
      for `catalog-info.yaml` files. Required — leave empty and the
      cataloger has nothing to scan. Org-wide auto-discovery (scan
      every repo in an org, or every repo already cataloged by
      `github-org`) is a planned follow-up; see the README.
    default: ""

  filenames:
    description: |
      Comma-separated list of file basenames that count as a
      Backstage catalog descriptor. A file anywhere in the repo tree
      whose basename matches is treated as a catalog-info file.
      Defaults match the conventional Backstage names.
    default: "catalog-info.yaml,catalog-info.yml"

  branch:
    description: |
      Git ref to read the tree and files from. Empty means each
      repo's default branch.
    default: ""

  skip_root_file:
    description: |
      When `true`, a `catalog-info.yaml` at the repo root is ignored
      and only files in subdirectories become components. Set this
      when you also run the `backstage-catalog-info` cataloger (which
      already reads the root file onto the repo-level component) so
      the two don't both write the repo-level component. Default
      `false` — the root file is processed and maps to the repo-level
      component id, which is what you want when this cataloger runs on
      its own. The write is idempotent either way (same id, same
      transform), so leaving it `false` alongside `backstage-catalog-info`
      is safe as long as both use the same transform inputs.
    default: "false"

  component_id_prefix:
    description: |
      String prepended to `<owner>/<repo>[/<dir>]` when constructing
      the created component's id. `github.com/` yields ids like
      `github.com/acme/monorepo/services/payments`.
    default: "github.com/"

  domain_annotation:
    description: |
      Annotation key used to source the component's domain when
      `spec.domain` is absent. When set and the entity carries this
      annotation, its value wins over `spec.domain` / `spec.system`.
      Leave empty to use the canonical Backstage fields only. Same
      semantics as the `backstage-catalog-info` cataloger.
    default: ""

  tag_prefix:
    description: |
      Prefix added to Backstage `metadata.tags` (and to derived
      `type-*` / `lifecycle-*` tags) when mapped to Lunar tags. Empty
      string disables the prefix. Same semantics as the
      `backstage-catalog-info` cataloger.
    default: "bs-"

  include_derived_tags:
    description: |
      When `true`, emits derived tags from `spec.type` (e.g.
      `bs-type-service`) and `spec.lifecycle` (e.g.
      `bs-lifecycle-production`) in addition to `metadata.tags`.
    default: "true"

  owner_format:
    description: |
      How to write `spec.owner` into the Lunar `owner` field.
      - `as-is`     — pass the Backstage entity ref through verbatim
                      (e.g. `group:default/team-payments`).
      - `bare-name` — strip the `<kind>:<namespace>/` prefix and
                      write only the trailing name.
      Same semantics as the `backstage-catalog-info` cataloger.
    default: "as-is"

  default_owner:
    description: |
      Fallback owner applied (verbatim) to a created component whose
      matched entity has no `spec.owner`. Leave empty to skip.
    default: ""

  default_domain:
    description: |
      Fallback domain applied (verbatim) to a created component that
      resolves to no domain. A stub `.domains["<default_domain>"]`
      entry is written alongside so hub domain validation accepts the
      reference. Leave empty to leave such components without a
      domain.
    default: ""

secrets:
  GH_TOKEN:
    description: |
      GitHub token used to walk each repo's tree (Git Trees API) and
      fetch each `catalog-info.yaml` (Contents API). Needs
      `Contents: Read` on the target repos (`repo` scope on a classic
      PAT, or `contents: read` on a fine-grained PAT / GitHub App
      installation token). Reused across most lunar-lib GitHub
      plugins, so if `GH_TOKEN` is already set for `github-org` this
      cataloger picks it up automatically.
